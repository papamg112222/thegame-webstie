```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mixed Reality VR Shooter</title>
    <!-- A-Frame VR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; font-family: sans-serif; }
        #custom-ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 999; color: white; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 10px; text-align: center;
        }
        /* Hide A-Frame's default VR button because we want to force AR mode */
        .a-enter-vr-button { display: none !important; }
        
        #ar-button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: #10b981; color: white; border: none;
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        #ar-button:hover { background: #059669; }
    </style>
</head>
<body>

    <div id="custom-ui">
        <h2>Mixed Reality Shooter</h2>
        <p>Open this on your VR Headset's browser and click Enter AR</p>
    </div>

    <!-- Custom AR Start Button -->
    <button id="ar-button">Enter AR (Passthrough)</button>

    <!-- 
      A-Scene Configuration:
      - background="transparent: true" is CRITICAL for passthrough. It tells the browser to show the real world.
      - webxr="optionalFeatures: hit-test;" requests Augmented Reality features from the headset.
    -->
    <a-scene 
        background="transparent: true" 
        webxr="optionalFeatures: hit-test, local-floor;" 
        renderer="alpha: true;"
        vr-mode-ui="enabled: false"> <!-- We handle the button manually for AR -->

        <!-- Player Camera Setup -->
        <a-camera id="player" position="0 1.6 0">
            <!-- Gaze-based Cursor (Shoots when you stare at targets) -->
            <a-cursor
                id="cursor"
                color="#00ff00"
                raycaster="objects: .target; interval: 20"
                animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 800; from: 1 1 1; to: 0.1 0.1 0.1"
                animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1"
                fuse="true"
                fuse-timeout="800">
            </a-cursor>

            <!-- Score Display attached to face -->
            <a-text id="score-text" value="Score: 0" position="-0.5 0.5 -1" color="#fff" width="2" font="mozillavr"></a-text>
        </a-camera>

        <!-- Lighting for the 3D objects -->
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.6" position="-1 2 1"></a-light>

        <!-- Container where targets will be spawned -->
        <a-entity id="targets-container"></a-entity>

    </a-scene>

    <script>
        let score = 0;
        let gameActive = false;
        const targetsContainer = document.getElementById('targets-container');
        const scoreText = document.getElementById('score-text');
        const sceneEl = document.querySelector('a-scene');
        const arButton = document.getElementById('ar-button');

        // Audio setup for shooting sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playShootSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }

        function spawnTarget() {
            if (!gameActive) return;

            const target = document.createElement('a-entity');

            // Calculate random position around the player (2 to 5 meters away)
            const theta = Math.random() * Math.PI * 2; 
            const phi = Math.acos((Math.random() * 1.5) - 0.5); 
            const radius = 2 + Math.random() * 3; 

            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = (radius * Math.cos(phi)) + 1.2; 
            const z = radius * Math.sin(phi) * Math.sin(theta);

            target.setAttribute('position', { x, y, z });

            // Assign Random Shape
            const shapes = ['box', 'sphere', 'dodecahedron', 'octahedron'];
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            target.setAttribute('geometry', `primitive: ${shape}; radius: 0.3; width: 0.4; height: 0.4; depth: 0.4`);

            // Assign Random Neon Color
            const colors = ['#f43f5e', '#a855f7', '#3b82f6', '#10b981', '#f59e0b'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            target.setAttribute('material', `color: ${color}; metalness: 0.5; roughness: 0.2; emissive: ${color}; emissiveIntensity: 0.6`);

            // Add rotating and floating animations
            target.setAttribute('animation__rot', `property: rotation; to: ${Math.random()*360} ${Math.random()*360} 360; loop: true; dur: 3000; easing: linear`);
            target.setAttribute('animation__float', `property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: ${x} ${y+0.5} ${z}`);

            target.setAttribute('class', 'target');

            // Handle Hit
            target.addEventListener('click', () => {
                playShootSound();
                target.setAttribute('animation__pop', 'property: scale; to: 0 0 0; dur: 150; easing: easeInBack');
                target.removeAttribute('class'); 

                score += 10;
                scoreText.setAttribute('value', `Score: ${score}`);

                setTimeout(() => {
                    if (target.parentNode) {
                        target.parentNode.removeChild(target);
                        spawnTarget();
                    }
                }, 150);
            });

            targetsContainer.appendChild(target);
        }

        // Custom AR Button Logic
        arButton.addEventListener('click', () => {
            // Tell A-Frame to enter immersive AR mode
            sceneEl.systems.webxr.sessionConfiguration = { optionalFeatures: ['hit-test', 'local-floor'] };
            sceneEl.enterVR(true); // true = AR mode in A-frame 1.4+
        });

        // Listen for when the headset successfully enters AR mode
        sceneEl.addEventListener('enter-vr', () => {
            if (sceneEl.is('ar-mode')) {
                document.getElementById('custom-ui').style.display = 'none';
                arButton.style.display = 'none';
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                gameActive = true;
                // Spawn first wave
                for(let i = 0; i < 6; i++) {
                    spawnTarget();
                }
            }
        });

        // Listen for exiting AR
        sceneEl.addEventListener('exit-vr', () => {
            document.getElementById('custom-ui').style.display = 'block';
            arButton.style.display = 'block';
            gameActive = false;
            targetsContainer.innerHTML = ''; // Clear targets
        });

    </script>
</body>
</html>

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MeTube Vision Pro VR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        .center-line { position: fixed; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.1); z-index: 10; pointer-events: none; }
        #setup-ui { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="setup-ui">
        <div class="bg-zinc-900/90 p-8 rounded-[40px] border border-white/10 text-center max-w-sm w-full">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-red-600/30">
                <svg viewBox="0 0 24 24" fill="white" class="w-8 h-8"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">MeTube Spatial</h1>
            <p id="status" class="text-zinc-400 text-sm mb-8">Aligning spatial passthrough...</p>
            <button id="start-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl active:scale-95 transition-all">
                Enter VR Mode
            </button>
        </div>
    </div>

    <div class="center-line"></div>
    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        const songs = [
            "Not Like Us - Kendrick Lamar", "Humble - Kendrick Lamar", "DNA - Kendrick Lamar",
            "From The Start - Laufey", "Valentine - Laufey", "Treehouse - Alex G", 
            "Homage - Mild High Club", "Bad Habit - Steve Lacy", "Dark Red - Steve Lacy", 
            "Pink + White - Frank Ocean", "Moonlight - Kali Uchis", "Telepatía - Kali Uchis",
            "Starboy - The Weeknd", "Blinding Lights - The Weeknd", "Snooze - SZA", 
            "Kill Bill - SZA", "Watermelon Sugar - Harry Styles", "Bad Guy - Billie Eilish",
            "Espresso - Sabrina Carpenter", "Vampire - Olivia Rodrigo"
        ];
        const fullSongs = Array(5).fill(songs).flat().slice(0, 100);

        let scene, camera, renderer, menuGroup, videoTex, reticle, progressRing;
        let items = [], hovered = null, hoverStart = 0, scrollY = 0;
        const audioPlayer = document.getElementById('audio-player');

        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('status').innerText = "Requesting Camera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 }
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('setup-ui').style.display = 'none';
                    init(video);
                };
            } catch (e) {
                document.getElementById('status').innerText = "Error: Camera required.";
            }
        };

        function init(video) {
            scene = new THREE.Scene();
            const w = window.innerWidth, h = window.innerHeight;
            camera = new THREE.PerspectiveCamera(70, (w / 2) / h, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Background Video
            videoTex = new THREE.VideoTexture(video);
            scene.background = videoTex;

            // Spatial Menu (Holographic style)
            menuGroup = new THREE.Group();
            menuGroup.position.set(1.5, -0.5, -4); // Side of waist, 4m away
            scene.add(menuGroup);

            // Header
            const header = createLabel("METUBE", 2.2, 0.6, '#ff0000', 'white', 80, true);
            header.position.y = 2;
            menuGroup.add(header);

            // Now Playing Display
            const np = createLabel("LOOK AT SONG TO PLAY", 3, 0.4, 'rgba(0,0,0,0.5)', '#00ffcc', 30);
            np.position.y = 2.6;
            np.name = "now-playing";
            menuGroup.add(np);

            // Scrollable List Container
            const listGroup = new THREE.Group();
            menuGroup.add(listGroup);

            fullSongs.forEach((s, i) => {
                const item = createLabel(s, 3.5, 0.45, 'rgba(255,255,255,0.05)', 'white', 28);
                item.position.y = 1.3 - (i * 0.55);
                item.userData = { id: i, name: s };
                listGroup.add(item);
                items.push(item);
            });

            // Gaze Reticle & Air Tap Ring
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.02, 0.03, 32),
                new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false, transparent: true, opacity: 0.8 })
            );
            progressRing = new THREE.Mesh(
                new THREE.RingGeometry(0.032, 0.045, 32, 1, 0, 0),
                new THREE.MeshBasicMaterial({ color: 0x00ffcc, depthTest: false, transparent: true, opacity: 0.9 })
            );
            
            const reticleGroup = new THREE.Group();
            reticleGroup.add(reticle);
            reticleGroup.add(progressRing);
            reticleGroup.position.z = -2;
            camera.add(reticleGroup);
            scene.add(camera);

            animate();
        }

        function createLabel(text, w, h, bg, color, size, bold) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, 512, 128);
            ctx.fillStyle = color;
            ctx.font = `${bold ? 'bold' : ''} ${size}px sans-serif`;
            ctx.fillText(text.slice(0, 30), 20, 80);
            
            const tex = new THREE.CanvasTexture(canvas);
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(w, h),
                new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.6 }) // TRANSPARENT FOR HANDS
            );
            return mesh;
        }

        function play(song) {
            const np = menuGroup.getObjectByName("now-playing");
            const ctx = np.material.map.image.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,512,128);
            ctx.fillStyle = '#00ffcc'; ctx.font = '30px sans-serif';
            ctx.fillText("PLAYING: " + song.slice(0, 20), 20, 80);
            np.material.map.needsUpdate = true;
            
            audioPlayer.src = "https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3";
            audioPlayer.play();
        }

        function animate() {
            requestAnimationFrame(animate);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            const hits = ray.intersectObjects(items);
            if (hits.length > 0) {
                const obj = hits[0].object;
                if (hovered !== obj) {
                    hovered = obj;
                    hoverStart = Date.now();
                }
                const progress = Math.min((Date.now() - hoverStart) / 1000, 1.0);
                progressRing.geometry = new THREE.RingGeometry(0.032, 0.045, 32, 1, 0, progress * Math.PI * 2);
                
                if (progress >= 1.0) {
                    play(obj.userData.name);
                    hoverStart = Date.now() + 5000; // Delay next tap
                }
            } else {
                hovered = null;
                progressRing.geometry = new THREE.RingGeometry(0, 0, 0);
            }

            // Simple Auto-Scroll if looking at edges
            const v = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            if (v.y > 0.3) menuGroup.children[2].position.y -= 0.05; // Scroll Down
            if (v.y < -0.3) menuGroup.children[2].position.y += 0.05; // Scroll Up

            // Stereo Render
            const w = window.innerWidth, h = window.innerHeight;
            renderer.setScissorTest(true);
            
            renderer.setScissor(0, 0, w / 2, h);
            renderer.setViewport(0, 0, w / 2, h);
            camera.position.x = -0.06;
            renderer.render(scene, camera);

            renderer.setScissor(w / 2, 0, w / 2, h);
            renderer.setViewport(w / 2, 0, w / 2, h);
            camera.position.x = 0.06;
            renderer.render(scene, camera);
            
            renderer.setScissorTest(false);
        }
    </script>
</body>
</html>

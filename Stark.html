<body>

    <!-- BOOT & PERMISSION HANDLER -->
    <div id="vision-boot-screen" onclick="requestSystemEntry()">
        <div class="boot-symbol">

            <h1>VISION_OS_3.0</h1>
            <p>TAP TO SYNC SPATIAL MAPPING</p>
        </div>
    </div>

    <div id="system-status-msg">
        <h3 id="status-title">Permission Required</h3>
        <p id="status-body" style="margin-top: 10px; opacity: 0.7;">We need camera and motion sensor access to lock the app in your room.</p>
        <button onclick="requestSystemEntry()">ALLOW ACCESS</button>
    </div>

    <!-- HUD LAYERS -->
    <div id="hud-now-playing">
        <h3 id="ui-track-name">No Media Loaded</h3>
        <p id="ui-artist-name">Select a track to begin playback</p>
        <div class="progress-track">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="hand-interaction-guide">PINCH TO SELECT • PALM OPEN TO MOVE WINDOW</div>

    <!-- MAIN ENGINE -->
    <canvas id="main-canvas"></canvas>
    <canvas id="occlusion-canvas"></canvas>
    <video id="raw-feed" playsinline></video>

    <script>
        /**
         * SPATIAL DATA CORE: THE 100+ SONG LIBRARY
         */
        const ARTIST_POOLED = ["Kendrick Lamar", "Laufey", "Arctic Monkeys", "Mild High Club", "Home", "Tame Impala", "Steve Lacy", "Tyler, The Creator", "Mac DeMarco", "TV Girl", "Joji", "Clairo", "Beach House", "Mitski", "Frank Ocean", "Slowdive", "Aphex Twin", "Thundercat"];
        const TRACK_POOLED = ["Not Like Us", "From The Start", "505", "Homage", "Resonance", "Treehouse", "Valentine", "Dreamcore", "Money Trees", "Swimming Pools", "Bad Habit", "After the Storm", "See You Again", "Chamber of Reflection", "Blue Hair", "Glimpse of Us", "Bags", "Borderline", "Myth", "First Love / Late Spring", "White Ferrari", "Pyramids", "Alison", "Xtal", "Them Changes"];
        
        const MASTER_LIBRARY = [];
        for(let i=0; i<120; i++) {
            MASTER_LIBRARY.push({
                title: TRACK_POOLED[i % TRACK_POOLED.length],
                artist: ARTIST_POOLED[i % ARTIST_POOLED.length],
                color: `hsl(${i * 11.3}, 60%, 45%)`,
                id: i
            });
        }

        /**
         * GLOBAL SPATIAL ENGINE STATE
         */
        let scene, camera, renderer, bgTexture;
        let worldAnchor, floatingWindow, launchBubble;
        let isEngineInitialized = false;
        let isMeTubeOpen = false;
        let audioContext, activeOsc;
        let trackInterval;

        // Interaction State
        let lastHandCoords = { x: 0, y: 0 };
        let worldWindowPos = { x: 0, y: 0, z: -6 }; // Floating 6 meters away
        let draggingState = false;
        let scrollY = 0;
        let scrollVel = 0;

        const videoEl = document.getElementById('raw-feed');
        const occCanvas = document.getElementById('occlusion-canvas');
        const oCtx = occCanvas.getContext('2d');

        /**
         * 1. 3D SPATIAL ARCHITECTURE (Three.js Engine)
         */
        function initialize3DWorld() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('main-canvas'), 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Pass-through Camera View (Skybox Sphere)
            bgTexture = new THREE.VideoTexture(videoEl);
            const skyGeo = new THREE.SphereGeometry(200, 32, 32);
            skyGeo.scale(-1, 1, 1); // Invert to look inside
            const skyMat = new THREE.MeshBasicMaterial({ map: bgTexture });
            const skySphere = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skySphere);

            // The World Anchor - This allows objects to stay in place while you move
            worldAnchor = new THREE.Group();
            scene.add(worldAnchor);

            // Setup Floating App Launcher
            spawnLauncher();

            camera.position.set(0, 0, 0.01);
        }

        function spawnLauncher() {
            const geo = new THREE.SphereGeometry(0.35, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0033, transparent: true, opacity: 0.9 });
            launchBubble = new THREE.Mesh(geo, mat);
            // Placement: Lower-right hip area in 3D space
            launchBubble.position.set(2, -2.5, -4);
            worldAnchor.add(launchBubble);

            // Label Canvas
            const lblCanv = document.createElement('canvas');
            lblCanv.width = 300; lblCanv.height = 100;
            const lctx = lblCanv.getContext('2d');
            lctx.fillStyle = "#fff"; lctx.font = "bold 50px sans-serif";
            lctx.textAlign = "center"; lctx.fillText("MeTube", 150, 70);
            const lblTex = new THREE.CanvasTexture(lblCanv);
            const lblMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.4), new THREE.MeshBasicMaterial({ map: lblTex, transparent: true }));
            lblMesh.position.set(2, -1.8, -4);
            worldAnchor.add(lblMesh);
        }

        /**
         * 2. METUBE INTERFACE GENERATION (High-Fidelity Textures)
         */
        function generateMeTubeWindow() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1500;
            const ctx = canvas.getContext('2d');

            function updateFrame() {
                ctx.clearRect(0, 0, 1024, 1500);
                
                // Deep Glass Container
                ctx.fillStyle = "rgba(12, 12, 12, 0.88)";
                drawRoundedBox(ctx, 40, 40, 944, 1420, 90, true);
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 6;
                drawRoundedBox(ctx, 40, 40, 944, 1420, 90, false);

                // Branding
                ctx.fillStyle = "#ff0033";
                ctx.font = "800 85px sans-serif";
                ctx.fillText("MeTube", 130, 200);
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.font = "35px sans-serif";
                ctx.fillText("Spatial Engine 3.0", 630, 195);

                // List Rendering (Scroll Logic)
                const rowH = 140;
                MASTER_LIBRARY.forEach((song, i) => {
                    const y = 300 + (i * rowH) - scrollY;
                    if(y < 200 || y > 1350) return;

                    ctx.fillStyle = "rgba(255,255,255,0.06)";
                    drawRoundedBox(ctx, 110, y, 804, 120, 30, true);
                    
                    ctx.fillStyle = song.color;
                    drawRoundedBox(ctx, 140, y + 15, 90, 90, 18, true);
                    
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 42px sans-serif";
                    ctx.fillText(song.title, 260, y + 60);
                    
                    ctx.fillStyle = "rgba(255,255,255,0.5)";
                    ctx.font = "30px sans-serif";
                    ctx.fillText(song.artist, 260, y + 100);
                });

                // Grab Handle (AVP Style)
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                drawRoundedBox(ctx, 362, 1380, 300, 14, 7, true);

                if(window.sharedTexture) window.sharedTexture.needsUpdate = true;
            }

            const tex = new THREE.CanvasTexture(canvas);
            window.sharedTexture = tex;
            const material = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            floatingWindow = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 6.5), material);
            
            floatingWindow.position.set(0, 0, -6);
            floatingWindow.visible = false;
            worldAnchor.add(floatingWindow);

            setInterval(updateFrame, 32);
        }

        function drawRoundedBox(ctx, x, y, w, h, r, f) {
            ctx.beginPath();
            ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
            ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
            ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
            ctx.closePath();
            if(f) ctx.fill(); else ctx.stroke();
        }

        /**
         * 3. NEURAL DEPTH & INTERACTION (MediaPipe AI)
         */
        const handAI = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        handAI.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        handAI.onResults(results => {
            // A. UPDATE OCCLUSION MASK
            occCanvas.width = window.innerWidth;
            occCanvas.height = window.innerHeight;
            oCtx.clearRect(0, 0, occCanvas.width, occCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('hand-interaction-guide').style.opacity = 1;
                
                results.multiHandLandmarks.forEach((marks, idx) => {
                    // Neural Stencil Rendering
                    oCtx.save();
                    oCtx.beginPath();
                    // Connect landmarks to create hand silhouette
                    const joints = [0, 1, 2, 3, 4, 3, 2, 1, 0, 5, 6, 7, 8, 7, 6, 5, 0, 9, 10, 11, 12, 11, 10, 9, 0, 13, 14, 15, 16, 15, 14, 13, 0, 17, 18, 19, 20];
                    joints.forEach((j, i) => {
                        const p = marks[j];
                        if(i === 0) oCtx.moveTo(p.x * occCanvas.width, p.y * occCanvas.height);
                        else oCtx.lineTo(p.x * occCanvas.width, p.y * occCanvas.height);
                    });
                    oCtx.closePath();
                    oCtx.clip();

                    // Re-render raw camera feed inside hand shape (Occlusion Bypass)
                    oCtx.drawImage(videoEl, 0, 0, occCanvas.width, occCanvas.height);
                    oCtx.restore();

                    // B. SPATIAL INTERACTION LOGIC
                    const tip = marks[8];
                    const thumb = marks[4];
                    const x = tip.x * 100, y = tip.y * 100;
                    const pinchDist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y);
                    const isPinching = pinchDist < 0.05;

                    // Orb Interaction
                    if (!isMeTubeOpen && x > 65 && y > 60) {
                        if (isPinching) triggerDeployment();
                    }

                    if (isMeTubeOpen) {
                        // Drag Window Logic (Palm Open)
                        const palmExpansion = Math.hypot(marks[8].x - marks[0].x, marks[8].y - marks[0].y);
                        const palmOpen = palmExpansion > 0.32;
                        
                        if (palmOpen && y > 82 && x > 35 && x < 65) {
                            draggingState = true;
                        } else if (!palmOpen) {
                            draggingState = false;
                        }

                        if (draggingState) {
                            floatingWindow.position.x = (tip.x - 0.5) * 12;
                            floatingWindow.position.y = (0.5 - tip.y) * 10;
                        }

                        // Air-Swipe Scrolling
                        if (!draggingState) {
                            const diffY = (tip.y * 100 - lastHandCoords.y);
                            if (Math.abs(diffY) > 0.6) {
                                scrollVel = diffY * 15;
                            }
                            
                            // Pinch Track Select
                            if (isPinching && x > 20 && x < 80 && y > 25 && y < 75) {
                                const songIdx = Math.floor((scrollY + (y - 25) * 18) / 140);
                                if (songIdx >= 0 && songIdx < MASTER_LIBRARY.length) {
                                    startSpatialAudio(MASTER_LIBRARY[songIdx]);
                                }
                            }
                        }
                    }
                    lastHandCoords = { x, y };
                });
            } else {
                document.getElementById('hand-interaction-guide').style.opacity = 0;
            }
        });

        /**
         * 4. WORLD ANCHORING (Sensor Fusion)
         */
        window.addEventListener('deviceorientation', (e) => {
            if(!isEngineInitialized) return;
            
            // Quaternion rotation to counter phone movement
            const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;

            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            worldAnchor.quaternion.setFromEuler(euler);
        });

        /**
         * 5. SPATIAL AUDIO SYSTEM
         */
        function startSpatialAudio(song) {
            if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if(activeOsc) activeOsc.stop();

            const hud = document.getElementById('hud-now-playing');
            hud.style.display = 'block';
            document.getElementById('ui-track-name').innerText = song.title;
            document.getElementById('ui-artist-name').innerText = song.artist;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(140 + (song.id % 25) * 6, audioContext.currentTime);
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            activeOsc = osc;

            let p = 0;
            if(trackInterval) clearInterval(trackInterval);
            trackInterval = setInterval(() => {
                p += 0.3;
                document.getElementById('progress-fill').style.width = p + "%";
                if(p >= 100) { clearInterval(trackInterval); osc.stop(); }
            }, 100);
        }

        /**
         * 6. SYSTEM LIFECYCLE (THE FIX)
         */
        async function requestSystemEntry() {
            const statusUI = document.getElementById('system-status-msg');
            const statusBody = document.getElementById('status-body');

            try {
                // Step 1: Camera Access
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 } 
                }).catch(() => { throw new Error("CAM_DENIED"); });
                
                videoEl.srcObject = stream;
                await videoEl.play();

                // Step 2: Motion Access (iOS Specific)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const result = await DeviceOrientationEvent.requestPermission();
                    if(result !== 'granted') throw new Error("MOTION_DENIED");
                }

                // SUCCESS: Launch Engine
                document.getElementById('vision-boot-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('vision-boot-screen').style.display = 'none'; }, 800);
                statusUI.style.display = 'none';

                initialize3DWorld();
                generateMeTubeWindow();
                
                const aiCam = new Camera(videoEl, {
                    onFrame: async () => { await handAI.send({image: videoEl}); },
                    width: 1280, height: 720
                });
                aiCam.start();
                
                isEngineInitialized = true;
                requestAnimationFrame(updateLoop);
            } catch (err) {
                statusUI.style.display = 'block';
                if(err.message === "CAM_DENIED") statusBody.innerText = "Camera permission was denied. Please go to your browser settings and enable it.";
                else if(err.message === "MOTION_DENIED") statusBody.innerText = "Motion sensor access is required for the World-Locked VR effect.";
                else statusBody.innerText = "System initialization failed. Ensure you are using HTTPS and have allowed all sensors.";
            }
        }

        function updateLoop() {
            renderer.render(scene, camera);

            if (isMeTubeOpen && !draggingState) {
                scrollY += scrollVel;
                scrollVel *= 0.94; // Friction
                
                if (scrollY < 0) { scrollY = 0; scrollVel = 0; }
                const limit = MASTER_LIBRARY.length * 140 - 900;
                if (scrollY > limit) { scrollY = limit; scrollVel = 0; }
            }

            requestAnimationFrame(updateLoop);
        }

        function triggerDeployment() {
            if(isMeTubeOpen) return;
            isMeTubeOpen = true;
            floatingWindow.visible = true;
            launchBubble.visible = false;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Neural interface sync complete. MeTube is now locked in your space."));
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>

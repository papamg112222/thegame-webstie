    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            touch-action: none;

        #world-container {

            display: none;

<body>

    <!-- Start Screen (Required for iOS Gyro & Camera permissions) -->
    <div id="start-screen">
        <h2 style="margin-bottom: 10px;">3D AR Environment</h2>
        <p style="opacity: 0.7; margin-bottom: 30px; text-align: center; max-width: 300px;">
            Uses Front Camera & Gyroscope. <br><br>
            Pinch to grab. Look around to see it float in your room.
        </p>
        <button class="launch-btn" onclick="initAR()">LAUNCH AR</button>
    </div>

    <!-- Layers -->
    <video class="video-background" playsinline autoplay muted></video>
    
    <div id="world-container">
        <div id="bubble">
            <div class="header">
                <h3>Vibe Player</h3>
                <p>Scroll or Grab to Move</p>
            </div>
            <div class="song-list" id="songList"></div>
        </div>
    </div>

    <canvas class="hand-overlay"></canvas>

    <script>
        const videoElement = document.querySelector('.video-background');
        const canvasElement = document.querySelector('.hand-overlay');
        const canvasCtx = canvasElement.getContext('2d');
        const worldContainer = document.getElementById('world-container');
        const bubble = document.getElementById('bubble');
        const startScreen = document.getElementById('start-screen');

        // State Variables
        let isGrabbed = false;
        let bubbleX = window.innerWidth / 2 - 160;
        let bubbleY = window.innerHeight / 2 - 240;
        
        // Parallax / Gyro Variables
        let baseGamma = 0, baseBeta = 0;
        let isCalibrated = false;
        let parallaxX = 0, parallaxY = 0;
        let targetParX = 0, targetParY = 0, targetRotX = 0, targetRotY = 0;

        // 1. Generate 500 Songs
        const artists = ["Kendrick Lamar", "Malcolm Todd", "Laufey", "Steve Lacy", "Treehouse", "Steve Lacy", "Frank Ocean", "Tyler, The Creator"];
        const tracks = ["Money Trees", "Room Service", "Valentine", "Dark Red", "Evergreen", "Bad Habit", "Nights", "See You Again"];
        const songList = document.getElementById('songList');
        
        for (let i = 1; i <= 500; i++) {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <span class="song-title">${tracks[i % tracks.length]} (Vol ${i})</span>
                <span class="song-artist">${artists[i % artists.length]}</span>
            `;
            songList.appendChild(div);
        }

        // 2. Gyroscope Logic (The World Lock)
        function handleOrientation(e) {
            if (!isCalibrated) {
                baseGamma = e.gamma;
                baseBeta = e.beta;
                isCalibrated = true;
            }
            
            // Calculate difference from starting position
            let diffGamma = e.gamma - baseGamma;
            let diffBeta = e.beta - baseBeta;

            // Constrain rotation
            if (diffGamma > 90) diffGamma = 90; if (diffGamma < -90) diffGamma = -90;
            if (diffBeta > 90) diffBeta = 90; if (diffBeta < -90) diffBeta = -90;

            // Map physical rotation to 3D movement (Opposite direction to simulate floating)
            targetParX = -diffGamma * 20; 
            targetParY = -diffBeta * 20;
            targetRotY = diffGamma * 0.4;
            targetRotX = -diffBeta * 0.4;
        }

        // Smooth Animation Loop
        function animate3D() {
            // Lerp for smooth hovering effect
            parallaxX += (targetParX - parallaxX) * 0.1;
            parallaxY += (targetParY - parallaxY) * 0.1;
            
            // Move the whole world container to fake 6DoF tracking
            worldContainer.style.transform = `translate3d(${parallaxX}px, ${parallaxY}px, 0) rotateX(${targetRotX}deg) rotateY(${targetRotY}deg)`;
            
            // Position the bubble inside the world container
            bubble.style.transform = `translate3d(${bubbleX}px, ${bubbleY}px, 0)`;
            
            requestAnimationFrame(animate3D);
        }

        // Desktop Fallback (if no gyroscope)
        window.addEventListener('mousemove', (e) => {
            if (!isCalibrated) {
                let mx = (e.clientX / window.innerWidth - 0.5) * 60;
                let my = (e.clientY / window.innerHeight - 0.5) * 60;
                targetParX = -mx * 10;
                targetParY = -my * 10;
                targetRotY = mx;
                targetRotX = -my;
            }
        });

        // 3. Hand Tracking & Claw Logic
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // --- DRAW AR HOLOGRAM HAND ---
                // This draws a futuristic green wireframe OVER the bubble
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(0, 255, 204, 0.5)', lineWidth: 3});
                drawLandmarks(canvasCtx, landmarks, {color: '#00ffcc', lineWidth: 1, radius: 4});

                // --- CLAW LOGIC ---
                const index = landmarks[8];
                const thumb = landmarks[4];
                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                
                // Map to screen (Inverted X because mirror)
                const screenX = (1 - index.x) * window.innerWidth;
                const screenY = index.y * window.innerHeight;

                if (dist < 0.05) { // Pinched!
                    isGrabbed = true;
                    bubble.classList.add('grabbed');
                    
                    // Complex Math: We must subtract the World's parallax offset 
                    // so the bubble stays locked to your finger, not the room, while dragging.
                    bubbleX = screenX - parallaxX - 160; // 160 is half width
                    bubbleY = screenY - parallaxY - 40;  // 40 is top offset
                } else {
                    isGrabbed = false;
                    bubble.classList.remove('grabbed');
                }
            } else {
                bubble.classList.remove('grabbed');
            }
            canvasCtx.restore();
        }

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 4. Initialization (Permissions + AI Load)
        async function initAR() {
            startScreen.innerHTML = "<h3 style='color:#00ffcc'>Loading AI Models...</h3>";

            // Request Gyroscope (Mandatory for iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch(e) { console.warn("Gyro permission denied", e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation); // Android/Desktop
            }

            // Start 3D Engine
            animate3D();
            bubble.style.display = "flex"; // Show bubble

            // Setup MediaPipe
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            hands.onResults(onResults);

            // Start Front Camera
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720,
                facingMode: 'user' // Front camera requested
            });

            camera.start().then(() => {
                startScreen.style.display = "none";
            }).catch(e => {
                startScreen.innerHTML = "<h3 style='color:red'>Camera Access Denied</h3>";
            });
        }
    </script>
</body>
</html>

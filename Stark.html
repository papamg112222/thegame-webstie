    <style>

<body>

    <!-- BOOT SYSTEM -->
    <div id="boot-interface" onclick="unlockSpatialSystem()">
        <div class="vision-logo">
            <div style="width: 30px; height: 30px; background: #fff; border-radius: 50%;"></div>
        </div>
        <div class="boot-text">
            <h2>VISION_OS_2.0</h2>
            <p>TAP TO CALIBRATE ENVIRONMENT</p>
        </div>
    </div>

    <!-- HUD ELEMENTS -->
    <div id="playback-hud">
        <h3 id="current-track-name">Not Playing</h3>
        <p id="current-artist-name">Select a track from MeTube</p>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="interaction-tooltip">PINCH TO SELECT • PALM OPEN TO DRAG</div>

    <!-- MAIN RENDERING PIPELINE -->
    <canvas id="vision-canvas"></canvas>
    <canvas id="occlusion-overlay"></canvas>
    <video id="webcam-feed" playsinline></video>

    <script>
        /**
         * SPATIAL DATA: THE METUBE LIBRARY (100+ Songs)
         */
        const ARTISTS = ["Kendrick Lamar", "Laufey", "Arctic Monkeys", "Mild High Club", "Home", "Tame Impala", "Steve Lacy", "Tyler, The Creator", "Mac DeMarco", "TV Girl", "Joji", "Clairo", "Beach House", "Mitski", "Frank Ocean"];
        const TITLES = ["Not Like Us", "From The Start", "505", "Homage", "Resonance", "Treehouse", "Valentine", "Dreamcore", "Money Trees", "Swimming Pools", "Bad Habit", "After the Storm", "See You Again", "Chamber of Reflection", "Blue Hair", "Glimpse of Us", "Bags", "Borderline", "Myth", "Pink in the Night", "Pink + White", "Thinking Bout You"];
        
        const METUBE_LIBRARY = [];
        for(let i=0; i<115; i++) {
            METUBE_LIBRARY.push({
                title: TITLES[i % TITLES.length],
                artist: ARTISTS[i % ARTISTS.length],
                color: `hsl(${i * 13.7}, 65%, 45%)`,
                id: i
            });
        }

        /**
         * GLOBAL ENGINE STATE
         */
        let scene, camera, renderer, videoTexture;
        let worldGroup, uiWindow, launchOrb;
        let isSystemInitialized = false;
        let isMeTubeOpen = false;
        let audioContext, activeOscillator;
        let playbackInterval;

        // Interaction State
        let lastHandPos = { x: 0, y: 0 };
        let windowPosition = { x: 0, y: 0, z: -5 };
        let isDraggingWindow = false;
        let scrollOffset = 0;
        let scrollVelocity = 0;

        const videoElement = document.getElementById('webcam-feed');
        const occlusionCanvas = document.getElementById('occlusion-overlay');
        const oCtx = occlusionCanvas.getContext('2d');

        /**
         * 1. SPATIAL INITIALIZATION (Three.js)
         */
        function initSpatialEngine() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('vision-canvas'), 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Pass-through Background (Sphere)
            videoTexture = new THREE.VideoTexture(videoElement);
            const passThroughGeo = new THREE.SphereGeometry(100, 32, 32);
            passThroughGeo.scale(-1, 1, 1);
            const passThroughMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            const passThroughSphere = new THREE.Mesh(passThroughGeo, passThroughMat);
            scene.add(passThroughSphere);

            // The World Anchor (This stays fixed in the room)
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Initial Launch Orb (Placed low, near hip)
            createLaunchOrb();

            camera.position.set(0, 0, 0.01);
        }

        function createLaunchOrb() {
            const geometry = new THREE.SphereGeometry(0.3, 32, 32);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xff0033, 
                transparent: true, 
                opacity: 0.8 
            });
            launchOrb = new THREE.Mesh(geometry, material);
            // Place it down and to the right
            launchOrb.position.set(1.5, -2, -3);
            worldGroup.add(launchOrb);

            // Add text label to Orb
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "white";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("MeTube", 128, 80);
            const txtTex = new THREE.CanvasTexture(canvas);
            const txtMat = new THREE.MeshBasicMaterial({ map: txtTex, transparent: true });
            const txtMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.4), txtMat);
            txtMesh.position.set(1.5, -1.5, -3);
            worldGroup.add(txtMesh);
        }

        /**
         * 2. METUBE WINDOW GENERATION (Canvas Texture)
         */
        function createMeTubeWindow() {
            const uiCanvas = document.createElement('canvas');
            uiCanvas.width = 1024;
            uiCanvas.height = 1400;
            const ctx = uiCanvas.getContext('2d');

            function renderUITexture() {
                ctx.clearRect(0, 0, 1024, 1400);
                
                // Main Glass Shell
                ctx.fillStyle = "rgba(15, 15, 15, 0.85)";
                drawRoundedRect(ctx, 40, 40, 944, 1320, 80, true);
                ctx.strokeStyle = "rgba(255,255,255,0.15)";
                ctx.lineWidth = 4;
                drawRoundedRect(ctx, 40, 40, 944, 1320, 80, false);

                // App Header
                ctx.fillStyle = "#ff0033";
                ctx.font = "800 70px sans-serif";
                ctx.fillText("MeTube", 120, 180);
                
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.font = "30px sans-serif";
                ctx.fillText("SPATIAL LIBRARY v2.0", 620, 175);

                // Song List (Rendering visible items based on scrollOffset)
                const itemHeight = 130;
                METUBE_LIBRARY.forEach((song, i) => {
                    const yPos = 280 + (i * itemHeight) - scrollOffset;
                    if(yPos < 200 || yPos > 1250) return; // Cull hidden items

                    // Track Background
                    ctx.fillStyle = "rgba(255,255,255,0.05)";
                    drawRoundedRect(ctx, 100, yPos, 824, 110, 25, true);

                    // Album Art
                    ctx.fillStyle = song.color;
                    drawRoundedRect(ctx, 130, yPos + 15, 80, 80, 15, true);
                    
                    // Text
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 38px sans-serif";
                    ctx.fillText(song.title, 250, yPos + 55);
                    
                    ctx.fillStyle = "rgba(255,255,255,0.5)";
                    ctx.font = "28px sans-serif";
                    ctx.fillText(song.artist, 250, yPos + 90);
                });

                // Bottom Drag Bar
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                drawRoundedRect(ctx, 362, 1280, 300, 12, 6, true);

                if(window.uiTexture) window.uiTexture.needsUpdate = true;
            }

            const texture = new THREE.CanvasTexture(uiCanvas);
            window.uiTexture = texture;
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
            const geometry = new THREE.PlaneGeometry(4, 5.5);
            uiWindow = new THREE.Mesh(geometry, material);
            
            uiWindow.position.set(0, 0, -5);
            uiWindow.visible = false;
            worldGroup.add(uiWindow);

            // Set up a loop to re-render the UI only when needed
            setInterval(renderUITexture, 30);
        }

        function drawRoundedRect(ctx, x, y, width, height, radius, fill) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) ctx.fill(); else ctx.stroke();
        }

        /**
         * 3. NEURAL HAND OCCLUSION & INTERACTION (MediaPipe)
         */
        const handsEngine = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        handsEngine.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        handsEngine.onResults(results => {
            // A. UPDATE HAND OCCLUSION (Hand over UI)
            occlusionCanvas.width = window.innerWidth;
            occlusionCanvas.height = window.innerHeight;
            oCtx.clearRect(0, 0, occlusionCanvas.width, occlusionCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('interaction-tooltip').style.opacity = 1;
                
                results.multiHandLandmarks.forEach((landmarks, handIndex) => {
                    // Draw occlusion mask
                    oCtx.save();
                    oCtx.beginPath();
                    
                    // Simple path for palm and fingers
                    const points = [0, 1, 2, 3, 4, 3, 2, 1, 0, 5, 6, 7, 8, 7, 6, 5, 0, 9, 10, 11, 12, 11, 10, 9, 0, 13, 14, 15, 16, 15, 14, 13, 0, 17, 18, 19, 20];
                    points.forEach((idx, i) => {
                        const p = landmarks[idx];
                        if(i === 0) oCtx.moveTo(p.x * occlusionCanvas.width, p.y * occlusionCanvas.height);
                        else oCtx.lineTo(p.x * occlusionCanvas.width, p.y * occlusionCanvas.height);
                    });
                    
                    oCtx.closePath();
                    oCtx.clip();

                    // Fill the clipped shape with the real camera feed (Occlusion!)
                    oCtx.drawImage(videoElement, 0, 0, occlusionCanvas.width, occlusionCanvas.height);
                    oCtx.restore();

                    // B. INTERACTION LOGIC
                    const index = landmarks[8];
                    const thumb = landmarks[4];
                    const x = index.x * 100, y = index.y * 100;
                    const pinchDist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                    const isPinching = pinchDist < 0.045;

                    // I. Summon MeTube (Orb near hip)
                    if (!isMeTubeOpen && x > 60 && y > 60) {
                        if (isPinching) openMeTube();
                    }

                    if (isMeTubeOpen) {
                        // II. Move Window (Grab bottom bar with palm open)
                        const palmOpen = Math.hypot(landmarks[8].x - landmarks[0].x, landmarks[8].y - landmarks[0].y) > 0.3;
                        if (palmOpen && y > 80 && x > 30 && x < 70) {
                            isDraggingWindow = true;
                        } else if (!palmOpen) {
                            isDraggingWindow = false;
                        }

                        if (isDraggingWindow) {
                            // Map 2D hand movement to 3D window position
                            uiWindow.position.x = (index.x - 0.5) * 10;
                            uiWindow.position.y = (0.5 - index.y) * 8;
                        }

                        // III. Scroll & Select
                        if (!isDraggingWindow) {
                            const dy = (index.y * 100 - lastHandPos.y);
                            if (Math.abs(dy) > 0.5) {
                                scrollVelocity = dy * 12;
                            }
                            
                            // Select Song via Pinch
                            if (isPinching && x > 25 && x < 75 && y > 20 && y < 80) {
                                const songIndex = Math.floor((scrollOffset + (y - 20) * 14) / 130);
                                if (songIndex >= 0 && songIndex < METUBE_LIBRARY.length) {
                                    handleSongPlay(METUBE_LIBRARY[songIndex]);
                                }
                            }
                        }
                    }
                    lastHandPos = { x, y };
                });
            } else {
                document.getElementById('interaction-tooltip').style.opacity = 0;
            }
        });

        /**
         * 4. WORLD LOCKING ENGINE (Sensor Fusion)
         */
        window.addEventListener('deviceorientation', (e) => {
            if(!isSystemInitialized) return;
            
            // Apply phone rotation to the scene in reverse to keep worldGroup stable
            const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;

            // Neural Orientation Filter (Z-Y-X rotation for stable world locking)
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            worldGroup.quaternion.setFromEuler(euler);
        });

        /**
         * 5. AUDIO & HUD LOGIC
         */
        function handleSongPlay(song) {
            if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if(activeOscillator) activeOscillator.stop();

            // HUD Update
            document.getElementById('playback-hud').style.display = 'block';
            document.getElementById('current-track-name').innerText = song.title;
            document.getElementById('current-artist-name').innerText = song.artist;
            
            // Synthetic Playback
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'triangle';
            // Scale frequency by track ID for unique soundscapes
            osc.frequency.setValueAtTime(110 + (song.id % 20) * 5, audioContext.currentTime);
            gain.gain.setValueAtTime(0.08, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            activeOscillator = osc;

            // Progress bar simulation
            let p = 0;
            if(playbackInterval) clearInterval(playbackInterval);
            playbackInterval = setInterval(() => {
                p += 0.25;
                document.getElementById('progress-bar').style.width = p + "%";
                if(p >= 100) {
                    clearInterval(playbackInterval);
                    osc.stop();
                }
            }, 100);
        }

        /**
         * 6. SYSTEM LIFECYCLE
         */
        async function unlockSpatialSystem() {
            try {
                // Request Camera Hardware
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 } 
                });
                videoElement.srcObject = stream;
                await videoElement.play();

                // Request Motion Sensors (iOS Security Protocol)
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if(permission !== 'granted') throw new Error("Motion denied");
                }

                // Hide Boot UI
                document.getElementById('boot-interface').style.display = 'none';
                
                // Initialize Graphics & AI
                initSpatialEngine();
                createMeTubeWindow();
                
                const cameraTracker = new Camera(videoElement, {
                    onFrame: async () => { await handsEngine.send({image: videoElement}); },
                    width: 1280, height: 720
                });
                cameraTracker.start();
                
                isSystemInitialized = true;
                requestAnimationFrame(spatialUpdateLoop);
            } catch (err) {
                alert("VisionOS requires Camera and Motion permissions to function. Error: " + err.message);
            }
        }

        function spatialUpdateLoop() {
            // Render 3D Scene
            renderer.render(scene, camera);

            // Handle Physics & Scrolling
            if (isMeTubeOpen && !isDraggingWindow) {
                scrollOffset += scrollVelocity;
                scrollVelocity *= 0.94; // Inertia
                
                // Boundaries
                if (scrollOffset < 0) { scrollOffset = 0; scrollVelocity = 0; }
                const maxScroll = METUBE_LIBRARY.length * 130 - 800;
                if (scrollOffset > maxScroll) { scrollOffset = maxScroll; scrollVelocity = 0; }
            }

            requestAnimationFrame(spatialUpdateLoop);
        }

        function openMeTube() {
            if(isMeTubeOpen) return;
            isMeTubeOpen = true;
            uiWindow.visible = true;
            launchOrb.visible = false;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Spatial Interface Loaded. MeTube Online."));
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>

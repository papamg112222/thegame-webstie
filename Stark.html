    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: #000; color: #fff;

        /* The main WebGL view */

        /* Top-level Occlusion Canvas (Renders your real hand OVER the UI) */

</head>
<body>

    <div id="boot-loader" onclick="requestPermissions()">
        <div class="avp-logo"><div style="width: 20px; height: 20px; background: #fff; border-radius: 4px;"></div></div>
        <h1 style="margin-top: 30px; letter-spacing: 10px; font-weight: 200; font-size: 14px;">VISION_OS</h1>
        <p style="margin-top: 15px; opacity: 0.4; font-size: 10px;">TAP TO SYNC WORLD & HANDS</p>
    </div>

    <div id="now-playing-hud">
        <div id="song-title" style="font-weight: bold; font-size: 14px;">Not Playing</div>
        <div id="song-artist" style="font-size: 11px; opacity: 0.6; margin-bottom: 8px;">Select a track</div>
        <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
            <div id="song-progress" style="width: 0%; height: 100%; background: #ff0033;"></div>
        </div>
    </div>

    <canvas id="view-canvas"></canvas>
    <canvas id="occlusion-canvas"></canvas>
    <video id="webcam" playsinline></video>

    <script>
        // --- DATA: 100+ SONGS ---
        const artists = ["Kendrick Lamar", "Laufey", "Arctic Monkeys", "Mild High Club", "Home", "Tame Impala", "Steve Lacy", "Tyler, The Creator", "Mac DeMarco", "TV Girl", "Joji", "Clairo"];
        const songs = ["Not Like Us", "From The Start", "505", "Homage", "Resonance", "Treehouse", "Valentine", "Dreamcore", "Money Trees", "Swimming Pools", "Bad Habit", "After the Storm", "See You Again", "Chamber of Reflection", "Blue Hair", "Glimpse of Us", "Bags", "Borderline"];
        
        let library = [];
        for(let i=0; i<110; i++) {
            library.push({
                title: songs[i % songs.length],
                artist: artists[i % artists.length],
                color: `hsl(${i * 13.7}, 60%, 40%)`
            });
        }

        // --- CORE VARIABLES ---
        let scene, camera, renderer, videoTexture;
        let worldGroup; // Group that holds the UI and stays world-locked
        let handMaskCanvas, handMaskCtx;
        let isSystemReady = false;
        let audioCtx, currentOsc;

        const video = document.getElementById('webcam');
        const occlusionCanvas = document.getElementById('occlusion-canvas');
        const oCtx = occlusionCanvas.getContext('2d');

        // --- 3D SETUP ---
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('view-canvas'), 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // 1. Background Camera Sphere
            videoTexture = new THREE.VideoTexture(video);
            const bgGeo = new THREE.SphereGeometry(100, 32, 32);
            bgGeo.scale(-1, 1, 1);
            const bgMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            const bgSphere = new THREE.Mesh(bgGeo, bgMat);
            scene.add(bgSphere);

            // 2. World Group (This moves opposite to phone rotation to stay locked)
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // 3. Create the Floating MeTube Window
            createMeTubeWindow();

            camera.position.set(0, 0, 0.1);
        }

        function createMeTubeWindow() {
            // We draw the UI to a canvas first, then use it as a texture
            const uiCanvas = document.createElement('canvas');
            uiCanvas.width = 1024;
            uiCanvas.height = 1400;
            const uctx = uiCanvas.getContext('2d');

            function updateUITexture() {
                // Glassmorphism background
                uctx.clearRect(0,0,1024,1400);
                uctx.fillStyle = "rgba(20, 20, 20, 0.8)";
                roundRect(uctx, 50, 50, 924, 1300, 80, true);
                uctx.strokeStyle = "rgba(255,255,255,0.2)";
                uctx.lineWidth = 4;
                roundRect(uctx, 50, 50, 924, 1300, 80, false);

                // Header
                uctx.fillStyle = "#ff0033";
                uctx.font = "bold 80px sans-serif";
                uctx.fillText("MeTube", 120, 200);
                uctx.fillStyle = "rgba(255,255,255,0.4)";
                uctx.font = "30px sans-serif";
                uctx.fillText("Spatial Reality v2.5", 700, 190);

                // Songs
                library.slice(0, 10).forEach((song, i) => {
                    const y = 300 + (i * 105);
                    uctx.fillStyle = "rgba(255,255,255,0.05)";
                    roundRect(uctx, 100, y, 824, 90, 20, true);
                    
                    uctx.fillStyle = song.color;
                    roundRect(uctx, 120, y + 15, 60, 60, 10, true);
                    
                    uctx.fillStyle = "#fff";
                    uctx.font = "bold 35px sans-serif";
                    uctx.fillText(song.title, 210, y + 45);
                    uctx.fillStyle = "rgba(255,255,255,0.5)";
                    uctx.font = "25px sans-serif";
                    uctx.fillText(song.artist, 210, y + 75);
                });

                if(window.uiTexture) window.uiTexture.needsUpdate = true;
            }

            const texture = new THREE.CanvasTexture(uiCanvas);
            window.uiTexture = texture;
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
            const geometry = new THREE.PlaneGeometry(3, 4.2);
            const mesh = new THREE.Mesh(geometry, material);
            
            // Position the window 5 units in front of the world center
            mesh.position.set(0, 0, -5); 
            worldGroup.add(mesh);
            
            updateUITexture();
        }

        function roundRect(ctx, x, y, width, height, radius, fill) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) ctx.fill(); else ctx.stroke();
        }

        // --- WORLD LOCKING (ORIENTATION) ---
        let baseRotation = new THREE.Quaternion();
        window.addEventListener('deviceorientation', (e) => {
            if(!isSystemReady) return;
            // Simple world-locking: Rotate the worldGroup opposite to the phone's tilt
            const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;

            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            worldGroup.quaternion.setFromEuler(euler);
        });

        // --- HAND TRACKING & OCCLUSION ---
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        
        hands.onResults(results => {
            // Render the "Hand Occlusion" mask
            occlusionCanvas.width = window.innerWidth;
            occlusionCanvas.height = window.innerHeight;
            oCtx.clearRect(0,0,occlusionCanvas.width, occlusionCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const h = results.multiHandLandmarks[0];
                
                // 1. Create Hand Mask Path
                oCtx.save();
                oCtx.beginPath();
                // Draw palm and fingers
                const points = [0, 1, 2, 3, 4, 3, 2, 1, 0, 5, 6, 7, 8, 7, 6, 5, 0, 9, 10, 11, 12, 11, 10, 9, 0, 13, 14, 15, 16, 15, 14, 13, 0, 17, 18, 19, 20];
                points.forEach((idx, i) => {
                    const p = h[idx];
                    if(i === 0) oCtx.moveTo(p.x * occlusionCanvas.width, p.y * occlusionCanvas.height);
                    else oCtx.lineTo(p.x * occlusionCanvas.width, p.y * occlusionCanvas.height);
                });
                oCtx.closePath();
                oCtx.clip();

                // 2. Draw Real Camera Image into the hand-shaped clip (Occlusion!)
                oCtx.drawImage(video, 0, 0, occlusionCanvas.width, occlusionCanvas.height);
                oCtx.restore();

                // 3. Interaction Logic (Tap)
                const indexTip = h[8];
                const thumbTip = h[4];
                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                
                if(dist < 0.05) {
                    handleSpatialTap(indexTip.x, indexTip.y);
                }
            }
        });

        function handleSpatialTap(x, y) {
            // Map 0-1 screen coordinates to song list
            if(x > 0.3 && x < 0.7 && y > 0.2 && y < 0.8) {
                const songIndex = Math.floor((y - 0.2) / 0.06);
                if(songIndex >= 0 && songIndex < 10) {
                    playSong(library[songIndex]);
                }
            }
        }

        // --- AUDIO SYSTEM ---
        function playSong(song) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(currentOsc) currentOsc.stop();

            document.getElementById('now-playing-hud').style.display = 'block';
            document.getElementById('song-title').innerText = song.title;
            document.getElementById('song-artist').innerText = song.artist;
            
            // Create a "Synth Chill" sound
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220 + (Math.random() * 100), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            currentOsc = osc;

            // Animate progress bar
            let p = 0;
            const interval = setInterval(() => {
                p += 0.5;
                document.getElementById('song-progress').style.width = p + "%";
                if(p >= 100) {
                    clearInterval(interval);
                    osc.stop();
                }
            }, 100);
        }

        async function requestPermissions() {
            try {
                // Request Camera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                await video.play();

                // Request Orientation (iOS requires explicit button tap)
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }

                document.getElementById('boot-loader').style.display = 'none';
                init3D();
                
                const cam = new Camera(video, {
                    onFrame: async () => { await hands.send({image: video}); },
                    width: 1280, height: 720
                });
                cam.start();
                
                isSystemReady = true;
                requestAnimationFrame(animate);
            } catch (e) {
                alert("Please allow Camera and Motion permissions.");
            }
        }

        function animate() {
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

    </script>
</body>

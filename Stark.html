<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Gesture Song Selector</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* The Camera Feed - Mirrored and on top */
        .output_canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10; 
            pointer-events: none; /* Allows you to scroll the list underneath */
            transform: scaleX(-1); /* Mirror fix */
        }

        /* The Glassmorphism Bubble */
        .bubble-window {
            position: absolute;
            width: 320px;
            height: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 5; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.05s linear;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #fff;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .song-item {
            padding: 15px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            color: #ddd;
            font-size: 14px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .song-item:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Scrollbar styling */
        .song-list::-webkit-scrollbar { width: 6px; }
        .song-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <video class="input_video" style="display:none;"></video>
    <canvas class="output_canvas"></canvas>

    <div id="bubble" class="bubble-window">
        <div class="header">Grab to Move • Scroll to Select</div>
        <div class="song-list" id="songList"></div>
    </div>

    <script>
        const videoElement = document.getElementsByClassName('input_video')[0];
        const canvasElement = document.getElementsByClassName('output_canvas')[0];
        const canvasCtx = canvasElement.getContext('2d');
        const bubble = document.getElementById('bubble');
        const songList = document.getElementById('songList');

        // 1. Generate the 500 Songs
        const artists = ["Kendrick Lamar", "Malcolm Todd", "Laufey", "Steve Lacy", "Treehouse", "Steve Lacy", "Bad Habit"];
        const tracks = ["Money Trees", "Room Service", "Valentine", "Dark Red", "Evergreen", "Bad Habit", "The Hillbillies"];
        
        for (let i = 1; i <= 500; i++) {
            const div = document.createElement('div');
            div.className = 'song-item';
            const artist = artists[i % artists.length];
            const track = tracks[i % tracks.length];
            div.innerHTML = `<strong>${track}</strong><br><span style="font-size:11px; opacity:0.6">${artist}</span>`;
            songList.appendChild(div);
        }

        // 2. Gesture Logic
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Index Tip (8) and Thumb Tip (4)
                const index = landmarks[8];
                const thumb = landmarks[4];

                // Check for "Claw" (Pinch) distance
                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                
                // Map coordinates (Inverted X because of mirror)
                const x = (1 - index.x) * window.innerWidth;
                const y = index.y * window.innerHeight;

                if (dist < 0.04) { // Tight claw/pinch
                    bubble.style.left = (x - 160) + 'px';
                    bubble.style.top = (y - 50) + 'px';
                    bubble.style.borderColor = "#00f2ff";
                    bubble.style.boxShadow = "0 0 30px rgba(0, 242, 255, 0.4)";
                } else {
                    bubble.style.borderColor = "rgba(255, 255, 255, 0.3)";
                    bubble.style.boxShadow = "0 20px 50px rgba(0,0,0,0.5)";
                }
            }
            canvasCtx.restore();
        }

        // 3. Initialize MediaPipe
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>

    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;

        /* 1. Camera Feed (Back Camera, No Mirror) */
        .video-background {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;

            z-index: 5;
            pointer-events: none; /* Let clicks pass through if needed */
        }

        /* 3. The World Engine (Rotates opposite to your phone) */
        #world {
            width: 100vw; height: 100vh;
            position: absolute;
            transform-style: preserve-3d;
            transform-origin: 50% 50% 0; /* Pivots exactly from the screen surface */
            will-change: transform; 
        }

        /* 4. The Interactive Window (Pushed into 3D Space) */
        #bubble {
            position: absolute;
            left: 50%; top: 50%;
            width: 380px; height: 580px;

            transform: translate(-50%, -50%) translate3d(0px, 0px, -600px);
            background: rgba(15, 15, 20, 0.5);
            backdrop-filter: blur(30px) saturate(200%);

            display: flex; flex-direction: column; overflow: hidden;
            will-change: transform;
            transition: border-color 0.2s, box-shadow 0.2s;

        /* Start Screen */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 200;

        }
        .launch-btn {
            background: #00ffcc; color: black; border: none;
            padding: 18px 45px; font-size: 18px; font-weight: bold; border-radius: 30px;

            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.3);
            color: white; white-space: nowrap; font-size: 18px;

    </style>

<body>

    <div id="start-screen">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="1.5" style="margin-bottom:20px;">
            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 16V12M12 8H12.01" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 style="margin: 0; letter-spacing: 1px;">True 3D World Lock</h2>
        <p style="opacity: 0.7; text-align: center; max-width: 320px; line-height: 1.6; margin-top: 15px;">
            The window is anchored into reality.<br>
            If you walk away, tap Recenter.
        </p>
        <button class="launch-btn" onclick="initAR()">Start Spatial OS</button>
    </div>

    <div id="toast">🎵 Playing Song</div>
    
    <button id="recenter-btn" onclick="recenterAR()">Recenter View</button>

    <video class="video-background" playsinline autoplay muted></video>
    
    <div id="scene">
        <div id="world">
            <div id="bubble">
                <div class="header drag-zone">
                    <div class="drag-pill"></div>
                    <h3>Library</h3>
                    <p>Pinch here to drag</p>
                </div>
                <div class="song-list drag-zone" id="songList"></div>
            </div>
        </div>
    </div>

    <canvas class="hand-overlay"></canvas>
    <div id="ar-cursor"></div>

    <script>
        const videoElement = document.querySelector('.video-background');
        const canvasElement = document.querySelector('.hand-overlay');
        const canvasCtx = canvasElement.getContext('2d');
        const worldElement = document.getElementById('world');
        const bubble = document.getElementById('bubble');
        const songList = document.getElementById('songList');
        const cursor = document.getElementById('ar-cursor');
        const startScreen = document.getElementById('start-screen');
        const toast = document.getElementById('toast');
        const recenterBtn = document.getElementById('recenter-btn');

        // --- TRUE 3D SPATIAL SYSTEM ---
        let baseAlpha = 0, baseBeta = 0, baseGamma = 0;
        let isCalibrated = false;
        
        let targetRotX = 0, targetRotY = 0, targetRotZ = 0;
        let currentRotX = 0, currentRotY = 0, currentRotZ = 0;
        
        let bubbleX = 0; // Starts strictly centered
        let bubbleY = 0; 

        // --- SMOOTH CURSOR ---
        let smoothCursorX = window.innerWidth / 2;
        let smoothCursorY = window.innerHeight / 2;
        
        // --- GESTURES ---
        let isPinching = false;
        let pinchStartX = 0, pinchStartY = 0;
        let pinchStartTime = 0;
        let activeAction = null; 
        let initialBubbleX = 0, initialBubbleY = 0;
        let initialScrollTop = 0;

        // Populate Songs
        const artists = ["Kendrick Lamar", "Malcolm Todd", "Laufey", "Steve Lacy", "Treehouse", "Frank Ocean", "Tyler, The Creator", "SZA", "Childish Gambino", "Mac DeMarco"];
        const tracks = ["Money Trees", "Room Service", "Valentine", "Dark Red", "Evergreen", "Pink + White", "EARFQUAKE", "Kill Bill", "Redbone", "Chamber Of Reflection"];
        
        for (let i = 1; i <= 500; i++) {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.dataset.title = tracks[i % tracks.length];
            div.dataset.artist = artists[i % artists.length];
            div.innerHTML = `
                <span class="song-title">${div.dataset.title}</span>
                <span class="song-artist">${div.dataset.artist}</span>
            `;
            songList.appendChild(div);
        }

        // --- GYROSCOPE (The Spatial Lock) ---
        function handleOrientation(e) {
            if (!isCalibrated) { 
                baseAlpha = e.alpha || 0; 
                baseBeta = e.beta || 0; 
                baseGamma = e.gamma || 0; 
                isCalibrated = true; 
            }
            
            let dA = (e.alpha || 0) - baseAlpha;
            let dB = (e.beta || 0) - baseBeta;
            let dG = (e.gamma || 0) - baseGamma;
            
            if (dA > 180) dA -= 360; if (dA < -180) dA += 360;
            
            // Map reality to the 3D Engine
            // Turning phone right (alpha changes) spins world left.
            if (e.alpha !== null) {
                targetRotX = -dB;  
                targetRotY = dA;   
                targetRotZ = -dG;  
            } else {
                targetRotX = -dB;  
                targetRotY = -dG; 
                targetRotZ = 0;    
            }
        }

        function recenterAR() {
            isCalibrated = false; 
            bubbleX = 0;
            bubbleY = 0;
        }

        // --- RENDER ENGINE ---
        function animate3D() {
            // HIGH speed lerp (0.4) removes Slop entirely but keeps it anti-jittered
            currentRotX += (targetRotX - currentRotX) * 0.4;
            currentRotY += (targetRotY - currentRotY) * 0.4;
            currentRotZ += (targetRotZ - currentRotZ) * 0.4;

            // Rotate the entire invisible 3D room opposite to the phone
            worldElement.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg) rotateZ(${currentRotZ}deg)`;
            
            // Move the bubble inside the 3D room
            bubble.style.transform = `translate(-50%, -50%) translate3d(${bubbleX}px, ${bubbleY}px, -600px)`;
            
            requestAnimationFrame(animate3D);
        }

        function showToast(title, artist) {
            toast.innerHTML = `<span style="color:#00ffcc; margin-right:8px;">▶</span> <b>${title}</b> <span style="opacity:0.6; margin-left:6px;">by ${artist}</span>`;
            toast.style.top = "50px";
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => { toast.style.top = "-100px"; }, 3500);
        }

        // --- LASER POINTER TRACKING ---
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                cursor.style.display = "block";
                const landmarks = results.multiHandLandmarks[0];
                
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.2)', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: 'rgba(0, 255, 204, 0.8)', lineWidth: 0, radius: 3});

                const index = landmarks[8];
                const thumb = landmarks[4];
                
                const rawX = index.x * window.innerWidth;
                const rawY = index.y * window.innerHeight;

                smoothCursorX += (rawX - smoothCursorX) * 0.35;
                smoothCursorY += (rawY - smoothCursorY) * 0.35;

                cursor.style.left = smoothCursorX + 'px';
                cursor.style.top = smoothCursorY + 'px';

                const currentDist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                const pinchThreshold = isPinching ? 0.055 : 0.040; 
                const currentlyPinching = currentDist < pinchThreshold; 

                // 3D Raycaster (Natively understands the skewed CSS 3D Space)
                cursor.style.pointerEvents = 'none'; 
                const hitElement = document.elementFromPoint(smoothCursorX, smoothCursorY);

                document.querySelectorAll('.ar-hover').forEach(el => el.classList.remove('ar-hover'));
                if (hitElement && hitElement.closest('.song-item') && !isPinching) {
                    hitElement.closest('.song-item').classList.add('ar-hover');
                }

                // ================== GESTURES ==================
                if (currentlyPinching && !isPinching) {
                    isPinching = true;
                    cursor.classList.add('pinching');
                    pinchStartX = smoothCursorX;
                    pinchStartY = smoothCursorY;
                    pinchStartTime = Date.now();

                    if (hitElement) {
                        if (hitElement.closest('.header')) {
                            activeAction = 'drag';
                            bubble.classList.add('bubble-dragging'); 
                            initialBubbleX = bubbleX;
                            initialBubbleY = bubbleY;
                        } else if (hitElement.closest('.song-list')) {
                            activeAction = 'scroll';
                            songList.classList.add('list-scrolling'); 
                            initialScrollTop = songList.scrollTop;
                        }
                    }
                } 
                else if (currentlyPinching && isPinching) {
                    const deltaX = smoothCursorX - pinchStartX;
                    const deltaY = smoothCursorY - pinchStartY;

                    if (activeAction === 'drag') {
                        // 1.6x multiplier because the window is pushed deep (-600px) into 3D space
                        bubbleX = initialBubbleX + (deltaX * 1.6);
                        bubbleY = initialBubbleY + (deltaY * 1.6);
                    } else if (activeAction === 'scroll') {
                        songList.scrollTop = initialScrollTop - (deltaY * 1.5);
                    }
                } 
                else if (!currentlyPinching && isPinching) {
                    isPinching = false;
                    cursor.classList.remove('pinching');
                    bubble.classList.remove('bubble-dragging');
                    songList.classList.remove('list-scrolling');
                    
                    const pinchDuration = Date.now() - pinchStartTime;
                    const deltaMath = Math.hypot(smoothCursorX - pinchStartX, smoothCursorY - pinchStartY);

                    if (activeAction !== 'drag' && pinchDuration < 400 && deltaMath < 30) {
                        if (hitElement && hitElement.closest('.song-item')) {
                            const song = hitElement.closest('.song-item');
                            song.style.background = "rgba(0, 255, 204, 0.4)";
                            setTimeout(() => song.style.background = "", 250);
                            showToast(song.dataset.title, song.dataset.artist);
                        }
                    }
                    activeAction = null;
                }
            } else {
                cursor.style.display = "none";
                isPinching = false;
                activeAction = null;
                cursor.classList.remove('pinching');
                bubble.classList.remove('bubble-dragging');
                songList.classList.remove('list-scrolling');
            }
            canvasCtx.restore();
        }

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- SYSTEM BOOT ---
        async function initAR() {
            startScreen.innerHTML = "<h3>Generating Spatial Anchors...</h3><p>Ensure back camera is clear.</p>";

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } catch(e) { console.log(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation); 
            }

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85, minTrackingConfidence: 0.85 });
            hands.onResults(onResults);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    startScreen.style.display = "none";
                    recenterBtn.style.display = "block"; // Show recenter button
                    animate3D();
                    bubble.style.display = "flex";
                    
                    async function processVideoFrame() {
                        if (!videoElement.paused && !videoElement.ended) { await hands.send({image: videoElement}); }
                        if ('requestVideoFrameCallback' in videoElement) { videoElement.requestVideoFrameCallback(processVideoFrame); } 
                        else { requestAnimationFrame(processVideoFrame); }
                    }
                    processVideoFrame();
                };
                
            } catch (err) {
                console.error("Camera Error:", err);
                startScreen.innerHTML = "<h3 style='color:red'>Camera Access Denied</h3><p>Ensure rear camera permissions are active.</p>";
            }
        }
    </script>
</body>
</html>

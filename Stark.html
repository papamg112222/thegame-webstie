    <style>

<body>

    <div id="start-screen">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="1.5" style="margin-bottom:20px;">
            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 16V12M12 8H12.01" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 style="margin: 0; letter-spacing: 1px;">Stabilized AR Mode</h2>
        <p style="opacity: 0.7; text-align: center; max-width: 320px; line-height: 1.6; margin-top: 15px;">
            Smooth tracking enabled.<br>
            Point to aim. Pinch to interact.<br>
            Make sure your room is well lit.
        </p>
        <button class="launch-btn" onclick="initAR()">Launch Experience</button>
    </div>

    <div id="toast">🎵 Playing Song</div>

    <video class="video-background" playsinline autoplay muted></video>
    
    <div id="world-container">
        <div id="bubble">
            <div class="header drag-zone">
                <h3>Music Library</h3>
                <p>Air-Pinch header to move</p>
            </div>
            <div class="song-list drag-zone" id="songList"></div>
        </div>
    </div>

    <canvas class="hand-overlay"></canvas>
    <div id="ar-cursor"></div>

    <script>
        const videoElement = document.querySelector('.video-background');
        const canvasElement = document.querySelector('.hand-overlay');
        const canvasCtx = canvasElement.getContext('2d');
        const worldContainer = document.getElementById('world-container');
        const bubble = document.getElementById('bubble');
        const songList = document.getElementById('songList');
        const cursor = document.getElementById('ar-cursor');
        const startScreen = document.getElementById('start-screen');
        const toast = document.getElementById('toast');

        // --- 1. STABILIZED 3D PARALLAX STATE ---
        let baseGamma = 0, baseBeta = 0;
        let isCalibrated = false;
        
        // Target values (Where the phone is actually pointing)
        let targetParX = 0, targetParY = 0, targetRotX = 0, targetRotY = 0;
        // Current values (Smoothed over time to prevent jitter)
        let currentParX = 0, currentParY = 0, currentRotX = 0, currentRotY = 0;
        
        let bubbleX = window.innerWidth / 2 - 170; 
        let bubbleY = window.innerHeight / 2 - 260;

        // --- 2. STABILIZED CURSOR STATE ---
        let smoothCursorX = window.innerWidth / 2;
        let smoothCursorY = window.innerHeight / 2;
        
        // Gestures
        let isPinching = false;
        let pinchStartX = 0, pinchStartY = 0;
        let pinchStartTime = 0;
        let activeAction = null; 
        let initialBubbleX = 0, initialBubbleY = 0;
        let initialScrollTop = 0;

        // Generate Songs
        const artists = ["Kendrick Lamar", "Malcolm Todd", "Laufey", "Steve Lacy", "Treehouse", "Frank Ocean", "Tyler, The Creator", "SZA", "Childish Gambino", "Mac DeMarco"];
        const tracks = ["Money Trees", "Room Service", "Valentine", "Dark Red", "Evergreen", "Pink + White", "EARFQUAKE", "Kill Bill", "Redbone", "Chamber Of Reflection"];
        
        for (let i = 1; i <= 500; i++) {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.dataset.title = tracks[i % tracks.length];
            div.dataset.artist = artists[i % artists.length];
            div.innerHTML = `
                <span class="song-title">${div.dataset.title}</span>
                <span class="song-artist">${div.dataset.artist}</span>
            `;
            songList.appendChild(div);
        }

        // --- GYROSCOPE LOGIC ---
        function handleOrientation(e) {
            if (!isCalibrated) { baseGamma = e.gamma; baseBeta = e.beta; isCalibrated = true; }
            let dG = e.gamma - baseGamma; let dB = e.beta - baseBeta;
            
            // Clamp extreme values
            if (dG > 60) dG = 60; if (dG < -60) dG = -60;
            if (dB > 60) dB = 60; if (dB < -60) dB = -60;
            
            targetParX = -dG * 12; 
            targetParY = -dB * 12;
            targetRotY = dG * 0.25; 
            targetRotX = -dB * 0.25;
        }

        // --- ANIMATION LOOP (The Magic Jitter Fixer) ---
        function animate3D() {
            // HIGH SMOOTHING: We only move 8% of the way to the target each frame.
            // This completely eliminates gyroscope vibrations and makes it glide.
            currentParX += (targetParX - currentParX) * 0.08;
            currentParY += (targetParY - currentParY) * 0.08;
            currentRotX += (targetRotX - currentRotX) * 0.08;
            currentRotY += (targetRotY - currentRotY) * 0.08;

            worldContainer.style.transform = `translate3d(${currentParX}px, ${currentParY}px, 0) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            bubble.style.transform = `translate3d(${bubbleX}px, ${bubbleY}px, 0)`;
            
            requestAnimationFrame(animate3D);
        }

        function showToast(title, artist) {
            toast.innerHTML = `<span style="color:#00ffcc; margin-right:8px;">▶</span> <b>${title}</b> <span style="opacity:0.6; margin-left:4px;">by ${artist}</span>`;
            toast.style.top = "45px";
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => { toast.style.top = "-100px"; }, 3000);
        }

        // --- TRACKING LOGIC ---
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                cursor.style.display = "block";
                const landmarks = results.multiHandLandmarks[0];
                
                // Draw elegant, thin wireframe
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.15)', lineWidth: 1.5});
                drawLandmarks(canvasCtx, landmarks, {color: 'rgba(0, 255, 204, 0.6)', lineWidth: 0, radius: 2.5});

                const index = landmarks[8];
                const thumb = landmarks[4];
                
                // Raw Screen Coordinates
                const rawX = index.x * window.innerWidth;
                const rawY = index.y * window.innerHeight;

                // CURSOR SMOOTHING (Interpolation removes AI hand shaking)
                smoothCursorX += (rawX - smoothCursorX) * 0.35;
                smoothCursorY += (rawY - smoothCursorY) * 0.35;

                cursor.style.left = smoothCursorX + 'px';
                cursor.style.top = smoothCursorY + 'px';

                // Hysteresis threshold to prevent flickering pinch state
                const currentDist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                const pinchThreshold = isPinching ? 0.055 : 0.040; // Easier to hold once pinched
                const currentlyPinching = currentDist < pinchThreshold; 

                // Raycast using smoothed cursor
                cursor.style.pointerEvents = 'none'; 
                const hitElement = document.elementFromPoint(smoothCursorX, smoothCursorY);

                document.querySelectorAll('.ar-hover').forEach(el => el.classList.remove('ar-hover'));
                if (hitElement && hitElement.closest('.song-item') && !isPinching) {
                    hitElement.closest('.song-item').classList.add('ar-hover');
                }

                // Interactions
                if (currentlyPinching && !isPinching) {
                    isPinching = true;
                    cursor.classList.add('pinching');
                    pinchStartX = smoothCursorX;
                    pinchStartY = smoothCursorY;
                    pinchStartTime = Date.now();

                    if (hitElement) {
                        const header = hitElement.closest('.header');
                        const list = hitElement.closest('.song-list');
                        
                        if (header) {
                            activeAction = 'drag';
                            initialBubbleX = bubbleX;
                            initialBubbleY = bubbleY;
                        } else if (list) {
                            activeAction = 'scroll';
                            initialScrollTop = songList.scrollTop;
                        }
                    }
                } 
                else if (currentlyPinching && isPinching) {
                    const deltaX = smoothCursorX - pinchStartX;
                    const deltaY = smoothCursorY - pinchStartY;

                    if (activeAction === 'drag') {
                        bubbleX = initialBubbleX + deltaX;
                        bubbleY = initialBubbleY + deltaY;
                    } else if (activeAction === 'scroll') {
                        songList.scrollTop = initialScrollTop - (deltaY * 2.0);
                    }
                } 
                else if (!currentlyPinching && isPinching) {
                    isPinching = false;
                    cursor.classList.remove('pinching');
                    
                    const pinchDuration = Date.now() - pinchStartTime;
                    const deltaMath = Math.hypot(smoothCursorX - pinchStartX, smoothCursorY - pinchStartY);

                    if (pinchDuration < 400 && deltaMath < 30) {
                        if (hitElement && hitElement.closest('.song-item')) {
                            const song = hitElement.closest('.song-item');
                            song.style.background = "rgba(0, 255, 204, 0.3)";
                            setTimeout(() => song.style.background = "", 250);
                            showToast(song.dataset.title, song.dataset.artist);
                        }
                    }
                    activeAction = null;
                }
            } else {
                cursor.style.display = "none";
                isPinching = false;
                activeAction = null;
                cursor.classList.remove('pinching');
            }
            canvasCtx.restore();
        }

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Boot
        async function initAR() {
            startScreen.innerHTML = "<h3>Calibrating Stability...</h3><p>Ensure back camera isn't covered.</p>";

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } catch(e) { console.log(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation); 
            }

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            // INCREASED CONFIDENCE FOR MAXIMUM STABILITY
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.85,  // Strict detection
                minTrackingConfidence: 0.85    // Strict tracking removes AI shaking
            });
            hands.onResults(onResults);

            try {
                // FORCE REAR CAMERA
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    startScreen.style.display = "none";
                    animate3D();
                    bubble.style.display = "flex";
                    
                    async function processVideoFrame() {
                        if (!videoElement.paused && !videoElement.ended) {
                            await hands.send({image: videoElement});
                        }
                        if ('requestVideoFrameCallback' in videoElement) {
                            videoElement.requestVideoFrameCallback(processVideoFrame);
                        } else {
                            requestAnimationFrame(processVideoFrame);
                        }
                    }
                    processVideoFrame();
                };
                
            } catch (err) {
                console.error("Camera Error:", err);
                startScreen.innerHTML = "<h3 style='color:red'>Camera Access Denied</h3><p>Ensure rear camera permissions are active.</p>";
            }
        }
    </script>
</body>
</html>

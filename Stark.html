    <script>
        // --- DOM Elements ---
        const procVideo = document.getElementById('hidden-processor');
        const vidLeft = document.getElementById('video-left'), vidRight = document.getElementById('video-right');
        const ctxLeft = document.getElementById('canvas-left').getContext('2d'), ctxRight = document.getElementById('canvas-right').getContext('2d');
        const worldLeft = document.getElementById('world-left'), worldRight = document.getElementById('world-right');
        const bubbleLeft = document.getElementById('bubble-left'), bubbleRight = document.getElementById('bubble-right');
        const listLeft = document.getElementById('songList-left'), listRight = document.getElementById('songList-right');
        const curLeft = document.getElementById('cursor-left'), curRight = document.getElementById('cursor-right');
        const startScreen = document.getElementById('start-screen'), toast = document.getElementById('toast'), toastText = document.getElementById('toast-text');

        // --- YOUTUBE API ---
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '10', width: '10', videoId: '', 
                playerVars: { 'playsinline': 1, 'controls': 0 },
            });
        }

        // --- TRUE INVERSE 3D SPATIAL SYSTEM ---
        let baseAlpha = 0, baseBeta = 0, baseGamma = 0, isCalibrated = false;
        let targetRotX = 0, targetRotY = 0, targetRotZ = 0;
        let currentRotX = 0, currentRotY = 0, currentRotZ = 0;
        
        let bubbleX = 0, bubbleY = 0; 
        let bubbleZ = -500; // Base Z-Depth distance
        let targetBubbleZ = -500;

        let smoothCursorX = window.innerWidth / 4, smoothCursorY = window.innerHeight / 2;
        
        // --- GESTURE STATE ---
        let isPinching = false;
        let pinchStartX = 0, pinchStartY = 0, pinchStartTime = 0;
        let activeAction = null; 
        let initialBubbleX = 0, initialBubbleY = 0, initialBubbleZ = 0, initialScrollTop = 0;
        let initialHandSize = 0; // Tracks arm extension for pushing/pulling

        // --- MUSIC LIBRARY POPULATION ---
        const library = [
            { artist: "Kendrick Lamar", title: "Money Trees", ytid: "smqhSl0u_sI" },
            { artist: "Malcolm Todd", title: "Room Service", ytid: "3vY4rN9YpX8" },
            { artist: "Laufey", title: "Valentine", ytid: "xKkU2N25d80" },
            { artist: "Steve Lacy", title: "Bad Habit", ytid: "VF-FGf_GlG0" },
            { artist: "Frank Ocean", title: "Pink + White", ytid: "uzS3WG6__G4" },
            { artist: "Tyler, The Creator", title: "EARFQUAKE", ytid: "HmAsUQEFYGI" },
            { artist: "SZA", title: "Good Days", ytid: "oh64haEP9g8" },
            { artist: "Childish Gambino", title: "Redbone", ytid: "Kp7eSUU9oy8" },
            { artist: "Mac DeMarco", title: "Chamber Of Reflection", ytid: "NY8IS0ssNXc" },
            { artist: "Treehouse", title: "Alex G", ytid: "M2hU-wJvWfI" }
        ];
        
        function populateList(listElement) {
            for (let i = 0; i < 200; i++) {
                const track = library[i % library.length];
                const div = document.createElement('div');
                div.className = 'song-item';
                div.dataset.index = i;
                div.dataset.title = track.title; div.dataset.artist = track.artist; div.dataset.ytid = track.ytid;
                div.innerHTML = `<span class="song-title">${track.title}</span><span class="song-artist">${track.artist}</span>`;
                listElement.appendChild(div);
            }
        }
        populateList(listLeft); populateList(listRight);

        // --- GYROSCOPE (INVERSE LOCK) ---
        function handleOrientation(e) {
            if (!isCalibrated) { 
                baseAlpha = e.alpha || 0; baseBeta = e.beta || 0; baseGamma = e.gamma || 0; 
                isCalibrated = true; 
            }
            let dA = (e.alpha || 0) - baseAlpha; let dB = (e.beta || 0) - baseBeta; let dG = (e.gamma || 0) - baseGamma;
            if (dA > 180) dA -= 360; if (dA < -180) dA += 360;
            
            if (e.alpha !== null) {
                targetRotY = -dA; targetRotX = -dB; targetRotZ = -dG;  
            }
        }

        function recenterAR() { 
            isCalibrated = false; bubbleX = 0; bubbleY = 0; 
            targetBubbleZ = -500; // Reset depth
        }

        // --- RENDER ENGINE (Z-DEPTH & STEREOSCOPIC OFFSET) ---
        function animate3D() {
            currentRotX += (targetRotX - currentRotX) * 0.5;
            currentRotY += (targetRotY - currentRotY) * 0.5;
            currentRotZ += (targetRotZ - currentRotZ) * 0.5;
            
            // Smoothly interpolate Z-depth Push/Pull
            bubbleZ += (targetBubbleZ - bubbleZ) * 0.2;

            const rotTransform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg) rotateZ(${currentRotZ}deg)`;
            worldLeft.style.transform = rotTransform;
            worldRight.style.transform = rotTransform;
            
            // Apply Dynamic Z-Depth 
            // Parallax offset (15px) scales naturally with Z-depth thanks to CSS perspective!
            const baseBubbleTransform = `translate(-50%, -50%) translate3d(${bubbleX}px, ${bubbleY}px, ${bubbleZ}px)`;
            
            bubbleLeft.style.transform = baseBubbleTransform + ` translateX(15px)`;
            bubbleRight.style.transform = baseBubbleTransform + ` translateX(-15px)`;
            
            requestAnimationFrame(animate3D);
        }

        function playSong(element) {
            const index = element.dataset.index;
            const itemsLeft = listLeft.children; const itemsRight = listRight.children;
            for(let i=0; i<itemsLeft.length; i++) {
                itemsLeft[i].classList.remove('playing'); itemsRight[i].classList.remove('playing');
            }
            itemsLeft[index].classList.add('playing'); itemsRight[index].classList.add('playing');

            if(ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(element.dataset.ytid);

            toastText.innerHTML = `<b>${element.dataset.title}</b> <span style="opacity:0.7; margin-left:8px;">${element.dataset.artist}</span>`;
            toast.style.top = "60px";
        }

        // --- TRACKING ENGINE ---
        function onResults(results) {
            const eyeWidth = window.innerWidth / 2;
            const eyeHeight = window.innerHeight;
            
            ctxLeft.canvas.width = eyeWidth; ctxLeft.canvas.height = eyeHeight;
            ctxRight.canvas.width = eyeWidth; ctxRight.canvas.height = eyeHeight;
            ctxLeft.clearRect(0, 0, eyeWidth, eyeHeight); ctxRight.clearRect(0, 0, eyeWidth, eyeHeight);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                curLeft.style.display = "block"; curRight.style.display = "block";
                const landmarks = results.multiHandLandmarks[0];
                
                drawConnectors(ctxLeft, landmarks, HAND_CONNECTIONS, {color: 'rgba(255,255,255,0.2)', lineWidth: 2});
                drawLandmarks(ctxLeft, landmarks, {color: '#00ffcc', lineWidth: 0, radius: 3});
                drawConnectors(ctxRight, landmarks, HAND_CONNECTIONS, {color: 'rgba(255,255,255,0.2)', lineWidth: 2});
                drawLandmarks(ctxRight, landmarks, {color: '#00ffcc', lineWidth: 0, radius: 3});

                const index = landmarks[8];
                const thumb = landmarks[4];
                const wrist = landmarks[0];
                const middleBase = landmarks[9];
                
                // --- 1. CALCULATE HAND DISTANCE (For Push/Pull Z-Depth) ---
                // Distance from wrist to middle finger knuckle changes based on how far your arm is extended.
                const currentHandSize = Math.hypot(wrist.x - middleBase.x, wrist.y - middleBase.y);

                const rawX = index.x * eyeWidth; const rawY = index.y * eyeHeight;
                smoothCursorX += (rawX - smoothCursorX) * 0.35; smoothCursorY += (rawY - smoothCursorY) * 0.35;

                curLeft.style.left = smoothCursorX + 'px'; curLeft.style.top = smoothCursorY + 'px';
                curRight.style.left = smoothCursorX + 'px'; curRight.style.top = smoothCursorY + 'px';

                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                const currentlyPinching = dist < (isPinching ? 0.055 : 0.040);

                curLeft.style.pointerEvents = 'none'; 
                const hitElement = document.elementFromPoint(smoothCursorX, smoothCursorY);

                document.querySelectorAll('.ar-hover').forEach(el => el.classList.remove('ar-hover'));
                if (hitElement && hitElement.closest('.song-item') && !isPinching) {
                    const songIndex = hitElement.closest('.song-item').dataset.index;
                    listLeft.children[songIndex].classList.add('ar-hover');
                    listRight.children[songIndex].classList.add('ar-hover');
                }

                // ================== PUSH/PULL GESTURES ==================
                if (currentlyPinching && !isPinching) {
                    isPinching = true;
                    curLeft.classList.add('pinching'); curRight.classList.add('pinching');
                    pinchStartX = smoothCursorX; pinchStartY = smoothCursorY; pinchStartTime = Date.now();
                    
                    // Lock in the baseline hand size to measure pushing/pulling
                    initialHandSize = currentHandSize; 

                    if (hitElement) {
                        if (hitElement.closest('.header')) {
                            activeAction = 'drag';
                            bubbleLeft.classList.add('bubble-dragging'); bubbleRight.classList.add('bubble-dragging');
                            initialBubbleX = bubbleX; initialBubbleY = bubbleY;
                            initialBubbleZ = bubbleZ; 
                        } else if (hitElement.closest('.song-list')) {
                            activeAction = 'scroll';
                            listLeft.classList.add('list-scrolling'); listRight.classList.add('list-scrolling');
                            initialScrollTop = listLeft.scrollTop;
                        }
                    }
                } 
                else if (currentlyPinching && isPinching) {
                    const deltaX = smoothCursorX - pinchStartX;
                    const deltaY = smoothCursorY - pinchStartY;

                    if (activeAction === 'drag') {
                        // X & Y Dragging
                        bubbleX = initialBubbleX + (deltaX * 1.8);
                        bubbleY = initialBubbleY + (deltaY * 1.8);
                        
                        // --- Z-DEPTH PUSH/PULL ---
                        // If currentHandSize is SMALLER than initial, you pushed your arm AWAY (-Z)
                        // If currentHandSize is LARGER, you pulled it CLOSER (+Z)
                        const sizeDiff = currentHandSize - initialHandSize;
                        
                        // Multiplier to convert hand scale delta into deep Z-space translation
                        let newZ = initialBubbleZ + (sizeDiff * 9000); 
                        
                        // Clamp bounds so you don't push it too far or pull it through the camera
                        if (newZ > -250) newZ = -250;   // Max Close (Huge)
                        if (newZ < -1500) newZ = -1500; // Max Far (Tiny)
                        
                        targetBubbleZ = newZ;

                    } else if (activeAction === 'scroll') {
                        const newScroll = initialScrollTop - (deltaY * 8.0);
                        listLeft.scrollTop = newScroll; listRight.scrollTop = newScroll;
                    }
                } 
                else if (!currentlyPinching && isPinching) {
                    isPinching = false;
                    curLeft.classList.remove('pinching'); curRight.classList.remove('pinching');
                    bubbleLeft.classList.remove('bubble-dragging'); bubbleRight.classList.remove('bubble-dragging');
                    listLeft.classList.remove('list-scrolling'); listRight.classList.remove('list-scrolling');
                    
                    const pinchTime = Date.now() - pinchStartTime;
                    const moveDist = Math.hypot(smoothCursorX - pinchStartX, smoothCursorY - pinchStartY);

                    if (activeAction !== 'drag' && pinchTime < 400 && moveDist < 30) {
                        if (hitElement && hitElement.closest('.song-item')) playSong(hitElement.closest('.song-item'));
                    }
                    activeAction = null;
                }
            } else {
                curLeft.style.display = "none"; curRight.style.display = "none";
                isPinching = false; activeAction = null;
                curLeft.classList.remove('pinching'); curRight.classList.remove('pinching');
                bubbleLeft.classList.remove('bubble-dragging'); bubbleRight.classList.remove('bubble-dragging');
                listLeft.classList.remove('list-scrolling'); listRight.classList.remove('list-scrolling');
            }
        }

        // --- SYSTEM BOOT ---
        async function initVR() {
            startScreen.innerHTML = "<h3>Booting VR Engine...</h3><p>Please wait.</p>";
            if(ytPlayer && ytPlayer.playVideo) { ytPlayer.playVideo(); setTimeout(() => ytPlayer.pauseVideo(), 100); }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } catch(e) {}
            } else {
                window.addEventListener('deviceorientation', handleOrientation); 
            }

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85, minTrackingConfidence: 0.85 });
            hands.onResults(onResults);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                procVideo.srcObject = stream; vidLeft.srcObject = stream; vidRight.srcObject = stream;
                
                procVideo.onloadedmetadata = () => {
                    procVideo.play();
                    startScreen.style.display = "none";
                    document.getElementById('recenter-btn').style.display = "block";
                    animate3D();
                    
                    async function loop() {
                        if (!procVideo.paused && !procVideo.ended) await hands.send({image: procVideo});
                        if ('requestVideoFrameCallback' in procVideo) procVideo.requestVideoFrameCallback(loop); 
                        else requestAnimationFrame(loop);
                    }
                    loop();
                };
            } catch (err) {
                startScreen.innerHTML = "<h3 style='color:red'>Camera Access Denied</h3><p>Check permissions.</p>";
            }
        }
    </script>

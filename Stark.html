
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Spatial OS - Smooth Wave Edition</title>
    
    <!-- MediaPipe AI Models -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* =========================================
           GLOBAL RESETS & TYPOGRAPHY
        ========================================= */
        body {
            margin: 0; padding: 0; overflow: hidden; background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white; touch-action: none;
        }

        /* =========================================
           VR SIDE-BY-SIDE SPLIT CONTAINER
        ========================================= */
        #vr-container { display: flex; width: 100vw; height: 100vh; }
        .eye { width: 50vw; height: 100vh; position: relative; overflow: hidden; border-right: 1px solid #000; }
        
        .bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: fill; z-index: 0; opacity: 0.8;
        }

        #hidden-processor { display: none; }
        #yt-container { position: fixed; top: -100px; opacity: 0; pointer-events: none; }

        /* =========================================
           3D AR SCENE & WORLD ENGINE
        ========================================= */
        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            perspective: 800px; z-index: 5; pointer-events: none; 
        }

        .world {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d; transform-origin: 50% 50% 0; will-change: transform; 
        }

        /* =========================================
           THE INTERACTIVE BUBBLE WINDOW (TINTED & OPTIMIZED)
        ========================================= */
        .bubble {
            position: absolute; left: 50%; top: 50%;
            width: 320px; height: 500px;
            transform: translate(-50%, -50%) translate3d(0px, 0px, -500px) scale(1) rotateZ(0deg);
            
            /* HEAVILY OPTIMIZED TINT: Darker background, lower blur = Zero Lag */
            background: rgba(10, 15, 25, 0.90);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            
            border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 35px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 2px 20px rgba(0,255,204,0.05);
            
            display: flex; flex-direction: column; overflow: hidden;
            will-change: transform, opacity, border-radius; 
            transition: border-color 0.2s, box-shadow 0.2s; pointer-events: auto;
        }

        .bubble.bubble-dragging { 
            border-color: #00ffcc; 
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.4), inset 0 0 20px rgba(0, 255, 204, 0.2); 
        }

        /* =========================================
           AR LASER POINTER CURSOR
        ========================================= */
        .ar-cursor {
            position: absolute; width: 18px; height: 18px;
            background: rgba(255, 255, 255, 0.9); border: 2px solid #00ffcc; border-radius: 50%;
            pointer-events: none; z-index: 100; transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s, background 0.1s; box-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
            will-change: left, top; 
        }

        .ar-cursor.pinching { 
            width: 10px; height: 10px; background: #00ffcc; box-shadow: 0 0 30px #00ffcc; border-color: #fff;
        }

        .hand-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; pointer-events: none; }

        /* =========================================
           UI ELEMENTS
        ========================================= */
        .header {
            padding: 18px 20px 20px; background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            text-align: center; border-bottom: 1px solid rgba(0,255,204,0.1);
        }

        .drag-pill { width: 50px; height: 5px; background: rgba(0, 255, 204, 0.5); border-radius: 10px; margin: 0 auto 12px auto; }
        .header h3 { margin: 0; font-size: 20px; font-weight: 700; color: #fff;}
        .header p { margin: 4px 0 0; font-size: 12px; color: #00ffcc; opacity: 0.8; }

        .song-list { flex: 1; overflow-y: hidden; padding: 12px; scroll-behavior: auto; transition: background 0.2s; }
        .song-list.list-scrolling { background: rgba(0,255,204,0.03); }

        .song-item {
            padding: 16px 18px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 18px;
            font-size: 16px; transition: 0.1s; border: 1px solid transparent; display: flex; flex-direction: column;
        }
        .song-item.ar-hover { background: rgba(0,255,204,0.15); border: 1px solid rgba(0, 255, 204, 0.5); transform: scale(1.03); }
        .song-item.playing { background: rgba(0, 255, 204, 0.25); border: 1px solid #00ffcc; }
        .song-title { font-weight: 700; pointer-events: none; }
        .song-artist { font-size: 13px; color: #00ffcc; opacity: 0.9; pointer-events: none; margin-top: 4px; }

        /* =========================================
           OVERLAYS
        ========================================= */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .launch-btn {
            background: #00ffcc; color: black; border: none; padding: 18px 45px; font-size: 18px; font-weight: bold;
            border-radius: 30px; cursor: pointer; margin-top: 30px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
        }

        #recenter-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 2px solid #00ffcc; color: #00ffcc;
            padding: 10px 20px; border-radius: 30px; font-weight: 700; z-index: 100; cursor: pointer; display: none;
        }

        #toast {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 15, 25, 0.95); border: 1px solid #00ffcc; border-radius: 30px;
            padding: 15px 30px; z-index: 150; font-weight: 600; transition: top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: white; display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 50px rgba(0, 255, 204, 0.4);
        }
        
        .music-bars { display: flex; gap: 3px; height: 15px; align-items: flex-end; }
        .bar { width: 4px; background: #00ffcc; border-radius: 2px; animation: bounce 0.5s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 4px; } 100% { height: 15px; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="margin: 0; color:#00ffcc; font-size: 32px;">VR Spatial OS - Smooth Engine</h2>
        <p style="opacity: 0.8; text-align: center; max-width: 320px; line-height: 1.6; margin-top: 15px;">
            <b>Performance Boost:</b> Zero-lag tinted UI.<br><br>
            <b>The Wave Effect:</b> Wave goodbye (swipe hand left/right 3 times) to magically suck the window into your eyes.
        </p>
        <button class="launch-btn" onclick="initVR()">Boot System</button>
    </div>

    <video id="hidden-processor" playsinline autoplay muted></video>
    <div id="yt-container"><div id="player"></div></div>
    
    <div id="toast">
        <div class="music-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <span id="toast-text">Loading Audio...</span>
    </div>

    <button id="recenter-btn" onclick="recenterAR()">Recenter Room</button>

    <div id="vr-container">
        <!-- LEFT EYE DISPLAY -->
        <div class="eye" id="eye-left">
            <video class="bg-video" id="video-left" playsinline autoplay muted></video>
            <div class="scene">
                <div class="world" id="world-left">
                    <div class="bubble" id="bubble-left">
                        <div class="header drag-zone">
                            <div class="drag-pill"></div>
                            <h3>Library</h3>
                            <p>Wave goodbye to hide</p>
                        </div>
                        <div class="song-list drag-zone" id="songList-left"></div>
                    </div>
                </div>
            </div>
            <canvas class="hand-canvas" id="canvas-left"></canvas>
            <div class="ar-cursor" id="cursor-left"></div>
        </div>

        <!-- RIGHT EYE DISPLAY -->
        <div class="eye" id="eye-right">
            <video class="bg-video" id="video-right" playsinline autoplay muted></video>
            <div class="scene">
                <div class="world" id="world-right">
                    <div class="bubble" id="bubble-right">
                        <div class="header drag-zone">
                            <div class="drag-pill"></div>
                            <h3>Library</h3>
                            <p>Wave goodbye to hide</p>
                        </div>
                        <div class="song-list drag-zone" id="songList-right"></div>
                    </div>
                </div>
            </div>
            <canvas class="hand-canvas" id="canvas-right"></canvas>
            <div class="ar-cursor" id="cursor-right"></div>
        </div>
    </div>

    <script>
        /* ====================================================================
           DOM ELEMENT SELECTIONS
        ==================================================================== */
        const procVideo = document.getElementById('hidden-processor');
        const vidLeft = document.getElementById('video-left');
        const vidRight = document.getElementById('video-right');
        
        const ctxLeft = document.getElementById('canvas-left').getContext('2d');
        const ctxRight = document.getElementById('canvas-right').getContext('2d');
        
        const worldLeft = document.getElementById('world-left');
        const worldRight = document.getElementById('world-right');
        
        const bubbleLeft = document.getElementById('bubble-left');
        const bubbleRight = document.getElementById('bubble-right');
        
        const listLeft = document.getElementById('songList-left');
        const listRight = document.getElementById('songList-right');
        
        const curLeft = document.getElementById('cursor-left');
        const curRight = document.getElementById('cursor-right');
        
        const startScreen = document.getElementById('start-screen');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toast-text');

        /* ====================================================================
           YOUTUBE AUDIO API SETUP
        ==================================================================== */
        let ytPlayer;
        function onYouTubeIframeAPIReady() { 
            ytPlayer = new YT.Player('player', { height: '10', width: '10', playerVars: { 'playsinline': 1, 'controls': 0 } }); 
        }

        /* ====================================================================
           SPATIAL MATH & PHYSICS STATE VARIABLES
        ==================================================================== */
        let baseAlpha = 0, baseBeta = 0, baseGamma = 0, isCalibrated = false;
        let targetRotX = 0, targetRotY = 0, targetRotZ = 0;
        let currentRotX = 0, currentRotY = 0, currentRotZ = 0;
        
        let bubbleX = 0, bubbleY = 0;
        let bubbleZ = -500, targetBubbleZ = -500;
        
        let smoothCursorX = window.innerWidth / 4, smoothCursorY = window.innerHeight / 2;
        
        let isPinching = false, pinchStartX = 0, pinchStartY = 0;
        let activeAction = null, initialBubbleX = 0, initialBubbleY = 0, initialBubbleZ = 0, initialScrollTop = 0;
        let initialPalmSize = 0; 

        /* ====================================================================
           NEW WAVE TRACKER ENGINE (Wave Goodbye to Melt)
        ==================================================================== */
        let isSuckedIn = false;          
        let savedBubbleZ = -500;         
        
        let currentScale = 1.0; let targetScale = 1.0;
        let currentOpacity = 1.0; let targetOpacity = 1.0;
        let currentSpin = 0; let targetSpin = 0; // Adds a cool spin effect when sucked in

        // Wave tracking variables
        let wavePhase = 0;          // 0: none, 1: moving left, 2: moving right
        let waveCount = 0;          // Number of directional changes
        let lastWaveExtremumX = 0;  // Last major point
        let lastWaveTime = 0;       // Timeout timer

        /* ====================================================================
           MUSIC LIBRARY GENERATION
        ==================================================================== */
        const library = [
            { artist: "Kendrick Lamar", title: "Money Trees", ytid: "smqhSl0u_sI" },
            { artist: "Malcolm Todd", title: "Room Service", ytid: "3vY4rN9YpX8" },
            { artist: "Laufey", title: "Valentine", ytid: "xKkU2N25d80" },
            { artist: "Steve Lacy", title: "Bad Habit", ytid: "VF-FGf_GlG0" },
            { artist: "Frank Ocean", title: "Pink + White", ytid: "uzS3WG6__G4" },
            { artist: "Tyler, The Creator", title: "EARFQUAKE", ytid: "HmAsUQEFYGI" },
            { artist: "SZA", title: "Good Days", ytid: "oh64haEP9g8" },
            { artist: "Childish Gambino", title: "Redbone", ytid: "Kp7eSUU9oy8" }
        ];
        
        function populateList(listElement) {
            for (let i = 0; i < 200; i++) {
                const track = library[i % library.length];
                const div = document.createElement('div');
                div.className = 'song-item'; div.dataset.index = i; div.dataset.ytid = track.ytid;
                div.innerHTML = `<span class="song-title">${track.title}</span><span class="song-artist">${track.artist}</span>`;
                listElement.appendChild(div);
            }
        }
        populateList(listLeft); populateList(listRight);

        /* ====================================================================
           THE GYROSCOPE (True Inverse Logic)
        ==================================================================== */
        function handleOrientation(e) {
            if (!isCalibrated) { baseAlpha = e.alpha || 0; baseBeta = e.beta || 0; baseGamma = e.gamma || 0; isCalibrated = true; }
            
            let dA = (e.alpha || 0) - baseAlpha; let dB = (e.beta || 0) - baseBeta; let dG = (e.gamma || 0) - baseGamma;
            if (dA > 180) { dA -= 360; } if (dA < -180) { dA += 360; }

            let angle = (screen.orientation || {}).angle || window.orientation || 0;
            let pitch, yaw, roll;

            if (angle === 90) { pitch = dG; yaw = dA; roll = dB; } 
            else if (angle === -90 || angle === 270) { pitch = -dG; yaw = dA; roll = -dB; } 
            else { pitch = dB; yaw = dA; roll = dG; }

            // TRUE INVERSE ROTATION: Both Pitch and Yaw are inverted
            targetRotX = -pitch; 
            targetRotY = -yaw;   
            targetRotZ = -roll;  
        }

        function recenterAR() { 
            isCalibrated = false; bubbleX = 0; bubbleY = 0; 
            if (!isSuckedIn) { targetBubbleZ = -500; savedBubbleZ = -500; }
        }

        function showToastMessage(msg) {
            toastText.innerHTML = msg; toast.style.top = "60px";
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => { toast.style.top = "-150px"; }, 3000);
        }

        /* ====================================================================
           SMOOTH 3D RENDER ENGINE (Physics, Parallax, and Melting)
        ==================================================================== */
        function animate3D() {
            // BUTTERY SMOOTH LERP (0.25 removes jitter but feels responsive)
            currentRotX += (targetRotX - currentRotX) * 0.25;
            currentRotY += (targetRotY - currentRotY) * 0.25;
            currentRotZ += (targetRotZ - currentRotZ) * 0.25;
            
            bubbleZ += (targetBubbleZ - bubbleZ) * 0.15; 
            currentScale += (targetScale - currentScale) * 0.15;
            currentOpacity += (targetOpacity - currentOpacity) * 0.15;
            currentSpin += (targetSpin - currentSpin) * 0.10;

            const rotTransform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg) rotateZ(${currentRotZ}deg)`;
            worldLeft.style.transform = rotTransform; 
            worldRight.style.transform = rotTransform;
            
            // Render highly optimized melt effects
            let meltRadius = 35 + ((1.0 - currentScale) * 145); 

            // Left Eye
            bubbleLeft.style.transform = `translate(-50%, -50%) translate3d(${bubbleX}px, ${bubbleY}px, ${bubbleZ}px) translateX(15px) scale(${currentScale}) rotateZ(${currentSpin}deg)`;
            bubbleLeft.style.opacity = currentOpacity;
            bubbleLeft.style.borderRadius = `${meltRadius}px`;

            // Right Eye
            bubbleRight.style.transform = `translate(-50%, -50%) translate3d(${bubbleX}px, ${bubbleY}px, ${bubbleZ}px) translateX(-15px) scale(${currentScale}) rotateZ(${currentSpin}deg)`;
            bubbleRight.style.opacity = currentOpacity;
            bubbleRight.style.borderRadius = `${meltRadius}px`;
            
            requestAnimationFrame(animate3D);
        }

        function playSong(element) {
            const index = element.dataset.index;
            const title = element.querySelector('.song-title').innerText;
            const artist = element.querySelector('.song-artist').innerText;

            Array.from(listLeft.children).forEach(el => el.classList.remove('playing')); Array.from(listRight.children).forEach(el => el.classList.remove('playing'));
            listLeft.children[index].classList.add('playing'); listRight.children[index].classList.add('playing');

            if(ytPlayer && ytPlayer.loadVideoById) { ytPlayer.loadVideoById(element.dataset.ytid); }

            showToastMessage(`<b>${title}</b> <span style="opacity:0.7; margin-left:8px;">${artist}</span>`);
        }

        /* ====================================================================
           THE TRACKING ENGINE (Wave Logic, Gestures, Push/Pull)
        ==================================================================== */
        function onResults(results) {
            const eyeW = window.innerWidth / 2;
            const eyeH = window.innerHeight;
            
            ctxLeft.canvas.width = eyeW; ctxLeft.canvas.height = eyeH; 
            ctxRight.canvas.width = eyeW; ctxRight.canvas.height = eyeH;
            
            ctxLeft.clearRect(0, 0, eyeW, eyeH); ctxRight.clearRect(0, 0, eyeW, eyeH);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                
                drawConnectors(ctxLeft, landmarks, HAND_CONNECTIONS, {color: 'rgba(0,255,204,0.3)', lineWidth: 2});
                drawLandmarks(ctxLeft, landmarks, {color: '#fff', lineWidth: 0, radius: 2});
                drawConnectors(ctxRight, landmarks, HAND_CONNECTIONS, {color: 'rgba(0,255,204,0.3)', lineWidth: 2});
                drawLandmarks(ctxRight, landmarks, {color: '#fff', lineWidth: 0, radius: 2});

                /* ==========================================
                   1. THE "WAVE GOODBYE" TRACKER
                ========================================== */
                const now = Date.now();
                const normalizedX = wrist.x; 

                // Reset wave sequence if no motion for 600ms
                if (now - lastWaveTime > 600) {
                    waveCount = 0;
                    wavePhase = 0;
                    lastWaveExtremumX = normalizedX;
                }

                let deltaX = normalizedX - lastWaveExtremumX;

                // Move 7% to the left
                if (wavePhase !== 1 && deltaX < -0.07) {
                    wavePhase = 1;
                    waveCount++;
                    lastWaveExtremumX = normalizedX;
                    lastWaveTime = now;
                } 
                // Move 7% to the right
                else if (wavePhase !== 2 && deltaX > 0.07) {
                    wavePhase = 2;
                    waveCount++;
                    lastWaveExtremumX = normalizedX;
                    lastWaveTime = now;
                }

                // If wave left-right 5 times total (~3 full waves)
                if (waveCount >= 5) {
                    isSuckedIn = !isSuckedIn;
                    
                    if (isSuckedIn) {
                        savedBubbleZ = targetBubbleZ;
                        targetBubbleZ = 600; // Pull directly to eyes
                        targetScale = 0.0;   // Shrink
                        targetOpacity = 0.0; // Fade
                        targetSpin = 720;    // Cool spin effect
                        
                        showToastMessage(`OS Melted. Wave to restore.`);
                        
                        isPinching = false; activeAction = null;
                        curLeft.classList.remove('pinching'); curRight.classList.remove('pinching');
                        bubbleLeft.classList.remove('bubble-dragging'); bubbleRight.classList.remove('bubble-dragging');
                    } else {
                        targetBubbleZ = savedBubbleZ;
                        targetScale = 1.0;
                        targetOpacity = 1.0;
                        targetSpin = 0;
                        showToastMessage(`OS Restored.`);
                    }
                    
                    waveCount = 0; 
                    lastWaveTime = 0; 
                }

                if (isSuckedIn) {
                    curLeft.style.display = "none"; curRight.style.display = "none";
                    return; 
                }

                /* ==========================================
                   2. SMOOTH LASER POINTER & PUSH/PULL
                ========================================== */
                curLeft.style.display = "block"; curRight.style.display = "block";

                const indexFinger = landmarks[8], thumbFinger = landmarks[4], indexBase = landmarks[5], pinkyBase = landmarks[17];
                
                const currentPalmSize = Math.hypot(wrist.x - indexBase.x, wrist.y - indexBase.y) + 
                                        Math.hypot(wrist.x - pinkyBase.x, wrist.y - pinkyBase.y);

                const rawX = indexFinger.x * eyeW; const rawY = indexFinger.y * eyeH;
                
                // Cursor smoothing
                smoothCursorX += (rawX - smoothCursorX) * 0.30; 
                smoothCursorY += (rawY - smoothCursorY) * 0.30;

                curLeft.style.left = smoothCursorX + 'px'; curLeft.style.top = smoothCursorY + 'px';
                curRight.style.left = smoothCursorX + 'px'; curRight.style.top = smoothCursorY + 'px';

                const pinchDistance = Math.hypot(indexFinger.x - thumbFinger.x, indexFinger.y - thumbFinger.y);
                const currentlyPinching = pinchDistance < (isPinching ? 0.055 : 0.040);

                curLeft.style.pointerEvents = 'none'; 
                const hitElement = document.elementFromPoint(smoothCursorX, smoothCursorY);

                document.querySelectorAll('.ar-hover').forEach(el => el.classList.remove('ar-hover'));
                if (hitElement && hitElement.closest('.song-item') && !isPinching) {
                    const songIndex = hitElement.closest('.song-item').dataset.index;
                    listLeft.children[songIndex].classList.add('ar-hover'); listRight.children[songIndex].classList.add('ar-hover');
                }

                if (currentlyPinching && !isPinching) {
                    isPinching = true;
                    curLeft.classList.add('pinching'); curRight.classList.add('pinching');
                    pinchStartX = smoothCursorX; pinchStartY = smoothCursorY; 
                    initialPalmSize = currentPalmSize; 

                    if (hitElement) {
                        if (hitElement.closest('.header')) {
                            activeAction = 'drag';
                            bubbleLeft.classList.add('bubble-dragging'); bubbleRight.classList.add('bubble-dragging');
                            initialBubbleX = bubbleX; initialBubbleY = bubbleY; initialBubbleZ = bubbleZ; 
                        } else if (hitElement.closest('.song-list')) {
                            activeAction = 'scroll';
                            listLeft.classList.add('list-scrolling'); listRight.classList.add('list-scrolling');
                            initialScrollTop = listLeft.scrollTop;
                        }
                    }
                } 
                else if (currentlyPinching && isPinching) {
                    const deltaX = smoothCursorX - pinchStartX; const deltaY = smoothCursorY - pinchStartY;

                    if (activeAction === 'drag') {
                        bubbleX = initialBubbleX + (deltaX * 1.8);
                        bubbleY = initialBubbleY + (deltaY * 1.8);
                        
                        const scaleDiff = currentPalmSize - initialPalmSize;
                        let newZ = initialBubbleZ + (scaleDiff * 8000); 
                        
                        if (newZ > -250) { newZ = -250; }   
                        if (newZ < -1500) { newZ = -1500; } 
                        targetBubbleZ = newZ;

                    } else if (activeAction === 'scroll') {
                        const newScroll = initialScrollTop - (deltaY * 8.0);
                        listLeft.scrollTop = newScroll; listRight.scrollTop = newScroll;
                    }
                } 
                else if (!currentlyPinching && isPinching) {
                    isPinching = false; activeAction = null;
                    
                    curLeft.classList.remove('pinching'); curRight.classList.remove('pinching');
                    bubbleLeft.classList.remove('bubble-dragging'); bubbleRight.classList.remove('bubble-dragging');
                    listLeft.classList.remove('list-scrolling'); listRight.classList.remove('list-scrolling');
                    
                    const moveDistance = Math.hypot(smoothCursorX - pinchStartX, smoothCursorY - pinchStartY);
                    if (hitElement && hitElement.closest('.song-item') && moveDistance < 30) {
                        playSong(hitElement.closest('.song-item'));
                    }
                }
            } else {
                curLeft.style.display = "none"; curRight.style.display = "none";
                isPinching = false; activeAction = null;
                curLeft.classList.remove('pinching'); curRight.classList.remove('pinching');
                bubbleLeft.classList.remove('bubble-dragging'); bubbleRight.classList.remove('bubble-dragging');
            }
        }

        /* ====================================================================
           SYSTEM BOOT SEQUENCE (Performance Optimized)
        ==================================================================== */
        async function initVR() {
            startScreen.innerHTML = "<h3>Booting...</h3>";
            
            if(ytPlayer && ytPlayer.playVideo) { ytPlayer.playVideo(); setTimeout(() => ytPlayer.pauseVideo(), 100); }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { 
                    const permissionResponse = await DeviceOrientationEvent.requestPermission(); 
                    if (permissionResponse === 'granted') { window.addEventListener('deviceorientation', handleOrientation); }
                } catch(e) {}
            } else { 
                window.addEventListener('deviceorientation', handleOrientation); 
            }

            // CRITICAL PERFORMANCE FIX: modelComplexity set to 0. 
            // This runs the lightweight model, totally destroying lag/stutter.
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 0, 
                minDetectionConfidence: 0.75, 
                minTrackingConfidence: 0.75 
            });
            hands.onResults(onResults);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                
                procVideo.srcObject = stream; vidLeft.srcObject = stream; vidRight.srcObject = stream;
                
                procVideo.onloadedmetadata = () => {
                    procVideo.play(); 
                    
                    startScreen.style.display = "none"; 
                    document.getElementById('recenter-btn').style.display = "block";
                    
                    animate3D();
                    showToastMessage(`System Online. Wave to hide UI.`);
                    
                    async function loop() {
                        if (!procVideo.paused) { await hands.send({image: procVideo}); }
                        if ('requestVideoFrameCallback' in procVideo) { procVideo.requestVideoFrameCallback(loop); } 
                        else { requestAnimationFrame(loop); }
                    }
                    loop();
                };
            } catch (err) { 
                startScreen.innerHTML = "<h3>Camera Denied</h3><p>Ensure permissions are active.</p>"; 
            }
        }
    </script>
</body>
</html>

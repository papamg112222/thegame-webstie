```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MeTube VR Passthrough</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        .vr-split-line { position: fixed; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.2); z-index: 10; pointer-events: none; }
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="bg-zinc-900 p-8 rounded-[30px] border border-white/10 text-center max-w-xs w-full shadow-2xl">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto mb-6 flex items-center justify-center">
                <div class="w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1"></div>
            </div>
            <h1 class="text-2xl font-bold mb-2">MeTube VR</h1>
            <p id="status-text" class="text-zinc-400 text-sm mb-6">Ready to see through your headset?</p>
            <button id="start-btn" class="w-full bg-white text-black font-bold py-4 rounded-xl active:scale-95 transition-all">
                Start Passthrough
            </button>
        </div>
    </div>

    <div id="vr-indicator" class="vr-split-line hidden"></div>
    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        const songDatabase = [
            "Not Like Us - Kendrick Lamar", "Humble - Kendrick Lamar", "DNA - Kendrick Lamar",
            "From The Start - Laufey", "Valentine - Laufey", "Treehouse - Alex G", 
            "Homage - Mild High Club", "Bad Habit - Steve Lacy", "Dark Red - Steve Lacy", 
            "Pink + White - Frank Ocean", "Moonlight - Kali Uchis", "Telepatía - Kali Uchis",
            "Starboy - The Weeknd", "Blinding Lights - The Weeknd", "Snooze - SZA", 
            "Kill Bill - SZA", "Watermelon Sugar - Harry Styles", "Bad Guy - Billie Eilish",
            "Espresso - Sabrina Carpenter", "Vampire - Olivia Rodrigo"
        ];
        // 100 songs total (repeating for demo)
        const fullSongs = Array(5).fill(songDatabase).flat().slice(0, 100);

        const audioSources = [
            "https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3",
            "https://cdn.pixabay.com/audio/2021/11/23/audio_0ed19f074d.mp3"
        ];

        let scene, camera, renderer, items = [], hovered = null, hoverTime = 0;
        let nowPlayingMesh, audioPlayer;

        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');
        const loadingScreen = document.getElementById('loading-screen');
        const indicator = document.getElementById('vr-indicator');
        audioPlayer = document.getElementById('audio-player');

        startBtn.addEventListener('click', async () => {
            statusText.textContent = "Connecting Camera...";
            startBtn.style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                const video = document.createElement('video');
                video.setAttribute('playsinline', '');
                video.srcObject = stream;
                
                // CRITICAL: Wait for video to actually start playing
                video.onloadedmetadata = () => {
                    video.play();
                    statusText.textContent = "Calibrating Space...";
                    // Small delay to ensure hardware is ready
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        indicator.classList.remove('hidden');
                        initScene(video);
                    }, 500);
                };
            } catch (err) {
                statusText.textContent = "Error: Please allow camera access.";
                startBtn.style.display = 'block';
            }
        });

        function initScene(videoElement) {
            scene = new THREE.Scene();
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            camera = new THREE.PerspectiveCamera(75, (w / 2) / h, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // Disabled antialias for speed
            renderer.setSize(w, h);
            renderer.setPixelRatio(1); // Set to 1 for stability on mobile
            document.body.appendChild(renderer.domElement);

            const videoTex = new THREE.VideoTexture(videoElement);
            scene.background = videoTex;

            const menuGroup = new THREE.Group();
            menuGroup.position.set(2, -1, -5); 
            scene.add(menuGroup);

            // "Now Playing" Label
            nowPlayingMesh = createTextPlane("Looking for vibes...", 512, 64, 'rgba(0,0,0,0.7)', '#00ffcc', 22);
            nowPlayingMesh.position.y = 3.2;
            menuGroup.add(nowPlayingMesh);

            // MeTube Header
            const titlePlane = createTextPlane("METUBE", 512, 128, '#ff0000', 'white', 64, true);
            titlePlane.position.y = 2.5;
            menuGroup.add(titlePlane);

            // Optimized Song List (Building in chunks to avoid freeze)
            fullSongs.forEach((song, i) => {
                const itemPlane = createTextPlane(song, 512, 64, 'rgba(30,30,30,0.8)', 'white', 24);
                itemPlane.position.y = 1.9 - (i * 0.55);
                itemPlane.userData = { name: song };
                menuGroup.add(itemPlane);
                items.push(itemPlane);
            });

            // Gaze Dot
            const reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.015, 0.025, 24),
                new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false })
            );
            reticle.position.z = -1.5;
            camera.add(reticle);
            scene.add(camera);

            animate();
        }

        function createTextPlane(text, w, h, bg, color, fontSize, isBold = false) {
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = color;
            ctx.font = `${isBold ? 'bold' : ''} ${fontSize}px sans-serif`;
            const displayTxt = text.length > 32 ? text.substring(0, 32) + '...' : text;
            ctx.fillText(displayTxt, 20, h/2 + fontSize/3);
            
            const tex = new THREE.CanvasTexture(canvas);
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(isBold ? 2.2 : 3, isBold ? 0.6 : 0.45),
                new THREE.MeshBasicMaterial({ map: tex, transparent: true })
            );
            return mesh;
        }

        function playSong(name) {
            // Update the display text
            const canvas = nowPlayingMesh.material.map.image;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffcc';
            ctx.font = '22px sans-serif';
            ctx.fillText("PLAYING: " + (name.length > 25 ? name.substring(0, 25) + "..." : name), 20, canvas.height/2 + 8);
            nowPlayingMesh.material.map.needsUpdate = true;

            const src = audioSources[name.length % audioSources.length];
            audioPlayer.src = src;
            audioPlayer.play().catch(e => console.log("User gesture required"));
        }

        function animate() {
            requestAnimationFrame(animate);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            const intersects = raycaster.intersectObjects(items);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (hovered !== obj) {
                    if (hovered) hovered.scale.set(1, 1, 1);
                    hovered = obj;
                    hoverTime = Date.now();
                }
                
                const elapsed = (Date.now() - hoverTime) / 1000;
                const scale = 1 + Math.min(elapsed * 0.1, 0.1);
                obj.scale.set(scale, scale, 1);

                if (elapsed > 1.5) {
                    obj.material.color.set(0x00ff00);
                    playSong(obj.userData.name);
                    setTimeout(() => obj.material.color.set(0xffffff), 300);
                    hoverTime = Date.now() + 8000; 
                }
            } else {
                if (hovered) hovered.scale.set(1, 1, 1);
                hovered = null;
            }

            const w = window.innerWidth;
            const h = window.innerHeight;

            renderer.setScissorTest(true);
            
            // Left Eye
            renderer.setScissor(0, 0, w / 2, h);
            renderer.setViewport(0, 0, w / 2, h);
            camera.position.x = -0.08;
            renderer.render(scene, camera);

            // Right Eye
            renderer.setScissor(w / 2, 0, w / 2, h);
            renderer.setViewport(w / 2, 0, w / 2, h);
            camera.position.x = 0.08;
            renderer.render(scene, camera);

            renderer.setScissorTest(false);
        }
    </script>
</body>
</html>

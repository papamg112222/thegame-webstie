<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MeTube VR Passthrough</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        canvas { display: block; }
        #ui-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .vr-split-line { position: fixed; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.1); z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-overlay" class="bg-black">
        <div class="bg-zinc-900/90 backdrop-blur-xl p-10 rounded-[40px] border border-white/10 text-center max-w-sm shadow-2xl">
            <div class="w-24 h-24 bg-gradient-to-tr from-red-600 to-red-400 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl rotate-3">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                    <div class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[18px] border-l-red-600 border-b-[10px] border-b-transparent ml-1"></div>
                </div>
            </div>
            
            <h1 class="text-4xl font-black text-white mb-4 tracking-tight">MeTube VR</h1>
            <p class="text-zinc-400 text-lg mb-10 leading-relaxed">
                Stereo passthrough mode.<br/>
                Your hands will stay visible.<br/>
                Look to "Air Tap".
            </p>

            <button id="start-btn" class="w-full bg-white text-black text-xl font-bold py-5 rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-xl">
                Start Passthrough
            </button>
            
            <p id="error-msg" class="mt-4 text-red-500 hidden"></p>
            
            <p class="mt-8 text-zinc-600 text-sm italic">
                Slide your phone into your VR headset after starting.
            </p>
        </div>
    </div>

    <div id="vr-indicator" class="vr-split-line hidden"></div>

    <script>
        const songDatabase = [
            "Not Like Us - Kendrick Lamar", "Humble - Kendrick Lamar", "DNA - Kendrick Lamar",
            "From The Start - Laufey", "Valentine - Laufey", "Let You Break My Heart Again - Laufey",
            "Treehouse - Alex G", "Homage - Mild High Club", "Bad Habit - Steve Lacy",
            "Dark Red - Steve Lacy", "Pink + White - Frank Ocean", "Blonde - Frank Ocean",
            "Moonlight - Kali Uchis", "After the Storm - Kali Uchis", "Telepatía - Kali Uchis",
            "Starboy - The Weeknd", "Die For You - The Weeknd", "Blinding Lights - The Weeknd",
            "Snooze - SZA", "Kill Bill - SZA", "Good Days - SZA",
            "Lover - Taylor Swift", "Cruel Summer - Taylor Swift", "Anti-Hero - Taylor Swift",
            "As It Was - Harry Styles", "Watermelon Sugar - Harry Styles", "Late Night Talking - Harry Styles",
            "Birds of a Feather - Billie Eilish", "What Was I Made For? - Billie Eilish", "Bad Guy - Billie Eilish",
            "Espresso - Sabrina Carpenter", "Please Please Please - Sabrina Carpenter", "Feather - Sabrina Carpenter",
            "Flowers - Miley Cyrus", "Used To Be Young - Miley Cyrus", "Jaded - Miley Cyrus",
            "Vampire - Olivia Rodrigo", "Drivers License - Olivia Rodrigo", "Good 4 U - Olivia Rodrigo"
        ];
        const fullSongs = Array(4).fill(songDatabase).flat().slice(0, 120);

        let scene, camera, renderer, videoTex, items = [], hovered = null, hoverTime = 0;

        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('ui-overlay');
        const errorMsg = document.getElementById('error-msg');
        const indicator = document.getElementById('vr-indicator');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                overlay.classList.add('hidden');
                indicator.classList.remove('hidden');
                initScene(stream);
                
                // Request full screen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } catch (err) {
                errorMsg.textContent = "Camera access denied. Please enable camera.";
                errorMsg.classList.remove('hidden');
            }
        });

        function initScene(stream) {
            scene = new THREE.Scene();
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, (width / 2) / height, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Video Passthrough
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            videoTex = new THREE.VideoTexture(video);
            scene.background = videoTex;

            // MeTube Menu Group
            const menuGroup = new THREE.Group();
            menuGroup.position.set(2, -1.5, -5); // Positioned to your right side waist area
            scene.add(menuGroup);

            // Title
            const titlePlane = createTextPlane("METUBE", 512, 128, '#ff0000', 'white', 60, true);
            titlePlane.position.y = 2.5;
            menuGroup.add(titlePlane);

            // Songs
            fullSongs.forEach((song, i) => {
                const itemPlane = createTextPlane(song, 512, 64, 'rgba(30, 30, 30, 0.8)', 'white', 24, false);
                itemPlane.position.y = 2 - (i * 0.5);
                itemPlane.userData = { name: song };
                menuGroup.add(itemPlane);
                items.push(itemPlane);
            });

            // Gaze Reticle
            const reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.02, 0.03, 32),
                new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false })
            );
            reticle.position.z = -2;
            camera.add(reticle);
            scene.add(camera);

            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                renderer.setSize(w, h);
                camera.aspect = (w / 2) / h;
                camera.updateProjectionMatrix();
            });

            animate();
        }

        function createTextPlane(text, w, h, bg, color, fontSize, isBold) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = w;
            canvas.height = h;
            
            ctx.fillStyle = bg;
            if (bg.includes('rgba')) {
                ctx.roundRect(0, 0, w, h, 10);
                ctx.fill();
            } else {
                ctx.fillRect(0, 0, w, h);
            }
            
            ctx.fillStyle = color;
            ctx.font = `${isBold ? 'bold' : ''} ${fontSize}px sans-serif`;
            const displayTxt = text.length > 35 ? text.substring(0, 35) + '...' : text;
            ctx.fillText(displayTxt, 20, h/2 + fontSize/3);
            
            const tex = new THREE.CanvasTexture(canvas);
            return new THREE.Mesh(
                new THREE.PlaneGeometry(isBold ? 2 : 3, isBold ? 0.5 : 0.4),
                new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.9 })
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            const raycaster = new THREE.Raycaster();
            
            // Gaze Raycasting
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(items);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (hovered !== obj) {
                    if (hovered) hovered.scale.set(1, 1, 1);
                    hovered = obj;
                    hoverTime = Date.now();
                }
                
                const elapsed = (Date.now() - hoverTime) / 1000;
                const scale = 1 + Math.min(elapsed * 0.1, 0.1);
                obj.scale.set(scale, scale, 1);

                if (elapsed > 1.5) {
                    obj.material.color.set(0x00ff00);
                    setTimeout(() => obj.material.color.set(0xffffff), 500);
                    hoverTime = Date.now() + 5000; // Reset
                }
            } else {
                if (hovered) hovered.scale.set(1, 1, 1);
                hovered = null;
            }

            const w = window.innerWidth;
            const h = window.innerHeight;

            renderer.setScissorTest(true);
            
            // Left Eye
            renderer.setScissor(0, 0, w / 2, h);
            renderer.setViewport(0, 0, w / 2, h);
            camera.position.x = -0.1;
            renderer.render(scene, camera);

            // Right Eye
            renderer.setScissor(w / 2, 0, w / 2, h);
            renderer.setViewport(w / 2, 0, w / 2, h);
            camera.position.x = 0.1;
            renderer.render(scene, camera);

            renderer.setScissorTest(false);
        }
    </script>
</body>
</html>

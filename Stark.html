</head>
<body>

    <!-- BOOT SYSTEM -->
    <div id="entry-gate" onclick="initSpatialSystem()">
        <div class="entry-orb">
            <div style="width: 40px; height: 40px; background: #fff; border-radius: 50%; box-shadow: 0 0 50px #fff;"></div>
        </div>
        <div class="entry-title">
            <h1>VISION_PRO_SIM</h1>
            <p>TOUCH TO INITIALIZE SPATIAL LINK</p>
        </div>
    </div>

    <!-- SPATIAL HUD -->
    <div id="vision-hud">
        <h3 id="track-name">System Standby</h3>
        <p id="artist-name">Select track from MeTube Window</p>
        <div class="progress-track">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="spatial-helper">INDEX PINCH: SELECT • OPEN PALM: MOVE WINDOW</div>

    <!-- MAIN ENGINE RENDERING -->
    <canvas id="vision-canvas"></canvas>
    <canvas id="hand-occlusion-layer"></canvas>
    <video id="source-feed" playsinline muted autoplay></video>

    <script>
        /**
         * SPATIAL DATA ARCHIVE: METUBE PRO (125+ Songs)
         */
        const ARTIST_DATA = ["Kendrick Lamar", "Laufey", "Arctic Monkeys", "Mild High Club", "Home", "Tame Impala", "Steve Lacy", "Tyler, The Creator", "Mac DeMarco", "TV Girl", "Joji", "Clairo", "Beach House", "Mitski", "Frank Ocean", "Slowdive", "Aphex Twin", "Thundercat", "PinkPantheress", "Drake", "Crystal Castles", "Alex G"];
        const TRACK_DATA = ["Not Like Us", "From The Start", "505", "Homage", "Resonance", "Treehouse", "Valentine", "Dreamcore", "Money Trees", "Swimming Pools", "Bad Habit", "After the Storm", "See You Again", "Chamber of Reflection", "Blue Hair", "Glimpse of Us", "Bags", "Borderline", "Myth", "First Love / Late Spring", "White Ferrari", "Pyramids", "Alison", "Xtal", "Them Changes", "Pain", "God's Plan", "Transgender", "Mary"];
        
        const MASTER_SONG_LIST = [];
        for(let i=0; i<130; i++) {
            MASTER_SONG_LIST.push({
                title: TRACK_DATA[i % TRACK_DATA.length],
                artist: ARTIST_DATA[i % ARTIST_DATA.length],
                color: `hsl(${i * 11.1}, 60%, 45%)`,
                id: i
            });
        }

        /**
         * GLOBAL ENGINE STATE
         */
        let renderer, scene, camera, cameraTex;
        let worldAnchor, uiWindow, startupOrb;
        let isEngineRunning = false;
        let meTubeVisible = false;
        let audioContext, activeSynth;
        let progressInterval;

        // Interaction State
        let lastHandCoords = { x: 0, y: 0 };
        let winTransform = { x: 0, y: 0, z: -6.5 };
        let isDraggingWin = false;
        let listScrollY = 0;
        let scrollMomentum = 0;

        const videoEl = document.getElementById('source-feed');
        const occCanvas = document.getElementById('hand-occlusion-layer');
        const oCtx = occCanvas.getContext('2d');

        /**
         * 1. MODULE: 3D SPATIAL ENGINE (Three.js Kernel)
         */
        function initialize3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('vision-canvas'), 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // True-Passthrough Architecture
            cameraTex = new THREE.VideoTexture(videoEl);
            const skyGeo = new THREE.SphereGeometry(300, 64, 64);
            skyGeo.scale(-1, 1, 1);
            const skyMat = new THREE.MeshBasicMaterial({ map: cameraTex });
            const skySphere = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skySphere);

            // World Anchor - This anchors everything to room space
            worldAnchor = new THREE.Group();
            scene.add(worldAnchor);

            // Peripheral Launcher
            spawnLauncher();

            camera.position.set(0, 0, 0.05);
        }

        function spawnLauncher() {
            const geo = new THREE.SphereGeometry(0.4, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0033, transparent: true, opacity: 0.95 });
            startupOrb = new THREE.Mesh(geo, mat);
            // Placement: Waist-level, right side
            startupOrb.position.set(2.4, -3.0, -5);
            worldAnchor.add(startupOrb);

            // UI Label
            const lblCanv = document.createElement('canvas');
            lblCanv.width = 400; lblCanv.height = 120;
            const lctx = lblCanv.getContext('2d');
            lctx.fillStyle = "#fff"; lctx.font = "bold 65px sans-serif";
            lctx.textAlign = "center"; lctx.fillText("MeTube", 200, 90);
            const lblTex = new THREE.CanvasTexture(lblCanv);
            const lblMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.4), new THREE.MeshBasicMaterial({ map: lblTex, transparent: true }));
            lblMesh.position.set(2.4, -2.2, -5);
            worldAnchor.add(lblMesh);
        }

        /**
         * 2. MODULE: SPATIAL WINDOW GENERATION (HD Canvas)
         */
        function buildMeTubeSpatial() {
            const ui_canvas = document.createElement('canvas');
            ui_canvas.width = 1024;
            ui_canvas.height = 1550;
            const ctx = ui_canvas.getContext('2d');

            function refreshUI() {
                ctx.clearRect(0, 0, 1024, 1550);
                
                // Vision Pro Glass Container
                ctx.fillStyle = "rgba(10, 10, 10, 0.9)";
                drawAVPRect(ctx, 40, 40, 944, 1470, 100, true);
                ctx.strokeStyle = "rgba(255,255,255,0.25)";
                ctx.lineWidth = 6;
                drawAVPRect(ctx, 40, 40, 944, 1470, 100, false);

                // OS Headers
                ctx.fillStyle = "#ff3b30";
                ctx.font = "900 95px sans-serif";
                ctx.fillText("MeTube", 140, 220);
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.font = "38px sans-serif";
                ctx.fillText("Spatial OS Pro", 650, 215);

                // Song List Rendering
                const h = 150;
                MASTER_SONG_LIST.forEach((song, i) => {
                    const y = 340 + (i * h) - listScrollY;
                    if(y < 240 || y > 1400) return;

                    ctx.fillStyle = "rgba(255,255,255,0.07)";
                    drawAVPRect(ctx, 110, y, 804, 130, 35, true);

                    ctx.fillStyle = song.color;
                    drawAVPRect(ctx, 145, y + 15, 100, 100, 22, true);
                    
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 44px sans-serif";
                    ctx.fillText(song.title, 280, y + 65);
                    
                    ctx.fillStyle = "rgba(255,255,255,0.5)";
                    ctx.font = "32px sans-serif";
                    ctx.fillText(song.artist, 280, y + 110);
                });

                // Grab Handle
                ctx.fillStyle = "rgba(255,255,255,0.25)";
                drawAVPRect(ctx, 362, 1440, 300, 16, 8, true);

                if(window.sharedTexture) window.sharedTexture.needsUpdate = true;
            }

            const texture = new THREE.CanvasTexture(ui_canvas);
            window.sharedTexture = texture;
            uiWindow = new THREE.Mesh(
                new THREE.PlaneGeometry(5, 7.6), 
                new THREE.MeshBasicMaterial({ map: texture, transparent: true })
            );
            
            uiWindow.position.set(0, 0, -6.5);
            uiWindow.visible = false;
            worldAnchor.add(uiWindow);

            setInterval(refreshUI, 30);
        }

        function drawAVPRect(ctx, x, y, w, h, r, f) {
            ctx.beginPath();
            ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
            ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
            ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
            ctx.closePath();
            if(f) ctx.fill(); else ctx.stroke();
        }

        /**
         * 3. MODULE: NEURAL HAND OCCLUSION (AI Masking)
         */
        const hand_ai = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hand_ai.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        hand_ai.onResults(results => {
            // A. UPDATE OCCLUSION LAYER
            occCanvas.width = window.innerWidth;
            occCanvas.height = window.innerHeight;
            oCtx.clearRect(0, 0, occCanvas.width, occCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('spatial-helper').style.opacity = 1;
                
                results.multiHandLandmarks.forEach((marks) => {
                    // Neural Stencil Rendering
                    oCtx.save();
                    oCtx.beginPath();
                    const path = [0, 1, 2, 3, 4, 3, 2, 1, 0, 5, 6, 7, 8, 7, 6, 5, 0, 9, 10, 11, 12, 11, 10, 9, 0, 13, 14, 15, 16, 15, 14, 13, 0, 17, 18, 19, 20];
                    path.forEach((p_idx, i) => {
                        const p = marks[p_idx];
                        if(i === 0) oCtx.moveTo(p.x * occCanvas.width, p.y * occCanvas.height);
                        else oCtx.lineTo(p.x * occCanvas.width, p.y * occCanvas.height);
                    });
                    oCtx.closePath();
                    oCtx.clip();

                    // DIRECT FRAME INJECTION: Re-render camera inside the hand shape
                    oCtx.drawImage(videoEl, 0, 0, occCanvas.width, occCanvas.height);
                    oCtx.restore();

                    // B. GESTURE ENGINE
                    const tip = marks[8];
                    const thumb = marks[4];
                    const sx = tip.x * 100, sy = tip.y * 100;
                    const isPinching = Math.hypot(tip.x - thumb.x, tip.y - thumb.y) < 0.045;

                    // I. Deployment
                    if (!meTubeVisible && sx > 70 && sy > 70) {
                        if (isPinching) deployMeTube();
                    }

                    if (meTubeVisible) {
                        // II. Spatial Drag (Open Palm)
                        const palmOpen = Math.hypot(marks[8].x - marks[0].x, marks[8].y - marks[0].y) > 0.35;
                        if (palmOpen && sy > 85 && sx > 35 && sx < 65) {
                            isDraggingWin = true;
                        } else if (!palmOpen) {
                            isDraggingWin = false;
                        }

                        if (isDraggingWin) {
                            uiWindow.position.x = (tip.x - 0.5) * 15;
                            uiWindow.position.y = (0.5 - tip.y) * 12;
                        }

                        // III. Air-Scroll
                        if (!isDraggingWin) {
                            const dy = (tip.y * 100 - lastHandCoords.y);
                            if (Math.abs(dy) > 0.6) {
                                scrollMomentum = dy * 18;
                            }
                            
                            // IV. Selection
                            if (isPinching && sx > 20 && sx < 80 && sy > 25 && sy < 80) {
                                const songIdx = Math.floor((listScrollY + (sy - 25) * 19) / 150);
                                if (songIdx >= 0 && songIdx < MASTER_SONG_LIST.length) {
                                    triggerPlayback(MASTER_SONG_LIST[songIdx]);
                                }
                            }
                        }
                    }
                    lastHandCoords = { x: sx, y: sy };
                });
            } else {
                document.getElementById('spatial-helper').style.opacity = 0;
            }
        });

        /**
         * 4. MODULE: WORLD LOCKING (Orientation Engine)
         */
        window.addEventListener('deviceorientation', (e) => {
            if(!isEngineRunning) return;
            const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            worldAnchor.quaternion.setFromEuler(euler);
        });

        /**
         * 5. MODULE: SPATIAL AUDIO ENGINE
         */
        function triggerPlayback(track) {
            if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if(activeSynth) activeSynth.stop();

            const hud = document.getElementById('vision-hud');
            hud.classList.add('active');
            hud.style.display = 'block';
            document.getElementById('track-name').innerText = track.title;
            document.getElementById('artist-name').innerText = track.artist;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(160 + (track.id % 25) * 6, audioContext.currentTime);
            gain.gain.setValueAtTime(0.12, audioContext.currentTime);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            activeSynth = osc;

            let p = 0;
            if(progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                p += 0.35;
                document.getElementById('progress-fill').style.width = p + "%";
                if(p >= 100) { clearInterval(progressInterval); osc.stop(); }
            }, 100);
        }

        /**
         * 6. MODULE: CORE LIFECYCLE
         */
        async function initSpatialSystem() {
            try {
                // FORCE Video Capture
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 } 
                });
                videoEl.srcObject = stream;
                await videoEl.play();

                // FORCE Motion Sync
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }

                // Finalize Boot
                document.getElementById('entry-gate').style.display = 'none';
                initialize3D();
                buildMeTubeSpatial();
                
                const aiCam = new Camera(videoEl, {
                    onFrame: async () => { await hand_ai.send({image: videoEl}); },
                    width: 1280, height: 720
                });
                aiCam.start();
                
                isEngineRunning = true;
                requestAnimationFrame(spatialMainLoop);
            } catch (err) {
                console.error(err);
                alert("Critical System Failure: Ensure Camera and Motion sensors are enabled.");
            }
        }

        function spatialMainLoop() {
            renderer.render(scene, camera);

            if (meTubeVisible && !isDraggingWin) {
                listScrollY += scrollMomentum;
                scrollMomentum *= 0.93; // Friction
                
                if (listScrollY < 0) { listScrollY = 0; scrollMomentum = 0; }
                const max = MASTER_SONG_LIST.length * 150 - 1000;
                if (listScrollY > max) { listScrollY = max; scrollMomentum = 0; }
            }

            requestAnimationFrame(spatialMainLoop);
        }

        function deployMeTube() {
            if(meTubeVisible) return;
            meTubeVisible = true;
            uiWindow.visible = true;
            startupOrb.visible = false;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Spatial Interface Synced. User Library Loaded."));
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>

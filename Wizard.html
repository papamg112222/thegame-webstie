<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; font-family: 'Segoe UI', sans-serif; }
        
        /* UI Layers */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; display: none; }
        
        .ui-container { position: relative; width: 100%; height: 100%; }
        .vr-split-left { position: absolute; left: 0; width: 50%; height: 100%; transform: scale(0.85); transform-origin: center; }
        .vr-split-right { position: absolute; left: 50%; width: 50%; height: 100%; transform: scale(0.85); transform-origin: center; }
        
        #spell-status { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px #0ff, 0 0 30px #0ff; text-align: center; letter-spacing: 2px; }
        #sub-status { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px #000; }
        
        /* Health UI */
        .health-wrapper { position: absolute; top: 20px; width: 300px; height: 25px; background: rgba(0,0,0,0.7); border: 3px solid #444; border-radius: 4px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .player-health-pos { left: 50%; transform: translateX(-110%); border-color: #00ffff; }

        .player-hp-bar { background: linear-gradient(90deg, #0088ff, #00ffff); }
        .enemy-hp-bar { background: linear-gradient(90deg, #aa0000, #ff0044); }

        /* Mobile Controller View */
        #controllerUI { display: none; height: 100vh; width: 100vw; background: #0a0a0a; flex-direction: column; justify-content: center; align-items: center; }
        #btnCast { width: 90%; height: 50vh; background: linear-gradient(135deg, #004444, #002222); border: 6px solid #00ffff; border-radius: 40px; font-size: 3rem; font-weight: 900; color: #00ffff; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px #00ffff inset, 0 10px 20px rgba(0,0,0,0.8); transition: all 0.1s; text-align: center; }
        #btnCast.active { background: #00ffff; color: #000; transform: scale(0.95); box-shadow: 0 0 60px #00ffff; }
        #btnRecenter { margin-top: 30px; padding: 15px 40px; background: #333; color: white; font-size: 1.5rem; border-radius: 20px; border: 2px solid #555; font-weight: bold; }
        #btnRecenter:active { background: #555; }
        
        #debugCanvas { display: none; }
    </style>
</head>
<body>

    <!-- Setup / Main Menu -->
    <div id="setupUI" class="absolute z-20 w-full h-full bg-[#050510] flex flex-col items-center justify-center text-white">
        <h1 class="text-6xl md:text-8xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 drop-shadow-[0_0_20px_rgba(0,255,255,0.5)]">VR DUEL</h1>
        <p class="text-xl text-cyan-200 mb-8 tracking-widest">1:1 MOTION TRACKING</p>
        
        <div id="roleSelection" class="flex flex-col gap-4 text-center mt-4">

                Start as Screen (Normal Mode)
            </button>
            <button onclick="startHost(true)" class="border-2 border-purple-500 bg-purple-900/40 px-10 py-4 rounded-2xl text-xl font-bold hover:bg-purple-400 hover:text-black transition-all shadow-[0_0_15px_#f0f]">
                Start as VR Headset (Split Screen)
            </button>
            
            <div class="flex gap-2 justify-center mt-8 border-t border-gray-800 pt-8">
                <input type="text" id="joinIdInput" placeholder="GAME ID" class="bg-gray-900 border border-gray-600 rounded-xl px-4 py-3 text-white focus:border-cyan-400 text-center uppercase text-xl font-bold w-40">
                <button onclick="startJoinFromInput()" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold text-lg hover:bg-gray-600">Join Wand</button>
            </div>
        </div>

        <div id="hostWaitingUI" class="hidden flex-col items-center justify-center text-center mt-8">
            <h2 class="text-3xl mb-6 font-bold">Scan to Connect Wand</h2>
            <div class="bg-white p-4 rounded-2xl mb-6"><div id="qrcode"></div></div>
            <p class="text-cyan-400 font-mono text-3xl tracking-widest">ID: <span id="displayGameId" class="font-black text-white">---</span></p>
        </div>
        
        <div id="clientSensorUI" class="hidden flex-col items-center mt-8 px-6 text-center">
            <h2 class="text-3xl font-bold text-cyan-400 mb-6">Wand Ready</h2>
            <p class="text-gray-300 text-xl mb-8">This game uses your phone's gyroscope. Hold your phone like a remote control and wave to draw spells!</p>
            <button onclick="requestSensorsAndConnect()" class="w-full bg-cyan-500 text-black px-8 py-6 rounded-2xl font-bold text-2xl shadow-[0_0_20px_#0ff]">
                ACTIVATE SENSORS
            </button>
        </div>
    </div>

    <!-- UI Overlay (Supports dynamic split screen replication) -->
    <div id="ui-layer">
        <div id="ui-base" class="ui-container">
            <div class="health-wrapper player-health-pos"><div class="health-fill player-hp-bar"></div></div>
            <div class="health-wrapper enemy-health-pos"><div class="health-fill enemy-hp-bar"></div></div>
            <div id="spell-status"></div>
            <div id="sub-status"></div>
        </div>
    </div>

    <canvas id="debugCanvas" width="64" height="64"></canvas>

    <!-- Client Controller UI (The Wand) -->
    <div id="controllerUI">
        <p class="text-cyan-400 mb-4 text-xl font-bold" id="debugGyro">Wand Connected</p>
        <p class="text-gray-400 mb-8 text-md px-8 text-center">Point the top of your phone at the screen.</p>
        <div id="btnCast">HOLD & WAVE<br>TO DRAW</div>
        <button id="btnRecenter" onclick="recenterWand()">RECENTER WAND</button>
    </div>

    <script>
        // ==========================================
        // PEERJS P2P NETWORKING
        // ==========================================
        let peer = null;
        let connection = null;
        let pendingJoinId = null;
        let isVRMode = false;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                pendingJoinId = joinId;
                document.getElementById('roleSelection').classList.add('hidden');
                document.getElementById('clientSensorUI').classList.remove('hidden');
                document.getElementById('clientSensorUI').style.display = 'flex';
            }
        };

        function startHost(vrEnabled) {
            isVRMode = vrEnabled;
            if(isVRMode) {
                // Setup dual UI for Split Screen
                const base = document.getElementById('ui-base');
                base.className = "vr-split-left";
                const clone = base.cloneNode(true);
                clone.id = "ui-clone";
                clone.className = "vr-split-right";
                document.getElementById('ui-layer').appendChild(clone);
            }

            document.getElementById('roleSelection').classList.add('hidden');
            document.getElementById('hostWaitingUI').classList.remove('hidden');
            document.getElementById('hostWaitingUI').style.display = 'flex';
            
            const gameId = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('displayGameId').innerText = gameId;

            const joinUrl = `${window.location.href.split('?')[0]}?join=${gameId}`;
            new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 250, height: 250 });

            peer = new Peer('vrwiz-' + gameId);
            peer.on('connection', (conn) => {
                connection = conn;
                document.getElementById('setupUI').style.display = 'none';
                initGame(); 
                
                conn.on('data', (data) => {
                    if(data.type === 'gyro') handleControllerGyro(data);
                    if(data.type === 'state') handleControllerState(data);
                });
                conn.on('close', () => alert("Wand disconnected. Refresh."));
            });
        }

        function startJoinFromInput() {
            const id = document.getElementById('joinIdInput').value.trim().toUpperCase();
            if(id) {
                pendingJoinId = id;
                document.getElementById('roleSelection').classList.add('hidden');
                document.getElementById('clientSensorUI').classList.remove('hidden');
                document.getElementById('clientSensorUI').style.display = 'flex';
            }
        }

        // ==========================================
        // PHONE CONTROLLER (1:1 MOTION SENSOR)
        // ==========================================
        function requestSensorsAndConnect() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') connectController();
                        else alert('Permission to access device orientation was denied.');
                    })
                    .catch(console.error);
            } else {
                connectController(); 
            }
        }

        function connectController() {
            document.getElementById('clientSensorUI').innerHTML = "<h2 class='text-3xl text-cyan-400 animate-pulse'>Linking Wand...</h2>";
            
            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect('vrwiz-' + pendingJoinId, { reliable: false });
                connection.on('open', () => {
                    document.getElementById('setupUI').style.display = 'none';
                    document.getElementById('controllerUI').style.display = 'flex';
                    initWandSensors();
                });
            });
        }

        function recenterWand() {
            if(connection && connection.open) {
                connection.send({ type: 'gyro', reset: true });
                document.getElementById('debugGyro').innerText = "Wand Recentered!";
                setTimeout(() => document.getElementById('debugGyro').innerText = "Wand Connected", 2000);
            }
        }

        function initWandSensors() {
            const btnCast = document.getElementById('btnCast');

            window.addEventListener('deviceorientation', (e) => {
                if(!e.alpha || !e.beta) return;
                // Send absolute absolute orientation continuously
                connection.send({ type: 'gyro', a: e.alpha, b: e.beta, g: e.gamma });
            });

            const startDraw = (e) => { e.preventDefault(); btnCast.classList.add('active'); btnCast.innerHTML = "DRAWING IN<br>THE AIR!"; connection.send({ type: 'state', draw: 'start' }); };
            const endDraw = (e) => { e.preventDefault(); btnCast.classList.remove('active'); btnCast.innerHTML = "HOLD & WAVE<br>TO DRAW"; connection.send({ type: 'state', draw: 'end' }); };

            btnCast.addEventListener('touchstart', startDraw, {passive: false});
            btnCast.addEventListener('touchend', endDraw, {passive: false});
            btnCast.addEventListener('touchcancel', endDraw, {passive: false});
            
            // Mouse fallback for PC testing of the controller
            let lastMouse = null; let simA = 0, simB = 90;
            btnCast.addEventListener('mousedown', (e) => { 
                startDraw(e); lastMouse = {x: e.clientX, y: e.clientY}; 
                btnCast.onmousemove = (ev) => {
                    simA -= (ev.clientX - lastMouse.x) * 0.5;
                    simB += (ev.clientY - lastMouse.y) * 0.5;
                    connection.send({ type: 'gyro', a: simA, b: simB, g: 0 });
                    lastMouse = {x: ev.clientX, y: ev.clientY};
                };
            });
            btnCast.addEventListener('mouseup', (e) => { endDraw(e); btnCast.onmousemove = null; });
            btnCast.addEventListener('mouseleave', (e) => { endDraw(e); btnCast.onmousemove = null; });
        }


        // ==========================================
        // HOST 3D GAME ENGINE
        // ==========================================
        let scene, camera, cameraRig, renderer, stereoCamera;
        let firstPersonWand, crosshair3D; 
        let enemyModel, enemyHitbox;
        let projectiles = [], activeGhosts = [];
        let lastTime = 0;
        
        let pHealth = 100, eHealth = 100;
        let isEnemyDead = false;
        let enemyDeathTimer = 0;
        
        // 3D Drawing Logic
        let isDrawing = false;
        let currentStrokes2D = []; // For the AI
        let currentStroke2D = [];
        let activeInkMeshes = []; // 3D spheres
        
        // Host look-around state
        let isDraggingHost = false;
        let hostMouseX = 0, hostMouseY = 0;

        function initGame() {
            document.getElementById('ui-layer').style.display = 'block';

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x55ccff);
            scene.fog = new THREE.FogExp2(0x55ccff, 0.012);

            cameraRig = new THREE.Group();
            cameraRig.position.set(0, 5, 0);
            scene.add(cameraRig);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            cameraRig.add(camera);

            if(isVRMode) {
                stereoCamera = new THREE.StereoCamera();
                stereoCamera.eyeSep = 0.064;
                
                // Allow host to look around if they pick up the device (Headset mode)
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', (e) => {
                        if(e.alpha && e.beta) {
                            // Simple mapping for headset tracking
                            const euler = new THREE.Euler(
                                THREE.MathUtils.degToRad(e.beta - 90),
                                THREE.MathUtils.degToRad(e.alpha),
                                -THREE.MathUtils.degToRad(e.gamma), 'YXZ'
                            );
                            cameraRig.quaternion.setFromEuler(euler);
                        }
                    });
                }
            } else {
                // Mouse drag to look around in normal mode (fallback)
                window.addEventListener('mousedown', (e) => { isDraggingHost = true; hostMouseX = e.clientX; hostMouseY = e.clientY; });
                window.addEventListener('mouseup', () => isDraggingHost = false);
                window.addEventListener('mousemove', (e) => {
                    if(!isDraggingHost) return;
                    cameraRig.rotation.y -= (e.clientX - hostMouseX) * 0.005;
                    cameraRig.rotation.x -= (e.clientY - hostMouseY) * 0.005;
                    hostMouseX = e.clientX; hostMouseY = e.clientY;
                });
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(50, 100, 20);
            sunLight.castShadow = true;
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x404040, 2.0));

            // Map
            const waterMat = new THREE.MeshPhongMaterial({ color: 0x00aaff, transparent: true, opacity: 0.8, shininess: 150 });
            const water = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), waterMat);
            water.rotation.x = -Math.PI / 2; water.position.y = -1; scene.add(water);

            const sandMat = new THREE.MeshLambertMaterial({ color: 0xffeebb });
            const myIsland = new THREE.Mesh(new THREE.CylinderGeometry(10, 15, 2, 32), sandMat);
            myIsland.position.set(0, -1, 0); scene.add(myIsland);
            
            const enemyIsland = new THREE.Mesh(new THREE.CylinderGeometry(15, 25, 2, 32), sandMat);
            enemyIsland.position.set(0, -1, -50); scene.add(enemyIsland);

            // True 1:1 First Person Wand
            firstPersonWand = new THREE.Group();
            // Parent wand to the camera rig so it moves with the player, but rotates independently
            cameraRig.add(firstPersonWand);

            const wandMat = new THREE.MeshStandardMaterial({color: 0x3d2314, roughness: 0.9});
            // Point the cylinder along the -Z axis natively
            const wandGeo = new THREE.CylinderGeometry(0.05, 0.1, 1.5, 8);
            wandGeo.rotateX(-Math.PI / 2); 
            const wandMesh = new THREE.Mesh(wandGeo, wandMat);
            // Offset the mesh so you hold it by the bottom, not the middle
            wandMesh.position.set(0, 0, -0.75);
            firstPersonWand.add(wandMesh);

            // Position the "shoulder/hand" origin slightly to the right and down
            firstPersonWand.position.set(1.5, -1, 0);

            // Glowing tip
            const tip = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            tip.position.set(0, 0, -1.5); // Tip is at -1.5 Z
            firstPersonWand.add(tip);

            // 3D Crosshair
            crosshair3D = new THREE.Mesh(new THREE.RingGeometry(0.4, 0.5, 32), new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.6}));
            scene.add(crosshair3D);

            createEnemy();
            generateGridTemplates();
            updateHealthBars();
            requestAnimationFrame(gameLoop);
        }

        function createEnemy() {
            enemyModel = new THREE.Group();
            const headMat = new THREE.MeshStandardMaterial({ color: 0xaa00ff, roughness: 0.2, metalness: 0.8 });
            const head = new THREE.Mesh(new THREE.OctahedronGeometry(1.5), headMat);
            head.position.y = 6;
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const body = new THREE.Mesh(new THREE.ConeGeometry(2, 4, 4), bodyMat);
            body.rotation.z = Math.PI; body.rotation.y = Math.PI / 4; body.position.y = 3;

            const handGeo = new THREE.BoxGeometry(0.6, 2, 0.6);
            const lHand = new THREE.Mesh(handGeo, bodyMat); lHand.position.set(-2.5, 3, 0);
            const rHand = new THREE.Mesh(handGeo, bodyMat); rHand.position.set(2.5, 3, 0);

            enemyModel.add(head, body, lHand, rHand);
            enemyModel.position.set(0, 0, -50); 
            scene.add(enemyModel);

            enemyHitbox = new THREE.Mesh(new THREE.BoxGeometry(6, 8, 4), new THREE.MeshBasicMaterial({visible: false}));
            enemyHitbox.position.copy(enemyModel.position).add(new THREE.Vector3(0, 3, 0));
            scene.add(enemyHitbox);
        }

        // --- Host Input Handling ---
        let baseAlpha = null;
        let baseBeta = null;

        function handleControllerGyro(data) {
            if (data.reset) { baseAlpha = data.a; baseBeta = data.b; return; }
            if (baseAlpha === null) { baseAlpha = data.a; baseBeta = data.b; }

            // Calculate relative yaw (alpha)
            let alpha = data.a - baseAlpha;
            if (alpha > 180) alpha -= 360;
            if (alpha < -180) alpha += 360;

            // Map orientation directly to wand's local Euler rotation
            const rad = Math.PI / 180;
            // Phone held upright (Beta ~90). Pitch up -> Beta decreases. Pitch down -> Beta increases.
            const pitch = (data.b - baseBeta) * rad; 
            const yaw = alpha * rad;
            const roll = -data.g * rad;

            firstPersonWand.rotation.set(pitch, yaw, roll, 'YXZ');
        }

        function handleControllerState(data) {
            if (data.draw === 'start') {
                isDrawing = true;
                currentStrokes2D = [];
                currentStroke2D = [];
                
                // Clear old ink
                activeInkMeshes.forEach(m => scene.remove(m));
                activeInkMeshes = [];
                
                crosshair3D.material.color.setHex(0x00ffff);
                crosshair3D.scale.set(1.5, 1.5, 1.5);
            } else if (data.draw === 'end') {
                isDrawing = false;
                if (currentStroke2D.length > 0) currentStrokes2D.push(currentStroke2D);
                
                crosshair3D.material.color.setHex(0xffffff);
                crosshair3D.scale.set(1, 1, 1);
                
                recognizeGestureAndCast();
                
                // Fade out ink over 1 sec
                setTimeout(() => {
                    activeInkMeshes.forEach(m => scene.remove(m));
                    activeInkMeshes = [];
                }, 1000);
            }
        }

        // ==========================================
        // GESTURE AI & RAYCASTING (3D to 2D Projection)
        // ==========================================
        const GRID_SIZE = 8;
        let templates = {};

        function extractGridFeatures(ctx) {
            const imgData = ctx.getImageData(0, 0, 64, 64).data;
            const grid = new Array(GRID_SIZE * GRID_SIZE).fill(0);
            let maxVal = 0;
            for (let y = 0; y < 64; y++) {
                for (let x = 0; x < 64; x++) {
                    if (imgData[(y * 64 + x) * 4] > 128) {
                        const gx = Math.floor(x / (64 / GRID_SIZE));
                        const gy = Math.floor(y / (64 / GRID_SIZE));
                        grid[gy * GRID_SIZE + gx]++;
                        if (grid[gy * GRID_SIZE + gx] > maxVal) maxVal = grid[gy * GRID_SIZE + gx];
                    }
                }
            }
            return grid.map(v => maxVal > 0 ? v / maxVal : 0);
        }

        function generateGridTemplates() {
            const canvas = document.getElementById('debugCanvas');
            const ctx = canvas.getContext('2d');
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = 'white';

            const saveTpl = (name, drawFunc) => {
                ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 64, 64);
                ctx.beginPath(); drawFunc(ctx); ctx.stroke();
                templates[name] = extractGridFeatures(ctx);
            };

            saveTpl('fireball', c => { c.arc(32, 32, 28, 0, Math.PI*2); c.moveTo(32, 10); c.lineTo(32, 54); c.moveTo(10, 32); c.lineTo(54, 32); });
            saveTpl('gun', c => { c.arc(32, 32, 28, 0, Math.PI*2); c.moveTo(20, 44); c.lineTo(44, 44); c.lineTo(44, 20); });
            saveTpl('ghost', c => { c.arc(32, 32, 28, 0, Math.PI*2); c.arc(32, 26, 14, Math.PI, 0); c.lineTo(46, 48); c.lineTo(40, 42); c.lineTo(34, 48); c.lineTo(28, 42); c.lineTo(22, 48); c.lineTo(18, 42); c.closePath(); });
            saveTpl('karma', c => { c.arc(32, 32, 28, 0, Math.PI*2); c.arc(32, 20, 12, Math.PI/2, Math.PI*1.5); c.arc(32, 44, 12, -Math.PI/2, Math.PI/2); });
        }

        function recognizeGestureAndCast() {
            let minX = 9999, minY = 9999, maxX = -9999, maxY = -9999, ptsCount = 0;
            currentStrokes2D.forEach(s => s.forEach(p => {
                if(p.x < minX) minX = p.x; if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y; if(p.y > maxY) maxY = p.y;
                ptsCount++;
            }));
            if (ptsCount < 10) return; 

            const w = Math.max(maxX - minX, 1);
            const h = Math.max(maxY - minY, 1);
            const size = Math.max(w, h);
            
            const canvas = document.getElementById('debugCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 64, 64);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 5; ctx.lineCap = 'round';
            
            const scale = 50 / size; 
            const offsetX = 32 - (w * scale)/2;
            const offsetY = 32 - (h * scale)/2;

            currentStrokes2D.forEach(stroke => {
                ctx.beginPath();
                ctx.moveTo((stroke[0].x - minX) * scale + offsetX, (stroke[0].y - minY) * scale + offsetY);
                for(let i=1; i<stroke.length; i++) {
                    ctx.lineTo((stroke[i].x - minX) * scale + offsetX, (stroke[i].y - minY) * scale + offsetY);
                }
                ctx.stroke();
            });

            const userGrid = extractGridFeatures(ctx);
            let bestMatch = null, lowestDistance = Infinity;

            for (const [name, tplGrid] of Object.entries(templates)) {
                let dist = 0;
                for(let i=0; i<64; i++) dist += Math.abs(userGrid[i] - tplGrid[i]);
                if (dist < lowestDistance) { lowestDistance = dist; bestMatch = name; }
            }

            const updateStatus = (id, text, color) => {
                const els = isVRMode ? [document.querySelector('.vr-split-left #'+id), document.querySelector('.vr-split-right #'+id)] : [document.getElementById(id)];
                els.forEach(el => { if(el) { el.innerText = text; if(color) el.style.color = color; } });
            };

            if (lowestDistance > 25) { 
                updateStatus('spell-status', "FIZZLED!", "#888");
                updateStatus('sub-status', "Shape not recognized");
            } else {
                executeSpell(bestMatch);
            }
            setTimeout(() => { updateStatus('spell-status', ""); updateStatus('sub-status', ""); }, 2000);
        }

        // ==========================================
        // SPELL EXECUTION & EFFECTS
        // ==========================================
        function setStatus(main, sub, color) {
            const elsMain = isVRMode ? [document.querySelector('.vr-split-left #spell-status'), document.querySelector('.vr-split-right #spell-status')] : [document.getElementById('spell-status')];
            const elsSub = isVRMode ? [document.querySelector('.vr-split-left #sub-status'), document.querySelector('.vr-split-right #sub-status')] : [document.getElementById('sub-status')];
            elsMain.forEach(el => { if(el) { el.innerText = main; el.style.color = color; } });
            elsSub.forEach(el => { if(el) el.innerText = sub; });
        }

        function executeSpell(name) {
            const tipPos = new THREE.Vector3();
            firstPersonWand.children[1].getWorldPosition(tipPos); // Index 1 is the tip mesh

            if (name === 'fireball') {
                setStatus("FIREBALL", "Charging... (2s)", "#ff4400");
                const charge = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                scene.add(charge);
                let chargeInterval = setInterval(() => { firstPersonWand.children[1].getWorldPosition(charge.position); }, 16);

                setTimeout(() => {
                    clearInterval(chargeInterval); scene.remove(charge);
                    setStatus("FIRE!", "", "#ff4400");
                    const ball = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({color: 0xff2200}));
                    firstPersonWand.children[1].getWorldPosition(ball.position);
                    const velocity = crosshair3D.position.clone().sub(ball.position).normalize().multiplyScalar(40);
                    scene.add(ball);
                    projectiles.push({ mesh: ball, vel: velocity, type: 'fireball', life: 5 });
                }, 2000);
            }
            else if (name === 'gun') {
                setStatus("WAND GUN", "Summoning... (3s)", "#ffff00");
                setTimeout(() => {
                    setStatus("FIRING!", "", "#ffff00");
                    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1), new THREE.MeshLambertMaterial({color: 0x222222}));
                    scene.add(gun);
                    let gunTrack = setInterval(() => {
                        firstPersonWand.children[1].getWorldPosition(gun.position);
                        gun.position.add(new THREE.Vector3(0.5, 0.5, 0));
                        gun.lookAt(crosshair3D.position);
                    }, 16);

                    let shots = 0;
                    const interval = setInterval(() => {
                        if (shots >= 30) { clearInterval(interval); clearInterval(gunTrack); scene.remove(gun); setStatus("","", "#fff"); return; }
                        const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0xffff00}));
                        bullet.position.copy(gun.position);
                        const vel = crosshair3D.position.clone().sub(gun.position).normalize().multiplyScalar(60);
                        scene.add(bullet);
                        projectiles.push({ mesh: bullet, vel: vel, type: 'bullet', life: 3 });
                        shots++;
                    }, 500);
                }, 3000);
            }
            else if (name === 'ghost') {
                setStatus("GHOST SUMMONED", "Haunting enemy... (10s)", "#ffffff");
                const ghostGrp = new THREE.Group();
                const gMat = new THREE.MeshLambertMaterial({color: 0xdddddd, transparent: true, opacity: 0.7});
                const body = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 3, 16), gMat);
                const head = new THREE.Mesh(new THREE.SphereGeometry(1.5), gMat); head.position.y = 1.5;
                ghostGrp.add(body, head);
                ghostGrp.position.copy(tipPos);
                scene.add(ghostGrp);
                activeGhosts.push({ mesh: ghostGrp, speed: 5, life: 15 });
            }
            else if (name === 'karma') {
                setStatus("KARMA HEAL", "+30 HP", "#00ffaa");
                pHealth = Math.min(100, pHealth + 30);
                updateHealthBars();
            }
        }

        // ==========================================
        // MAIN LOOP
        // ==========================================
        function updateHealthBars() {
            document.querySelectorAll('.player-hp-bar').forEach(el => el.style.width = pHealth + '%');
            document.querySelectorAll('.enemy-hp-bar').forEach(el => el.style.width = eHealth + '%');
        }

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            const dt = (time - lastTime) / 1000;
            lastTime = time;
            if(!scene) return;

            // Update 3D Raycast Crosshair & Drawing
            if(firstPersonWand) {
                // Get absolute world direction the wand is pointing
                const wandWorldDir = new THREE.Vector3(0, 0, -1).applyQuaternion(firstPersonWand.getWorldQuaternion());
                const wandPos = new THREE.Vector3();
                firstPersonWand.children[1].getWorldPosition(wandPos); // Tip
                
                // Raycast to a virtual drawing plane 25 units in front of the camera rig
                const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 25);
                const ray = new THREE.Ray(wandPos, wandWorldDir);
                const target3D = new THREE.Vector3();
                
                if(ray.intersectPlane(plane, target3D)) {
                    crosshair3D.position.copy(target3D);
                    crosshair3D.lookAt(cameraRig.position);

                    // Project to 2D for gesture AI
                    const proj = target3D.clone().project(camera);
                    const cX = (proj.x + 1) / 2 * window.innerWidth;
                    const cY = -(proj.y - 1) / 2 * window.innerHeight;

                    // Camera Spin logic for Normal Mode
                    if (!isVRMode) {
                        if (proj.x < -0.7) cameraRig.rotation.y += 1.0 * dt;
                        if (proj.x > 0.7) cameraRig.rotation.y -= 1.0 * dt;
                        if (proj.y < -0.7) cameraRig.rotation.x -= 0.8 * dt;
                        if (proj.y > 0.7) cameraRig.rotation.x += 0.8 * dt;
                        // Clamp pitch
                        cameraRig.rotation.x = Math.max(-0.6, Math.min(0.6, cameraRig.rotation.x));
                    }

                    if (isDrawing) {
                        currentStroke2D.push({x: cX, y: cY});
                        // Add 3D Ink Sphere
                        const ink = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color: 0x00ffff}));
                        ink.position.copy(target3D);
                        scene.add(ink);
                        activeInkMeshes.push(ink);
                    }
                }
            }

            // Enemy AI & Physics
            if (!isEnemyDead && enemyModel) {
                enemyModel.position.y = Math.sin(time / 1000) * 1.5;
                enemyHitbox.position.copy(enemyModel.position).add(new THREE.Vector3(0, 3, 0));
                
                if (Math.random() < 0.01) {
                    const blast = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0xff00ff}));
                    blast.position.copy(enemyModel.position).add(new THREE.Vector3(0, 5, 0));
                    const vel = cameraRig.position.clone().sub(blast.position).normalize().multiplyScalar(20);
                    scene.add(blast);
                    projectiles.push({ mesh: blast, vel: vel, type: 'enemy', life: 6 });
                }
            } else if (isEnemyDead) {
                enemyDeathTimer -= dt;
                if (enemyDeathTimer <= 0) {
                    isEnemyDead = false; enemyModel.visible = true; eHealth = 100; updateHealthBars();
                    setStatus("", "", "#fff");
                }
            }

            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.life -= dt;
                
                let hit = false;
                if (p.type !== 'enemy' && !isEnemyDead) {
                    const box = new THREE.Box3().setFromObject(enemyHitbox);
                    if (box.containsPoint(p.mesh.position)) {
                        hit = true; eHealth -= (p.type === 'fireball' ? 25 : 5);
                        enemyModel.children.forEach(c => c.material.emissive && c.material.emissive.setHex(0xffffff));
                        setTimeout(() => enemyModel.children.forEach(c => c.material.emissive && c.material.emissive.setHex(0x000000)), 100);
                        
                        if (eHealth <= 0) {
                            isEnemyDead = true; eHealth = 0; enemyModel.visible = false;
                            setStatus("ENEMY KILLED!", "Respawning in 15s...", "#ff0044");
                            enemyDeathTimer = 15;
                        }
                        updateHealthBars();
                    }
                } else if (p.type === 'enemy') {
                    if (p.mesh.position.z > -2 && Math.abs(p.mesh.position.x) < 5) {
                        hit = true; pHealth -= 10;
                        if (pHealth <= 0) { pHealth = 100; setStatus("YOU DIED!", "", "#ff0000"); }
                        updateHealthBars();
                    }
                }
                
                if (hit || p.life <= 0 || p.mesh.position.y < -5) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            }

            // Ghosts
            for (let i = activeGhosts.length - 1; i >= 0; i--) {
                let g = activeGhosts[i];
                if (!isEnemyDead) {
                    const dir = enemyModel.position.clone().sub(g.mesh.position).normalize();
                    g.mesh.position.add(dir.multiplyScalar(g.speed * dt));
                    g.mesh.position.y = 2 + Math.sin(time/300);
                    
                    if (g.mesh.position.distanceTo(enemyModel.position) < 5) {
                        isEnemyDead = true; eHealth = 0; enemyModel.visible = false;
                        setStatus("ENEMY KILLED!", "Respawning in 15s...", "#ff0044");
                        enemyDeathTimer = 15; updateHealthBars();
                        scene.remove(g.mesh); activeGhosts.splice(i, 1); continue;
                    }
                }
                g.life -= dt;
                if (g.life <= 0) { scene.remove(g.mesh); activeGhosts.splice(i, 1); }
            }

            // RENDER LOGIC
            if (isVRMode) {
                stereoCamera.update(camera);
                const size = renderer.getSize(new THREE.Vector2());
                const w = size.width / 2, h = size.height;

                renderer.setScissorTest(true);
                // Left Eye
                renderer.setScissor(0, 0, w, h);
                renderer.setViewport(0, 0, w, h);
                renderer.render(scene, stereoCamera.cameraL);
                // Right Eye
                renderer.setScissor(w, 0, w, h);
                renderer.setViewport(w, 0, w, h);
                renderer.render(scene, stereoCamera.cameraR);
                renderer.setScissorTest(false);
            } else {
                renderer.render(scene, camera);
            }
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>

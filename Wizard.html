<!DOCTYPE html>
<html lang="en">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        
        body { margin: 0; overflow: hidden; background: #010103; touch-action: none; user-select: none; font-family: 'Orbitron', sans-serif; color: white; }
        
        /* Glassmorphism & Neon */
        .glass-panel { background: rgba(5, 5, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(150, 0, 255, 0.4); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.9); }
        .neon-text { font-family: 'Cinzel', serif; text-shadow: 0 0 10px #a200ff, 0 0 20px #a200ff, 0 0 40px #ff00ff; }
        .neon-btn { transition: all 0.2s ease; border: 1px solid #a200ff; box-shadow: 0 0 15px rgba(162,0,255,0.4) inset, 0 0 15px rgba(162,0,255,0.4); }
        .neon-btn:active { transform: scale(0.95); background: rgba(162, 0, 255, 0.2); box-shadow: 0 0 30px #a200ff inset, 0 0 30px #a200ff; }

        /* Magical Night Background for UI */
        .magical-bg { background: linear-gradient(135deg, #010105, #0a001a, #1a0033, #001133); background-size: 300% 300%; animation: gradientShift 20s ease infinite; }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .magical-particles { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(circle, #ffffff 1px, transparent 1.5px), radial-gradient(circle, #a200ff 2px, transparent 2.5px); background-size: 100px 100px, 150px 150px; background-position: 0 0, 50px 50px; opacity: 0.5; animation: particleDrift 30s linear infinite; }
        @keyframes particleDrift { 0% { background-position: 0px 0px, 50px 50px; } 100% { background-position: 100px -100px, 150px -50px; } }

        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; display: none; }
        .ui-container { position: relative; width: 100%; height: 100%; }
        .vr-split-left { position: absolute; left: 0; width: 50%; height: 100%; transform: scale(0.9); transform-origin: center; }
        .vr-split-right { position: absolute; left: 50%; width: 50%; height: 100%; transform: scale(0.9); transform-origin: center; }
        
        #spell-status { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 4rem; font-family: 'Cinzel', serif; font-weight: 900; text-shadow: 0 0 30px rgba(0,0,0,1), 0 0 10px; text-align: center; letter-spacing: 6px; z-index: 20; width: 100%; }
        #sub-status { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 15px rgba(0,0,0,1); z-index: 20; color: #a200ff; letter-spacing: 2px; }

        /* Health Bars */
        .health-wrapper { position: absolute; top: 30px; width: 350px; height: 20px; background: rgba(0,0,0,0.9); border: 2px solid #222; border-radius: 4px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,1); }
        .player-health-pos { left: 50%; transform: translateX(-110%); border-color: #00ffff; }
        .enemy-health-pos { left: 50%; transform: translateX(10%); border-color: #a200ff; }
        .health-fill { height: 100%; width: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .player-hp-bar { background: linear-gradient(90deg, #0044ff, #00ffff); box-shadow: 0 0 15px #00ffff; }
        .enemy-hp-bar { background: linear-gradient(90deg, #5500aa, #ff00ff); box-shadow: 0 0 15px #ff00ff; }

        /* Controller (Wand) UI */
        #controllerUI { display: none; height: 100vh; width: 100vw; flex-direction: column; justify-content: space-between; padding: 40px 20px; background: radial-gradient(circle at center, #0a001a 0%, #000 100%); }
        #btnCast { width: 100%; flex-grow: 1; margin: 20px 0; background: linear-gradient(135deg, #1a0033, #050011); border: 4px solid #a200ff; border-radius: 40px; color: #a200ff; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(162,0,255,0.3) inset, 0 10px 40px rgba(0,0,0,0.9); transition: all 0.1s; text-align: center; }
        #btnCast.active { background: #a200ff; color: #fff; transform: scale(0.97); box-shadow: 0 0 80px #a200ff; border-color: #fff; }
        #btnCast.waiting { border-color: #00ffff; color: #00ffff; box-shadow: 0 0 60px rgba(0,255,255,0.5) inset; animation: pulse 0.5s infinite alternate; }
        
        @keyframes pulse { from { opacity: 1; transform: scale(0.99); } to { opacity: 0.8; transform: scale(1); } }

        #debugCanvas { display: none; }
    </style>
</head>
<body>

    <!-- Setup / Connection Menu -->
    <div id="setupUI" class="absolute z-20 w-full h-full flex flex-col items-center justify-center magical-bg overflow-hidden">

        <div class="glass-panel p-10 rounded-3xl z-10 flex flex-col items-center max-w-2xl w-11/12 text-center">

            <div id="roleSelection" class="flex flex-col gap-5 w-full">

                    🖥️ START AS SCREEN (Normal)
                </button>
                <button onclick="requestHostSensors(true)" class="neon-btn border-cyan-500 bg-cyan-900/30 px-8 py-5 rounded-2xl text-xl font-bold w-full text-cyan-300 shadow-[0_0_20px_rgba(0,255,255,0.4)] flex items-center justify-center gap-3">
                    🥽 START AS VR HEADSET (Split)
                </button>
                
                <div class="flex flex-col md:flex-row gap-3 mt-6 pt-6 border-t border-purple-900/50">
                    <input type="text" id="joinIdInput" placeholder="GAME ID" class="bg-black/60 border border-purple-800 rounded-2xl px-4 py-4 text-white focus:border-purple-400 text-center uppercase text-3xl font-bold flex-grow outline-none tracking-widest">
                    <button onclick="startJoinFromInput()" class="bg-purple-600 text-white px-8 py-4 rounded-2xl font-bold text-xl hover:bg-purple-500 transition shadow-[0_0_15px_#a200ff]">JOIN WAND</button>
                </div>
            </div>

            <div id="hostWaitingUI" class="hidden flex-col items-center w-full">
                <h2 class="text-3xl mb-4 font-bold text-purple-100 font-['Cinzel']">Scan to Connect Wand</h2>
                <div class="bg-white p-4 rounded-2xl mb-6"><div id="qrcode"></div></div>
                <div class="bg-black/60 px-10 py-4 rounded-2xl border border-purple-500/50 shadow-[0_0_20px_rgba(162,0,255,0.2)]">
                    <p class="text-purple-400 text-5xl tracking-[0.4em] font-black" id="displayGameId">---</p>
                </div>
            </div>
            
            <div id="clientSensorUI" class="hidden flex-col items-center w-full">
                <h2 class="text-4xl font-bold text-purple-400 mb-4 font-['Cinzel']">Wand Ready</h2>
                <p class="text-gray-300 text-lg mb-8">Unlock absolute freedom. Hold your phone like a magic wand. You must grant motion sensor access.</p>
                <button onclick="requestWandSensorsAndConnect()" class="w-full neon-btn bg-purple-500/20 text-purple-300 px-8 py-6 rounded-2xl font-bold text-2xl shadow-[0_0_30px_#a200ff]">
                    ✨ ACTIVATE WAND ✨
                </button>
            </div>
        </div>
    </div>

    <!-- 3D Game UI Overlay -->
    <div id="ui-layer">
        <div id="ui-base" class="ui-container">
            <div class="health-wrapper player-health-pos"><div class="health-fill player-hp-bar"></div></div>
            <div class="health-wrapper enemy-health-pos"><div class="health-fill enemy-hp-bar"></div></div>
            <div id="spell-status"></div>
            <div id="sub-status"></div>
        </div>
    </div>

    <canvas id="debugCanvas" width="32" height="32"></canvas>

    <!-- Mobile Wand UI -->
    <div id="controllerUI">
        <div class="flex justify-between items-center px-4">
            <span class="text-purple-400 font-bold tracking-widest text-lg" id="debugGyro">🟢 MAGIC ACTIVE</span>
            <button onclick="recenterWand()" class="border-2 border-purple-700 bg-purple-900/50 text-purple-100 px-6 py-3 rounded-xl font-bold active:bg-purple-600">RECENTER</button>
        </div>
        
        <div id="btnCast">
            <span class="text-5xl font-black block mb-2 tracking-wider font-['Cinzel']">HOLD</span>
            <span class="text-xl font-bold tracking-[0.3em] opacity-80">TO DRAW MAGIC</span>
        </div>
        
        <p class="text-center text-purple-800 font-bold text-sm tracking-[0.3em]">POINT TOP OF PHONE AT SCREEN</p>
    </div>

    <script>
        // ==========================================
        // P2P NETWORKING (PeerJS)
        // ==========================================
        let peer = null;
        let connection = null;
        let pendingJoinId = null;
        let isVRMode = false;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                pendingJoinId = joinId;
                document.getElementById('roleSelection').classList.add('hidden');
                document.getElementById('clientSensorUI').classList.remove('hidden');
                document.getElementById('clientSensorUI').style.display = 'flex';
            }
        };

        function requestHostSensors(vrEnabled) {
            isVRMode = vrEnabled;
            if (isVRMode && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') startHost();
                    else alert('VR mode requires motion sensors to look around.');
                }).catch(console.error);
            } else { startHost(); }
        }

        function startHost() {
            if(isVRMode) {
                const base = document.getElementById('ui-base');
                base.className = "vr-split-left";
                const clone = base.cloneNode(true);
                clone.id = "ui-clone";
                clone.className = "vr-split-right";
                document.getElementById('ui-layer').appendChild(clone);
            }

            document.getElementById('roleSelection').classList.add('hidden');
            document.getElementById('hostWaitingUI').classList.remove('hidden');
            document.getElementById('hostWaitingUI').style.display = 'flex';
            
            const gameId = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('displayGameId').innerText = gameId;

            const joinUrl = `${window.location.href.split('?')[0]}?join=${gameId}`;
            new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 220, height: 220, colorDark: "#330066", colorLight: "#ffffff" });

            peer = new Peer('vrwizmid-' + gameId);
            peer.on('connection', (conn) => {
                connection = conn;
                document.getElementById('setupUI').style.display = 'none';
                initGame(); 
                
                conn.on('data', (data) => {
                    if(data.type === 'quat') handleControllerQuaternion(data);
                    if(data.type === 'state') handleControllerState(data);
                });
                conn.on('close', () => { alert("Wand disconnected. Refresh page to restart."); window.location.reload(); });
            });
        }

        function startJoinFromInput() {
            const id = document.getElementById('joinIdInput').value.trim().toUpperCase();
            if(id) {
                pendingJoinId = id;
                document.getElementById('roleSelection').classList.add('hidden');
                document.getElementById('clientSensorUI').classList.remove('hidden');
                document.getElementById('clientSensorUI').style.display = 'flex';
            }
        }

        function requestWandSensorsAndConnect() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') connectWand();
                    else alert('Wand requires motion sensor permission to function.');
                }).catch(console.error);
            } else { connectWand(); }
        }

        function connectWand() {
            document.getElementById('clientSensorUI').innerHTML = "<h2 class='text-5xl text-purple-400 animate-pulse font-bold font-[\"Cinzel\"]'>Summoning...</h2>";
            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect('vrwizmid-' + pendingJoinId, { reliable: false });
                connection.on('open', () => {
                    document.getElementById('setupUI').style.display = 'none';
                    document.getElementById('controllerUI').style.display = 'flex';
                    initWandLogic();
                });
            });
        }

        // ==========================================
        // WAND LOGIC
        // ==========================================
        function recenterWand() {
            if(connection && connection.open) connection.send({ type: 'quat', reset: true });
            const debug = document.getElementById('debugGyro');
            debug.innerText = "🟢 RECENTERED!";
            debug.style.color = "#00ff00";
            setTimeout(() => { debug.innerText = "🟢 MAGIC ACTIVE"; debug.style.color = "#a200ff"; }, 1500);
        }

        function initWandLogic() {
            const btnCast = document.getElementById('btnCast');
            let drawActive = false;

            window.addEventListener('deviceorientation', (e) => {
                if(e.alpha === null) return;
                const euler = new THREE.Euler(
                    THREE.MathUtils.degToRad(e.beta), 
                    THREE.MathUtils.degToRad(e.alpha), 
                    -THREE.MathUtils.degToRad(e.gamma), 
                    'YXZ'
                );
                const phoneQuat = new THREE.Quaternion().setFromEuler(euler);
                connection.send({ type: 'quat', x: phoneQuat.x, y: phoneQuat.y, z: phoneQuat.z, w: phoneQuat.w });
            });

            const startDraw = (e) => { 
                if(e) e.preventDefault(); 
                drawActive = true; 
                btnCast.className = 'active'; 
                btnCast.innerHTML = "<span class='text-5xl font-black block mb-2 font-[\"Cinzel\"]'>DRAWING</span><span class='text-xl font-bold tracking-[0.3em]'>IN THE AIR</span>"; 
                connection.send({ type: 'state', draw: 'start' }); 
            };
            
            const endDraw = (e) => { 
                if(e) e.preventDefault(); 
                drawActive = false; 
                btnCast.className = 'waiting'; 
                btnCast.innerHTML = "<span class='text-4xl font-black block mb-2 font-[\"Cinzel\"]'>WAITING...</span><span class='text-sm tracking-[0.2em]'>PRESS TO CONTINUE</span>"; 
                connection.send({ type: 'state', draw: 'end' }); 
                
                setTimeout(() => {
                    if(!drawActive) {
                        btnCast.className = '';
                        btnCast.innerHTML = "<span class='text-5xl font-black block mb-2 tracking-wider font-[\"Cinzel\"]'>HOLD</span><span class='text-xl font-bold tracking-[0.3em] opacity-80'>TO DRAW MAGIC</span>"; 
                    }
                }, 2000);
            };

            btnCast.addEventListener('touchstart', startDraw, {passive: false});
            btnCast.addEventListener('touchend', endDraw, {passive: false});
            btnCast.addEventListener('touchcancel', endDraw, {passive: false});
            
            let isMouseDown = false; let simEuler = new THREE.Euler(0,0,0,'YXZ');
            btnCast.addEventListener('mousedown', (e) => { isMouseDown = true; startDraw(e); });
            window.addEventListener('mouseup', (e) => { if(isMouseDown){ isMouseDown=false; endDraw(e); } });
            window.addEventListener('mousemove', (e) => {
                if(isMouseDown) {
                    simEuler.y -= e.movementX * 0.01; simEuler.x -= e.movementY * 0.01;
                    const q = new THREE.Quaternion().setFromEuler(simEuler);
                    connection.send({ type: 'quat', x: q.x, y: q.y, z: q.z, w: q.w });
                }
            });
        }


        // ==========================================
        // HOST 3D ENGINE & GRAPHICS
        // ==========================================
        let scene, camera, cameraRig, renderer, stereoCamera;
        let wandPivot, visualWand, crosshair3D; 
        
        let enemyModel, enemyHitbox;
        let wizardStaffCore, wizardRings = []; // For animation
        let towerBeacon; // For animation
        
        let projectiles = [], activeGhosts = [];
        let lastTime = 0;
        
        let pHealth = 100, eHealth = 100;
        let isEnemyDead = false; let enemyDeathTimer = 0;
        
        let hostStartQuat = null; 
        let isDrawing = false;
        let drawTimeout = null; 
        let currentStrokes2D = []; 
        let currentStroke2D = [];
        let activeInkMeshes = []; 
        let wandBaseQuat = null; 
        
        let waterMesh, starsSystem;

        function initGame() {
            document.getElementById('ui-layer').style.display = 'block';

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02040a); // Midnight Void
            scene.fog = new THREE.FogExp2(0x02040a, 0.006);

            cameraRig = new THREE.Group();
            cameraRig.position.set(0, 5, 0);
            scene.add(cameraRig);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            cameraRig.add(camera);

            if(isVRMode) {
                stereoCamera = new THREE.StereoCamera();
                stereoCamera.eyeSep = 0.064;
                window.addEventListener('deviceorientation', (e) => {
                    if(e.alpha !== null) {
                        const euler = new THREE.Euler(THREE.MathUtils.degToRad(e.beta - 90), THREE.MathUtils.degToRad(e.alpha), -THREE.MathUtils.degToRad(e.gamma), 'YXZ');
                        const q = new THREE.Quaternion().setFromEuler(euler);
                        if(!hostStartQuat) hostStartQuat = q.clone().invert();
                        cameraRig.quaternion.copy(hostStartQuat).multiply(q);
                    }
                });
            }

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Cinematic Night Lighting
            const moonLight = new THREE.DirectionalLight(0x88bbff, 0.6);
            moonLight.position.set(100, 200, 50);
            moonLight.castShadow = true;
            scene.add(moonLight);
            
            // Magical Fill Light from the Tower
            const towerLight = new THREE.PointLight(0xff00ff, 1.5, 200);
            towerLight.position.set(0, 80, -100);
            scene.add(towerLight);
            
            scene.add(new THREE.AmbientLight(0x111122, 1.0));

            // Starfield
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(2000 * 3);
            for(let i=0; i<6000; i++) starPos[i] = (Math.random() - 0.5) * 600;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.7, transparent: true, opacity: 0.8});
            starsSystem = new THREE.Points(starGeo, starMat);
            scene.add(starsSystem);

            // Dark Maldives Water
            const waterGeo = new THREE.PlaneGeometry(800, 800, 64, 64); 
            const waterMat = new THREE.MeshStandardMaterial({ color: 0x001133, roughness: 0.1, metalness: 0.8, flatShading: true });
            waterMesh = new THREE.Mesh(waterGeo, waterMat);
            waterMesh.rotation.x = -Math.PI / 2; waterMesh.position.y = -1; scene.add(waterMesh);

            // Build The Wizard Tower (Background)
            const towerGroup = new THREE.Group();
            
            const towerBaseMat = new THREE.MeshStandardMaterial({color: 0x11111a, roughness: 0.9});
            const towerBase = new THREE.Mesh(new THREE.CylinderGeometry(12, 18, 80, 16), towerBaseMat);
            towerBase.position.y = 40;
            towerGroup.add(towerBase);
            
            const towerRoofMat = new THREE.MeshStandardMaterial({color: 0x050510, roughness: 0.7});
            const towerRoof = new THREE.Mesh(new THREE.ConeGeometry(15, 30, 16), towerRoofMat);
            towerRoof.position.y = 95;
            towerGroup.add(towerRoof);

            const beaconGeo = new THREE.OctahedronGeometry(4);
            const beaconMat = new THREE.MeshStandardMaterial({color: 0xff00ff, emissive: 0xa200ff, emissiveIntensity: 2, wireframe: true});
            towerBeacon = new THREE.Mesh(beaconGeo, beaconMat);
            towerBeacon.position.y = 115;
            towerGroup.add(towerBeacon);
            
            // Halo rings around tower
            const tRingMat = new THREE.MeshBasicMaterial({color: 0xff00ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide});
            const tRing = new THREE.Mesh(new THREE.TorusGeometry(18, 0.2, 8, 64), tRingMat);
            tRing.rotation.x = Math.PI/2; tRing.position.y = 80;
            towerGroup.add(tRing);

            towerGroup.position.set(0, -10, -120); // Far background
            scene.add(towerGroup);

            // The Absolute Wand Setup
            wandPivot = new THREE.Group();
            cameraRig.add(wandPivot);

            const wandMat = new THREE.MeshStandardMaterial({color: 0x050505, metalness: 0.9, roughness: 0.2});
            visualWand = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.06, 2.0, 16), wandMat);
            visualWand.rotateX(-Math.PI / 2); 
            visualWand.position.set(1.2, -0.8, -1.2); 
            wandPivot.add(visualWand);

            const tipMat = new THREE.MeshBasicMaterial({color: 0x00ffff});
            const tip = new THREE.Mesh(new THREE.OctahedronGeometry(0.08), tipMat);
            tip.position.set(1.2, -0.8, -2.2); 
            wandPivot.add(tip);

            // 3D Target Crosshair
            crosshair3D = new THREE.Mesh(new THREE.RingGeometry(0.6, 0.8, 32), new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.3}));
            scene.add(crosshair3D);

            createGrandAvatar();
            generateAI_Templates();
            updateHealthBars();
            requestAnimationFrame(gameLoop);
        }

        function createGrandAvatar() {
            enemyModel = new THREE.Group();
            
            // 1. Dark Robes (Layered Cylinders & Cones)
            const robeMat = new THREE.MeshStandardMaterial({ color: 0x0a0011, roughness: 0.9, flatShading: true });
            const skirt = new THREE.Mesh(new THREE.CylinderGeometry(3, 6, 12, 12, 1, true), robeMat);
            skirt.position.y = 6;
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 4, 8, 12, 1, true), robeMat);
            torso.position.y = 15;
            const shoulders = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 6, 5, 12), robeMat);
            shoulders.position.y = 20;
            
            // 2. Hood & Glowing Face
            const hood = new THREE.Mesh(new THREE.ConeGeometry(3, 5, 12, 1, true), robeMat);
            hood.position.y = 24;
            
            const faceVoid = new THREE.Mesh(new THREE.SphereGeometry(1.8), new THREE.MeshBasicMaterial({color: 0x000000}));
            faceVoid.position.set(0, 23.5, 0.5);
            
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xff00ff});
            const lEye = new THREE.Mesh(new THREE.SphereGeometry(0.3), eyeMat); lEye.position.set(-0.6, 23.8, 2);
            const rEye = new THREE.Mesh(new THREE.SphereGeometry(0.3), eyeMat); rEye.position.set(0.6, 23.8, 2);

            // 3. Imposing Magical Staff
            const staffGrp = new THREE.Group();
            staffGrp.position.set(6, 10, 3);
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 20), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.8}));
            pole.position.y = 10;
            
            wizardStaffCore = new THREE.Mesh(new THREE.IcosahedronGeometry(2), new THREE.MeshStandardMaterial({color: 0xff00ff, emissive: 0xa200ff, wireframe: true}));
            wizardStaffCore.position.y = 22;
            const innerCore = new THREE.Mesh(new THREE.OctahedronGeometry(1), new THREE.MeshBasicMaterial({color: 0xffffff}));
            innerCore.position.y = 22;
            
            const staffLight = new THREE.PointLight(0xff00ff, 2, 50);
            staffLight.position.y = 22;
            
            staffGrp.add(pole, wizardStaffCore, innerCore, staffLight);

            // 4. Magical Runes / Orbital Rings
            const haloMat = new THREE.MeshBasicMaterial({color: 0xa200ff, side: THREE.DoubleSide, transparent: true, opacity: 0.6});
            for(let i=0; i<4; i++) {
                const ring = new THREE.Mesh(new THREE.TorusGeometry(8 + i*1.5, 0.05, 8, 64), haloMat);
                ring.position.y = 15;
                enemyModel.add(ring);
                wizardRings.push({mesh: ring, sx: (Math.random()-0.5)*2, sy: (Math.random()-0.5)*2});
            }

            enemyModel.add(skirt, torso, shoulders, hood, faceVoid, lEye, rEye, staffGrp);
            enemyModel.position.set(0, 10, -60); // Hovering high in front of tower
            scene.add(enemyModel);

            enemyHitbox = new THREE.Mesh(new THREE.BoxGeometry(12, 25, 10), new THREE.MeshBasicMaterial({visible: false}));
            scene.add(enemyHitbox);
        }

        // --- Controller Input Handling ---
        function handleControllerQuaternion(data) {
            if (data.reset) { wandBaseQuat = null; return; }
            const phoneQ = new THREE.Quaternion(data.x, data.y, data.z, data.w);
            if (!wandBaseQuat) wandBaseQuat = phoneQ.clone().invert();
            const finalQ = wandBaseQuat.clone().multiply(phoneQ);
            wandPivot.quaternion.copy(finalQ);
        }

        function handleControllerState(data) {
            if (data.draw === 'start') {
                if(drawTimeout) { clearTimeout(drawTimeout); drawTimeout = null; }
                isDrawing = true; currentStroke2D = [];
                crosshair3D.material.opacity = 1.0;
                crosshair3D.material.color.setHex(0x00ffff);
                crosshair3D.scale.set(1.5, 1.5, 1.5);
                
            } else if (data.draw === 'end') {
                isDrawing = false;
                if (currentStroke2D.length > 0) currentStrokes2D.push(currentStroke2D);
                
                crosshair3D.material.opacity = 0.5;
                crosshair3D.material.color.setHex(0xffffff);
                crosshair3D.scale.set(1, 1, 1);
                
                setStatus("WAITING...", "Draw more or wait 2s...", "#a200ff");
                
                // EXACTLY 2 SECOND WAIT
                drawTimeout = setTimeout(() => { finalizeDrawing(); }, 2000);
            }
        }

        function finalizeDrawing() {
            setStatus("", "", "#fff");
            drawTimeout = null;
            if(currentStrokes2D.length > 0) recognizeGestureAndCast();
            
            // Clear Ink
            currentStrokes2D = [];
            activeInkMeshes.forEach(m => { scene.remove(m.black); scene.remove(m.glow); });
            activeInkMeshes = [];
        }

        // ==========================================
        // GESTURE AI (32x32 Point Cloud)
        // ==========================================
        const GRID = 32;
        let templates = {};

        function renderToGridAndExtract(ctx, strokes, minX, minY, size) {
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, GRID, GRID);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            const scale = (GRID * 0.8) / Math.max(size, 1); 
            const offsetX = (GRID / 2) - ((maxX - minX) * scale / 2);
            const offsetY = (GRID / 2) - ((maxY - minY) * scale / 2);

            strokes.forEach(stroke => {
                if(stroke.length < 2) return;
                ctx.beginPath();
                ctx.moveTo((stroke[0].x - minX) * scale + offsetX, (stroke[0].y - minY) * scale + offsetY);
                for(let i=1; i<stroke.length; i++) ctx.lineTo((stroke[i].x - minX) * scale + offsetX, (stroke[i].y - minY) * scale + offsetY);
                ctx.stroke();
            });

            const imgData = ctx.getImageData(0, 0, GRID, GRID).data;
            const grid = new Array(GRID * GRID).fill(0);
            for(let i=0; i<imgData.length; i+=4) if(imgData[i] > 128) grid[i/4] = 1;
            return grid;
        }

        let minX = 0, minY = 0, maxX = 64, maxY = 64; 

        function generateAI_Templates() {
            const canvas = document.getElementById('debugCanvas');
            const ctx = canvas.getContext('2d');
            const save = (name, drawFn) => {
                ctx.fillStyle = 'black'; ctx.fillRect(0, 0, GRID, GRID);
                ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                ctx.beginPath(); drawFn(ctx); ctx.stroke();
                const imgData = ctx.getImageData(0, 0, GRID, GRID).data;
                const grid = new Array(GRID * GRID).fill(0);
                for(let i=0; i<imgData.length; i+=4) if(imgData[i] > 128) grid[i/4] = 1;
                templates[name] = grid;
            };

            save('fireball', c => { c.arc(16, 16, 12, 0, Math.PI*2); c.moveTo(16, 4); c.lineTo(16, 28); c.moveTo(4, 16); c.lineTo(28, 16); });
            save('gun', c => { c.arc(16, 16, 12, 0, Math.PI*2); c.moveTo(10, 22); c.lineTo(22, 22); c.lineTo(22, 10); });
            save('ghost', c => { c.arc(16, 16, 12, 0, Math.PI*2); c.arc(16, 13, 6, Math.PI, 0); c.lineTo(22, 24); c.lineTo(19, 21); c.lineTo(16, 24); c.lineTo(13, 21); c.lineTo(10, 24); c.closePath(); });
            save('karma', c => { c.arc(16, 16, 12, 0, Math.PI*2); c.arc(16, 10, 6, Math.PI/2, Math.PI*1.5); c.arc(16, 22, 6, -Math.PI/2, Math.PI/2); });
        }

        function recognizeGestureAndCast() {
            minX = 9999; minY = 9999; maxX = -9999; maxY = -9999;
            let ptsCount = 0;
            currentStrokes2D.forEach(s => s.forEach(p => {
                if(p.x < minX) minX = p.x; if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y; if(p.y > maxY) maxY = p.y;
                ptsCount++;
            }));
            if (ptsCount < 10) return; 

            const size = Math.max(maxX - minX, maxY - minY, 1);
            const canvas = document.getElementById('debugCanvas');
            const ctx = canvas.getContext('2d');
            const userGrid = renderToGridAndExtract(ctx, currentStrokes2D, minX, minY, size);

            let bestMatch = null, lowestDist = Infinity;
            for (const [name, tplGrid] of Object.entries(templates)) {
                let diff = 0; let totalInk = 0;
                for(let i=0; i<GRID*GRID; i++) {
                    if(userGrid[i] !== tplGrid[i]) diff++;
                    if(tplGrid[i] === 1) totalInk++;
                }
                let score = diff / Math.max(totalInk, 1); 
                if (score < lowestDist) { lowestDist = score; bestMatch = name; }
            }

            if (lowestDist > 2.0) setStatus("FIZZLED!", "Magic unstable...", "#ff0044");
            else executeSpell(bestMatch);
            setTimeout(() => setStatus("",""), 2000);
        }

        // ==========================================
        // SPELLS & EFFECTS
        // ==========================================
        function setStatus(main, sub, color) {
            const mEls = isVRMode ? [document.querySelector('.vr-split-left #spell-status'), document.querySelector('.vr-split-right #spell-status')] : [document.getElementById('spell-status')];
            const sEls = isVRMode ? [document.querySelector('.vr-split-left #sub-status'), document.querySelector('.vr-split-right #sub-status')] : [document.getElementById('sub-status')];
            mEls.forEach(el => { if(el) { el.innerText = main; el.style.color = color || '#fff'; } });
            sEls.forEach(el => { if(el) el.innerText = sub; });
        }

        function getTipPos() {
            const p = new THREE.Vector3();
            wandPivot.children[1].getWorldPosition(p);
            return p;
        }

        function executeSpell(name) {
            if (name === 'fireball') {
                setStatus("FIREBALL", "Charging...", "#00ffff"); // Changed to Cyan fireball
                const charge = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({color: 0x00aaff}));
                scene.add(charge);
                let chargeInterval = setInterval(() => { charge.position.copy(getTipPos()); }, 16);

                setTimeout(() => {
                    clearInterval(chargeInterval); scene.remove(charge);
                    setStatus("FIRE!", "", "#00ffff");
                    const ball = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color: 0x00ffff}));
                    ball.position.copy(getTipPos());
                    
                    // Add point light to fireball
                    const pLight = new THREE.PointLight(0x00ffff, 2, 50);
                    ball.add(pLight);
                    
                    const velocity = crosshair3D.position.clone().sub(ball.position).normalize().multiplyScalar(70);
                    scene.add(ball);
                    projectiles.push({ mesh: ball, vel: velocity, type: 'fireball', life: 5 });
                }, 1000); 
            }
            else if (name === 'gun') {
                setStatus("WAND GUN", "Summoning...", "#ffffff");
                setTimeout(() => {
                    setStatus("FIRING!", "", "#ffffff");
                    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 2), new THREE.MeshStandardMaterial({color: 0x222222, metalness: 1.0, emissive: 0x222222}));
                    scene.add(gun);
                    let gunTrack = setInterval(() => {
                        gun.position.copy(getTipPos()).add(new THREE.Vector3(0.8, 0.8, 0));
                        gun.lookAt(crosshair3D.position);
                    }, 16);

                    let shots = 0;
                    const interval = setInterval(() => {
                        if (shots >= 30) { clearInterval(interval); clearInterval(gunTrack); scene.remove(gun); setStatus("",""); return; }
                        const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({color: 0xffffff}));
                        bullet.position.copy(gun.position);
                        const vel = crosshair3D.position.clone().sub(gun.position).normalize().multiplyScalar(120); 
                        scene.add(bullet);
                        projectiles.push({ mesh: bullet, vel: vel, type: 'bullet', life: 3 });
                        shots++;
                    }, 200); 
                }, 1000);
            }
            else if (name === 'ghost') {
                setStatus("GHOST SUMMONED", "Seeking...", "#a200ff");
                const ghostGrp = new THREE.Group();
                const gMat = new THREE.MeshLambertMaterial({color: 0xffffff, transparent: true, opacity: 0.8, emissive: 0x4400aa});
                const body = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 4, 32), gMat);
                const head = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), gMat); head.position.y = 2;
                ghostGrp.add(body, head);
                ghostGrp.position.copy(getTipPos());
                scene.add(ghostGrp);
                activeGhosts.push({ mesh: ghostGrp, speed: 15, life: 15 }); 
            }
            else if (name === 'karma') {
                setStatus("KARMA HEAL", "+30 HP", "#00ffaa");
                pHealth = Math.min(100, pHealth + 30);
                updateHealthBars();
            }
        }

        // ==========================================
        // MAIN LOOP & PHYSICS
        // ==========================================
        function updateHealthBars() {
            document.querySelectorAll('.player-hp-bar').forEach(el => el.style.width = pHealth + '%');
            document.querySelectorAll('.enemy-hp-bar').forEach(el => el.style.width = eHealth + '%');
        }

        const inkBlackMat = new THREE.MeshBasicMaterial({color: 0x000000}); 
        const inkGlowMat = new THREE.MeshBasicMaterial({color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.8});

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            const dt = (time - lastTime) / 1000;
            lastTime = time;
            if(!scene) return;

            // Animate Water & Sky
            starsSystem.rotation.y = time / 50000;
            const posAttr = waterMesh.geometry.attributes.position;
            const v = new THREE.Vector3();
            for (let i = 0; i < posAttr.count; i++) {
                v.fromBufferAttribute(posAttr, i);
                v.z = Math.sin(v.x * 0.1 + time/800) * 0.8 + Math.cos(v.y * 0.1 + time/800) * 0.8;
                posAttr.setXYZ(i, v.x, v.y, v.z);
            }
            posAttr.needsUpdate = true;

            // Animate Tower Beacon
            if(towerBeacon) {
                towerBeacon.rotation.y += 1 * dt;
                towerBeacon.rotation.z += 0.5 * dt;
            }

            // 1. Get true 3D Forward Direction of Wand
            const wandWorldDir = new THREE.Vector3(0, 0, -1).applyQuaternion(wandPivot.getWorldQuaternion());
            
            // 2. Place Crosshair 40 units away along that vector
            crosshair3D.position.copy(cameraRig.position).add(cameraRig.localToWorld(wandWorldDir.clone().multiplyScalar(40)).sub(cameraRig.position));
            crosshair3D.lookAt(cameraRig.position);

            // 3. Normal Mode Camera Spin
            if (!isVRMode) {
                const localDir = new THREE.Vector3(0, 0, -1).applyQuaternion(wandPivot.quaternion);
                if (localDir.x < -0.3) cameraRig.rotation.y += 1.8 * dt;
                if (localDir.x > 0.3) cameraRig.rotation.y -= 1.8 * dt;
                if (localDir.y > 0.3) cameraRig.rotation.x += 1.8 * dt;
                if (localDir.y < -0.3) cameraRig.rotation.x -= 1.8 * dt;
                cameraRig.rotation.x = Math.max(-0.8, Math.min(0.8, cameraRig.rotation.x));
            }

            // 4. Drawing Logic
            if (isDrawing) {
                const localDir = new THREE.Vector3(0, 0, -1).applyQuaternion(wandPivot.quaternion);
                const px = (localDir.x / -localDir.z) * 1000;
                const py = (localDir.y / -localDir.z) * 1000;
                currentStroke2D.push({x: px, y: py});

                const inkPos = cameraRig.position.clone().add(cameraRig.localToWorld(wandWorldDir.clone().multiplyScalar(15)).sub(cameraRig.position));
                
                const blackSphere = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), inkBlackMat);
                const glowSphere = new THREE.Mesh(new THREE.SphereGeometry(0.45, 8, 8), inkGlowMat);
                blackSphere.position.copy(inkPos); glowSphere.position.copy(inkPos);
                
                scene.add(blackSphere); scene.add(glowSphere);
                activeInkMeshes.push({black: blackSphere, glow: glowSphere});
            }

            // Enemy AI & Animation
            if (!isEnemyDead && enemyModel) {
                // Majestic Floating
                enemyModel.position.y = 10 + Math.sin(time / 1500) * 4;
                enemyHitbox.position.copy(enemyModel.position).add(new THREE.Vector3(0, 10, 0));
                
                // Animate Staff
                if(wizardStaffCore) {
                    wizardStaffCore.rotation.x += 2 * dt;
                    wizardStaffCore.rotation.y += 3 * dt;
                }
                // Animate Rings
                wizardRings.forEach(r => {
                    r.mesh.rotation.x += r.sx * dt;
                    r.mesh.rotation.y += r.sy * dt;
                });
                
                // Archmage Attacks
                if (Math.random() < 0.012) { 
                    const blast = new THREE.Mesh(new THREE.SphereGeometry(2.5), new THREE.MeshBasicMaterial({color: 0xa200ff}));
                    blast.position.copy(enemyModel.position).add(new THREE.Vector3(6, 20, 3)); // Shoot from staff
                    const pLight = new THREE.PointLight(0xa200ff, 2, 50);
                    blast.add(pLight);
                    
                    const vel = cameraRig.position.clone().sub(blast.position).normalize().multiplyScalar(45);
                    scene.add(blast);
                    projectiles.push({ mesh: blast, vel: vel, type: 'enemy', life: 6 });
                }
            } else if (isEnemyDead) {
                enemyDeathTimer -= dt;
                if (enemyDeathTimer <= 0) {
                    isEnemyDead = false; enemyModel.visible = true; eHealth = 100; updateHealthBars();
                    setStatus("", "");
                }
            }

            // Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.life -= dt;
                
                let hit = false;
                if (p.type !== 'enemy' && !isEnemyDead) {
                    const box = new THREE.Box3().setFromObject(enemyHitbox);
                    if (box.containsPoint(p.mesh.position)) {
                        hit = true; eHealth -= (p.type === 'fireball' ? 25 : 5);
                        
                        // Flash Avatar
                        enemyModel.children.forEach(c => {
                            if(c.material && c.material.emissive) {
                                const old = c.material.emissive.getHex();
                                c.material.emissive.setHex(0xffffff);
                                setTimeout(() => c.material.emissive.setHex(old), 100);
                            }
                        });
                        
                        if (eHealth <= 0) {
                            isEnemyDead = true; eHealth = 0; enemyModel.visible = false;
                            setStatus("ARCHMAGE FALLS!", "Respawning in 10s...", "#a200ff");
                            enemyDeathTimer = 10;
                        }
                        updateHealthBars();
                    }
                } else if (p.type === 'enemy') {
                    if (p.mesh.position.z > -2 && Math.abs(p.mesh.position.x) < 6) {
                        hit = true; pHealth -= 15; // Enemy hits harder
                        if (pHealth <= 0) { pHealth = 100; setStatus("YOU DIED!", "", "#ff0044"); }
                        updateHealthBars();
                    }
                }
                
                if (hit || p.life <= 0 || p.mesh.position.y < -5) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            }

            // Ghosts
            for (let i = activeGhosts.length - 1; i >= 0; i--) {
                let g = activeGhosts[i];
                if (!isEnemyDead) {
                    const dir = enemyModel.position.clone().add(new THREE.Vector3(0,10,0)).sub(g.mesh.position).normalize();
                    g.mesh.position.add(dir.multiplyScalar(g.speed * dt));
                    g.mesh.position.y += Math.sin(time/150)*0.1;
                    g.mesh.lookAt(enemyModel.position);
                    
                    if (g.mesh.position.distanceTo(enemyModel.position.clone().add(new THREE.Vector3(0,10,0))) < 10) {
                        isEnemyDead = true; eHealth = 0; enemyModel.visible = false;
                        setStatus("SOUL DEVOURED!", "Respawning in 10s...", "#a200ff");
                        enemyDeathTimer = 10; updateHealthBars();
                        scene.remove(g.mesh); activeGhosts.splice(i, 1); continue;
                    }
                }
                g.life -= dt;
                if (g.life <= 0) { scene.remove(g.mesh); activeGhosts.splice(i, 1); }
            }

            // Render
            if (isVRMode) {
                stereoCamera.update(camera);
                const size = renderer.getSize(new THREE.Vector2());
                const w = size.width / 2, h = size.height;

                renderer.setScissorTest(true);
                renderer.setScissor(0, 0, w, h); renderer.setViewport(0, 0, w, h);
                renderer.render(scene, stereoCamera.cameraL);
                renderer.setScissor(w, 0, w, h); renderer.setViewport(w, 0, w, h);
                renderer.render(scene, stereoCamera.cameraR);
                renderer.setScissorTest(false);
            } else {
                renderer.render(scene, camera);
            }
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>

<body>

    </div>

    <script>
        // ==========================================
        // PEERJS P2P NETWORKING
        // ==========================================
        let peer = null;
        let connection = null;
        let pendingJoinId = null;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                pendingJoinId = joinId;
                document.getElementById('roleSelection').classList.add('hidden');
                document.getElementById('clientSensorUI').classList.remove('hidden');
                document.getElementById('clientSensorUI').style.display = 'flex';
            }
        };

        function startHost() {
            document.getElementById('roleSelection').classList.add('hidden');
            document.getElementById('hostWaitingUI').classList.remove('hidden');
            document.getElementById('hostWaitingUI').style.display = 'flex';
            
            const gameId = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('displayGameId').innerText = gameId;

            const joinUrl = `${window.location.href.split('?')[0]}?join=${gameId}`;
            new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 250, height: 250 });

            peer = new Peer('vrwiz-' + gameId);
            peer.on('connection', (conn) => {
                connection = conn;
                document.getElementById('setupUI').style.display = 'none';
                initGame(); 
                
                conn.on('data', (data) => {
                    if(data.type === 'gyro') handleControllerGyro(data);
                    if(data.type === 'state') handleControllerState(data);
                });
                conn.on('close', () => alert("Wand disconnected. Refresh."));
            });
        }

        function startJoinFromInput() {
            const id = document.getElementById('joinIdInput').value.trim().toUpperCase();
            if(id) {
                pendingJoinId = id;
                document.getElementById('roleSelection').classList.add('hidden');
                document.getElementById('clientSensorUI').classList.remove('hidden');
                document.getElementById('clientSensorUI').style.display = 'flex';
            }
        }

        // ==========================================
        // PHONE CONTROLLER (MOTION/GYRO SENSOR)
        // ==========================================
        function requestSensorsAndConnect() {
            // iOS 13+ requires explicit permission for DeviceOrientation
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') connectController();
                        else alert('Permission to access device orientation was denied.');
                    })
                    .catch(console.error);
            } else {
                connectController(); // Non-iOS or older devices
            }
        }

        function connectController() {
            document.getElementById('clientSensorUI').innerHTML = "<h2 class='text-3xl text-cyan-400 animate-pulse'>Linking Wand...</h2>";
            
            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect('vrwiz-' + pendingJoinId, { reliable: false });
                connection.on('open', () => {
                    document.getElementById('setupUI').style.display = 'none';
                    document.getElementById('controllerUI').style.display = 'flex';
                    initWandSensors();
                });
            });
        }

        function initWandSensors() {
            const btnCast = document.getElementById('btnCast');
            let isDrawing = false;

            // Absolute Orientation handling to Delta Movement
            let lastAlpha = null;
            let lastBeta = null;

            window.addEventListener('deviceorientation', (e) => {
                if(!e.alpha || !e.beta) return; // No gyro data

                if (!isDrawing) {
                    // Just track the latest position to prevent jumping when we start drawing
                    lastAlpha = e.alpha;
                    lastBeta = e.beta;
                    return;
                }

                // Calculate delta (Change in rotation)
                let dAlpha = e.alpha - lastAlpha;
                let dBeta = e.beta - lastBeta;

                // Handle 360 degree wrap around for alpha (yaw)
                if (dAlpha > 180) dAlpha -= 360;
                else if (dAlpha < -180) dAlpha += 360;

                lastAlpha = e.alpha;
                lastBeta = e.beta;

                // Send the orientation delta to move the cursor
                // We multiply by sensitivity factor
                connection.send({
                    type: 'gyro',
                    dx: -dAlpha * 15, // Negative because rotating phone left (alpha increases) moves cursor left
                    dy: -dBeta * 20   // Beta is pitch. Tilting phone up makes beta decrease
                });
            });

            const startDraw = (e) => { e.preventDefault(); isDrawing = true; btnCast.classList.add('active'); btnCast.innerHTML = "DRAWING IN<br>THE AIR!"; connection.send({ type: 'state', draw: 'start' }); };
            const endDraw = (e) => { e.preventDefault(); isDrawing = false; btnCast.classList.remove('active'); btnCast.innerHTML = "HOLD & WAVE<br>TO DRAW"; connection.send({ type: 'state', draw: 'end' }); };

            btnCast.addEventListener('touchstart', startDraw, {passive: false});
            btnCast.addEventListener('touchend', endDraw, {passive: false});
            btnCast.addEventListener('touchcancel', endDraw, {passive: false});
            
            // Mouse fallback for desktop testing of the controller
            let lastMouse = null;
            btnCast.addEventListener('mousedown', (e) => { 
                startDraw(e); lastMouse = {x: e.clientX, y: e.clientY}; 
                btnCast.onmousemove = (ev) => {
                    if(!isDrawing) return;
                    connection.send({ type: 'gyro', dx: (ev.clientX - lastMouse.x)*1.5, dy: (ev.clientY - lastMouse.y)*1.5 });
                    lastMouse = {x: ev.clientX, y: ev.clientY};
                };
            });
            btnCast.addEventListener('mouseup', (e) => { endDraw(e); btnCast.onmousemove = null; });
            btnCast.addEventListener('mouseleave', (e) => { if(isDrawing) endDraw(e); btnCast.onmousemove = null; });
        }


        // ==========================================
        // HOST FIRST-PERSON GAME ENGINE (THREE.JS)
        // ==========================================
        let scene, camera, renderer;
        let firstPersonWand; // The visual wand attached to camera
        let enemyModel, enemyHitbox;
        let projectiles = [], activeGhosts = [];
        let lastTime = 0;
        
        let pHealth = 100, eHealth = 100;
        let isEnemyDead = false;
        let enemyDeathTimer = 0;
        
        // Cursor Logic
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        
        // Drawing Logic
        let isDrawing = false;
        let currentStrokes = []; 
        let currentStroke = [];
        let drawCtx;

        function initGame() {
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('drawCanvas').style.display = 'block';
            
            const dCanvas = document.getElementById('drawCanvas');
            dCanvas.width = window.innerWidth; dCanvas.height = window.innerHeight;
            drawCtx = dCanvas.getContext('2d');

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x55ccff); // Bright Maldives Sky
            scene.fog = new THREE.FogExp2(0x55ccff, 0.015);

            // First Person Camera
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 0); // Player standing height

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(50, 100, 20);
            sunLight.castShadow = true;
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x404040, 2.0));

            // Maldives Environment
            // Water
            const waterGeo = new THREE.PlaneGeometry(500, 500);
            const waterMat = new THREE.MeshPhongMaterial({ color: 0x00aaff, transparent: true, opacity: 0.8, shininess: 150 });
            const water = new THREE.Mesh(waterGeo, waterMat);
            water.rotation.x = -Math.PI / 2;
            water.position.y = -1;
            scene.add(water);

            // Sand Islands
            const sandMat = new THREE.MeshLambertMaterial({ color: 0xffeebb });
            // Player Island
            const myIsland = new THREE.Mesh(new THREE.CylinderGeometry(10, 15, 2, 32), sandMat);
            myIsland.position.set(0, -1, 0);
            scene.add(myIsland);
            
            // Enemy Island (Far away)
            const enemyIsland = new THREE.Mesh(new THREE.CylinderGeometry(15, 25, 2, 32), sandMat);
            enemyIsland.position.set(0, -1, -50); // 50 units away!
            scene.add(enemyIsland);

            // First Person Wand (Attached to Camera view)
            const wandMat = new THREE.MeshStandardMaterial({color: 0x3d2314, roughness: 0.9});
            firstPersonWand = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, 1.5, 8), wandMat);
            firstPersonWand.rotation.x = Math.PI / 2; // Point forward
            firstPersonWand.position.set(1, -0.5, -1.5); // Bottom right of screen
            camera.add(firstPersonWand);
            scene.add(camera); // Add camera to scene so wand renders

            // Glowing tip
            const tip = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            tip.position.y = 0.8;
            firstPersonWand.add(tip);

            // Create Enemy
            createEnemy();

            // Setup Gesture AI
            generateGridTemplates();

            updateHealthBars();
            requestAnimationFrame(gameLoop);
        }

        function createEnemy() {
            enemyModel = new THREE.Group();
            
            // Diamond Head
            const headMat = new THREE.MeshStandardMaterial({ color: 0xaa00ff, roughness: 0.2, metalness: 0.8 });
            const head = new THREE.Mesh(new THREE.OctahedronGeometry(1.5), headMat);
            head.position.y = 6;
            
            // Pyramid Body Upside Down
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const bodyGeo = new THREE.ConeGeometry(2, 4, 4);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.z = Math.PI; 
            body.rotation.y = Math.PI / 4; 
            body.position.y = 3;

            // Rectangle Hands
            const handGeo = new THREE.BoxGeometry(0.6, 2, 0.6);
            const lHand = new THREE.Mesh(handGeo, bodyMat); lHand.position.set(-2.5, 3, 0);
            const rHand = new THREE.Mesh(handGeo, bodyMat); rHand.position.set(2.5, 3, 0);

            enemyModel.add(head, body, lHand, rHand);
            enemyModel.position.set(0, 0, -50); // Far away
            scene.add(enemyModel);

            // Invisible Hitbox for easier targeting
            enemyHitbox = new THREE.Mesh(new THREE.BoxGeometry(6, 8, 4), new THREE.MeshBasicMaterial({visible: false}));
            enemyHitbox.position.copy(enemyModel.position).add(new THREE.Vector3(0, 3, 0));
            scene.add(enemyHitbox);
        }

        // --- Host Input Handling ---
        function handleControllerGyro(data) {
            // Apply gyro movement to cursor on screen
            cursorX += data.dx;
            cursorY += data.dy;
            
            // Clamp to screen bounds
            cursorX = Math.max(0, Math.min(window.innerWidth, cursorX));
            cursorY = Math.max(0, Math.min(window.innerHeight, cursorY));
            
            // Update HTML crosshair
            const cross = document.getElementById('crosshair');
            cross.style.left = cursorX + 'px';
            cross.style.top = cursorY + 'px';

            // Make the 3D wand point towards the 2D cursor projection
            if(firstPersonWand) {
                // Map cursor to Normalized Device Coordinates (-1 to +1)
                const ndcX = (cursorX / window.innerWidth) * 2 - 1;
                const ndcY = -(cursorY / window.innerHeight) * 2 + 1;
                // Simple tilt of the wand based on screen position
                firstPersonWand.rotation.y = -ndcX * 0.5;
                firstPersonWand.rotation.x = Math.PI/2 + ndcY * 0.5;
            }

            if (isDrawing) {
                currentStroke.push({x: cursorX, y: cursorY});
                renderDrawing();
            }
        }

        function handleControllerState(data) {
            if (data.draw === 'start') {
                isDrawing = true;
                currentStrokes = [];
                currentStroke = [{x: cursorX, y: cursorY}];
                document.getElementById('crosshair').classList.add('crosshair-drawing');
                renderDrawing();
            } else if (data.draw === 'end') {
                isDrawing = false;
                if (currentStroke.length > 0) currentStrokes.push(currentStroke);
                document.getElementById('crosshair').classList.remove('crosshair-drawing');
                
                recognizeGestureAndCast();
                setTimeout(() => drawCtx.clearRect(0, 0, drawCtx.canvas.width, drawCtx.canvas.height), 300);
            }
        }

        function renderDrawing() {
            drawCtx.clearRect(0, 0, drawCtx.canvas.width, drawCtx.canvas.height);
            drawCtx.strokeStyle = '#0ff';
            drawCtx.lineWidth = 8;
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            drawCtx.shadowBlur = 20;
            drawCtx.shadowColor = '#0ff';

            currentStrokes.forEach(stroke => {
                if(stroke.length < 2) return;
                drawCtx.beginPath();
                drawCtx.moveTo(stroke[0].x, stroke[0].y);
                for(let i=1; i<stroke.length; i++) drawCtx.lineTo(stroke[i].x, stroke[i].y);
                drawCtx.stroke();
            });

            if (currentStroke.length > 1) {
                drawCtx.beginPath();
                drawCtx.moveTo(currentStroke[0].x, currentStroke[0].y);
                for(let i=1; i<currentStroke.length; i++) drawCtx.lineTo(currentStroke[i].x, currentStroke[i].y);
                drawCtx.stroke();
            }
        }

        // ==========================================
        // GESTURE AI (Grid-Density Algorithm)
        // ==========================================
        const GRID_SIZE = 8;
        let templates = {}; // Stores 64-element arrays representing shape density

        function extractGridFeatures(ctx) {
            const imgData = ctx.getImageData(0, 0, 64, 64).data;
            const grid = new Array(GRID_SIZE * GRID_SIZE).fill(0);
            let maxVal = 0;
            
            for (let y = 0; y < 64; y++) {
                for (let x = 0; x < 64; x++) {
                    const idx = (y * 64 + x) * 4;
                    // If pixel is white
                    if (imgData[idx] > 128) {
                        const gridX = Math.floor(x / (64 / GRID_SIZE));
                        const gridY = Math.floor(y / (64 / GRID_SIZE));
                        grid[gridY * GRID_SIZE + gridX]++;
                        if (grid[gridY * GRID_SIZE + gridX] > maxVal) maxVal = grid[gridY * GRID_SIZE + gridX];
                    }
                }
            }
            // Normalize
            return grid.map(v => maxVal > 0 ? v / maxVal : 0);
        }

        function generateGridTemplates() {
            const canvas = document.getElementById('debugCanvas');
            const ctx = canvas.getContext('2d');
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = 'white';

            const saveTpl = (name, drawFunc) => {
                ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 64, 64);
                ctx.beginPath(); drawFunc(ctx); ctx.stroke();
                templates[name] = extractGridFeatures(ctx);
            };

            // 1. Fireball (Circle + Plus)
            saveTpl('fireball', c => {
                c.arc(32, 32, 28, 0, Math.PI*2);
                c.moveTo(32, 10); c.lineTo(32, 54);
                c.moveTo(10, 32); c.lineTo(54, 32);
            });

            // 2. Gun (Circle + Sideways L / _|)
            saveTpl('gun', c => {
                c.arc(32, 32, 28, 0, Math.PI*2);
                c.moveTo(20, 44); c.lineTo(44, 44); c.lineTo(44, 20); // An L rotated or flipped
            });

            // 3. Ghost (Circle + Pacman)
            saveTpl('ghost', c => {
                c.arc(32, 32, 28, 0, Math.PI*2);
                c.arc(32, 26, 14, Math.PI, 0); // Head dome
                c.lineTo(46, 48); c.lineTo(40, 42); c.lineTo(34, 48); 
                c.lineTo(28, 42); c.lineTo(22, 48); c.lineTo(18, 42); c.closePath();
            });

            // 4. Karma (Circle + YinYang wavy S)
            saveTpl('karma', c => {
                c.arc(32, 32, 28, 0, Math.PI*2);
                c.arc(32, 20, 12, Math.PI/2, Math.PI*1.5);
                c.arc(32, 44, 12, -Math.PI/2, Math.PI/2);
            });
        }

        function recognizeGestureAndCast() {
            // Find Bounds
            let minX = 9999, minY = 9999, maxX = -9999, maxY = -9999;
            let ptsCount = 0;
            currentStrokes.forEach(s => s.forEach(p => {
                if(p.x < minX) minX = p.x; if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y; if(p.y > maxY) maxY = p.y;
                ptsCount++;
            }));
            if (ptsCount < 15) return; // Ignore tiny accidental clicks

            const w = Math.max(maxX - minX, 1);
            const h = Math.max(maxY - minY, 1);
            const size = Math.max(w, h);
            
            // Draw to normalized 64x64 debug canvas
            const canvas = document.getElementById('debugCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 64, 64);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 5; ctx.lineCap = 'round';
            
            const scale = 50 / size; 
            const offsetX = 32 - (w * scale)/2;
            const offsetY = 32 - (h * scale)/2;

            currentStrokes.forEach(stroke => {
                ctx.beginPath();
                ctx.moveTo((stroke[0].x - minX) * scale + offsetX, (stroke[0].y - minY) * scale + offsetY);
                for(let i=1; i<stroke.length; i++) {
                    ctx.lineTo((stroke[i].x - minX) * scale + offsetX, (stroke[i].y - minY) * scale + offsetY);
                }
                ctx.stroke();
            });

            // Extract features and compare
            const userGrid = extractGridFeatures(ctx);
            let bestMatch = null;
            let lowestDistance = Infinity;

            for (const [name, tplGrid] of Object.entries(templates)) {
                let dist = 0;
                for(let i=0; i<64; i++) {
                    dist += Math.abs(userGrid[i] - tplGrid[i]); // Manhattan distance
                }
                if (dist < lowestDistance) {
                    lowestDistance = dist;
                    bestMatch = name;
                }
            }

            const uiStatus = document.getElementById('spell-status');
            const subStatus = document.getElementById('sub-status');
            
            // Threshold for completely random shapes
            if (lowestDistance > 25) { 
                uiStatus.innerText = "FIZZLED!";
                uiStatus.style.color = "#888";
                subStatus.innerText = "Drawing not recognized";
            } else {
                executeSpell(bestMatch);
            }
            setTimeout(() => { uiStatus.innerText = ""; subStatus.innerText = ""; }, 2000);
        }

        // ==========================================
        // SPELL EXECUTION
        // ==========================================
        function getWandTargetPosition() {
            // Unproject 2D screen cursor into 3D world at depth of enemy
            const mouse = new THREE.Vector2( (cursorX / window.innerWidth) * 2 - 1, -(cursorY / window.innerHeight) * 2 + 1 );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Find where ray intersects Z = -50 (enemy depth)
            const dir = raycaster.ray.direction;
            const dist = (-50 - raycaster.ray.origin.z) / dir.z;
            return raycaster.ray.origin.clone().add(dir.multiplyScalar(dist));
        }

        function executeSpell(name) {
            const uiStatus = document.getElementById('spell-status');
            const subStatus = document.getElementById('sub-status');
            
            // Base starting point for projectiles (Wand Tip in world space)
            const getTipPos = () => {
                const tipPos = new THREE.Vector3();
                firstPersonWand.children[0].getWorldPosition(tipPos);
                return tipPos;
            };

            if (name === 'fireball') {
                uiStatus.innerText = "FIREBALL";
                uiStatus.style.color = "#ff4400";
                subStatus.innerText = "Charging... (2s)";
                
                // Charge effect
                const chargeMat = new THREE.MeshBasicMaterial({color: 0xffaa00});
                const charge = new THREE.Mesh(new THREE.SphereGeometry(0.5), chargeMat);
                scene.add(charge);
                let chargeInterval = setInterval(() => { charge.position.copy(getTipPos()); }, 16);

                setTimeout(() => {
                    clearInterval(chargeInterval);
                    scene.remove(charge);
                    subStatus.innerText = "FIRE!";
                    
                    const ball = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({color: 0xff2200}));
                    ball.position.copy(getTipPos());
                    
                    const target = getWandTargetPosition();
                    const velocity = target.sub(ball.position).normalize().multiplyScalar(40); // Fast!
                    
                    scene.add(ball);
                    projectiles.push({ mesh: ball, vel: velocity, type: 'fireball', life: 5 });
                }, 2000); // Wait 2s
            }
            
            else if (name === 'gun') {
                uiStatus.innerText = "WAND GUN";
                uiStatus.style.color = "#ffff00";
                subStatus.innerText = "Summoning... (3s)";

                setTimeout(() => {
                    subStatus.innerText = "FIRING!";
                    
                    // Floating gun visual next to wand
                    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1), new THREE.MeshLambertMaterial({color: 0x222222}));
                    scene.add(gun);
                    let gunTrack = setInterval(() => {
                        gun.position.copy(getTipPos()).add(new THREE.Vector3(0.5, 0.5, 0));
                        gun.lookAt(getWandTargetPosition());
                    }, 16);

                    let shots = 0;
                    const interval = setInterval(() => {
                        if (shots >= 30) { 
                            clearInterval(interval); clearInterval(gunTrack); scene.remove(gun); 
                            subStatus.innerText = ""; return; 
                        }
                        
                        const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0xffff00}));
                        bullet.position.copy(gun.position);
                        const target = getWandTargetPosition();
                        const vel = target.sub(gun.position).normalize().multiplyScalar(60);
                        
                        scene.add(bullet);
                        projectiles.push({ mesh: bullet, vel: vel, type: 'bullet', life: 3 });
                        shots++;
                    }, 500); // 1 bullet per 0.5 sec, total 30 bullets = 15 secs
                }, 3000); // Wait 3s
            }
            
            else if (name === 'ghost') {
                uiStatus.innerText = "GHOST SUMMONED";
                uiStatus.style.color = "#ffffff";
                subStatus.innerText = "Haunting enemy... (10s)";
                
                const ghostGrp = new THREE.Group();
                const gMat = new THREE.MeshLambertMaterial({color: 0xdddddd, transparent: true, opacity: 0.7});
                const body = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 3, 16), gMat);
                const head = new THREE.Mesh(new THREE.SphereGeometry(1.5), gMat);
                head.position.y = 1.5;
                ghostGrp.add(body, head);
                
                ghostGrp.position.copy(getTipPos());
                scene.add(ghostGrp);
                
                // Ghost needs to reach enemy (-50 Z) in 10 seconds. Distance is approx 50. Speed = 5 u/s
                activeGhosts.push({ mesh: ghostGrp, speed: 5, life: 15 });
            }
            
            else if (name === 'karma') {
                uiStatus.innerText = "KARMA HEAL";
                uiStatus.style.color = "#00ffaa";
                subStatus.innerText = "+30 HP";
                pHealth = Math.min(100, pHealth + 30);
                updateHealthBars();
                
                document.getElementById('player-health').style.boxShadow = "0 0 30px #00ffaa";
                setTimeout(() => document.getElementById('player-health').style.boxShadow = "", 1000);
            }
        }

        // ==========================================
        // GAME PHYSICS & RENDERING LOOP
        // ==========================================
        function updateHealthBars() {
            document.getElementById('player-hp-bar').style.width = pHealth + '%';
            document.getElementById('enemy-hp-bar').style.width = eHealth + '%';
        }

        function triggerEnemyDeath() {
            if(isEnemyDead) return;
            isEnemyDead = true;
            eHealth = 0;
            updateHealthBars();
            
            enemyModel.visible = false;
            document.getElementById('spell-status').innerText = "ENEMY KILLED!";
            document.getElementById('spell-status').style.color = "#ff0044";
            document.getElementById('sub-status').innerText = "Respawning in 15 seconds...";
            
            // Kill for 15 seconds
            enemyDeathTimer = 15;
        }

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            const dt = (time - lastTime) / 1000;
            lastTime = time;
            if(!scene) return;

            // Enemy Bobbing Animation (if alive)
            if (!isEnemyDead && enemyModel) {
                enemyModel.position.y = Math.sin(time / 1000) * 1.5;
                enemyHitbox.position.copy(enemyModel.position).add(new THREE.Vector3(0, 3, 0));
                
                // AI Attacking (Randomly shoot back)
                if (Math.random() < 0.01) {
                    const blast = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0xff00ff}));
                    blast.position.copy(enemyModel.position).add(new THREE.Vector3(0, 5, 0));
                    // Aim at player camera
                    const vel = camera.position.clone().sub(blast.position).normalize().multiplyScalar(20);
                    scene.add(blast);
                    projectiles.push({ mesh: blast, vel: vel, type: 'enemy', life: 6 });
                }
            } else if (isEnemyDead) {
                enemyDeathTimer -= dt;
                if (enemyDeathTimer <= 0) {
                    isEnemyDead = false;
                    enemyModel.visible = true;
                    eHealth = 100;
                    updateHealthBars();
                    document.getElementById('sub-status').innerText = "";
                }
            }

            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.life -= dt;
                
                let hit = false;
                if (p.type !== 'enemy' && !isEnemyDead) {
                    // Check collision with enemy hitbox
                    const box = new THREE.Box3().setFromObject(enemyHitbox);
                    if (box.containsPoint(p.mesh.position)) {
                        hit = true;
                        eHealth -= (p.type === 'fireball' ? 25 : 5);
                        
                        // Flash enemy
                        enemyModel.children.forEach(c => c.material.emissive && c.material.emissive.setHex(0xffffff));
                        setTimeout(() => enemyModel.children.forEach(c => c.material.emissive && c.material.emissive.setHex(0x000000)), 100);
                        
                        if (eHealth <= 0) triggerEnemyDeath();
                        else updateHealthBars();
                    }
                } else if (p.type === 'enemy') {
                    // Hit player (Camera)
                    if (p.mesh.position.z > -2 && Math.abs(p.mesh.position.x) < 3) {
                        hit = true;
                        pHealth -= 10;
                        document.getElementById('ui-layer').style.background = "rgba(255,0,0,0.3)";
                        setTimeout(() => document.getElementById('ui-layer').style.background = "none", 200);
                        
                        if (pHealth <= 0) {
                            pHealth = 100;
                            document.getElementById('spell-status').innerText = "YOU DIED!";
                        }
                        updateHealthBars();
                    }
                }
                
                if (hit || p.life <= 0 || p.mesh.position.y < -5) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // Update Ghosts
            for (let i = activeGhosts.length - 1; i >= 0; i--) {
                let g = activeGhosts[i];
                if (!isEnemyDead) {
                    // Move towards enemy
                    const dir = enemyModel.position.clone().sub(g.mesh.position).normalize();
                    g.mesh.position.add(dir.multiplyScalar(g.speed * dt));
                    g.mesh.position.y = 2 + Math.sin(time/300); // Bob
                    
                    // Check collision
                    const dist = g.mesh.position.distanceTo(enemyModel.position);
                    if (dist < 5) {
                        triggerEnemyDeath(); // Ghost insta-kills for 15s
                        scene.remove(g.mesh);
                        activeGhosts.splice(i, 1);
                        continue;
                    }
                }
                
                g.life -= dt;
                if (g.life <= 0) {
                    scene.remove(g.mesh);
                    activeGhosts.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if(drawCtx) {
                    drawCtx.canvas.width = window.innerWidth;
                    drawCtx.canvas.height = window.innerHeight;
                }
            }
        });
    </script>
</body>
</html>

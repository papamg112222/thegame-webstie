```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omogal - The Mogging Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap');

        body {
            background-color: #111;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .mog-font {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
        }

        .video-container {
            position: relative;
            background-color: #222;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #333;
        }

        video, canvas, .stranger-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stranger-img {
            display: none; /* Hidden until connected */
        }

        /* The MOGGED text overlay */
        .mogged-overlay {
            position: absolute;
            /* Positioning roughly over the eyes (top 35% mark) */
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%) scale(5);
            font-size: 4rem;
            color: #ff003c;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            letter-spacing: 0.1em;
            font-weight: 900;
        }

        .mogged-anim {
            animation: stamp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes stamp {
            0% { transform: translate(-50%, -50%) scale(5) rotate(-15deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(-5deg); opacity: 1; }
        }

        /* Flash effect for the photo snap */
        #flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .flash-anim {
            animation: flashBang 0.5s ease-out;
        }

        @keyframes flashBang {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .overlay-text {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: bold;
        }

        #bigMessage {
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div id="flash"></div>

    <!-- Header -->
    <header class="w-full max-w-5xl flex justify-between items-center mb-6">
        <h1 class="text-4xl mog-font tracking-wider text-white">OMOGAL</h1>
        <div id="statusBadge" class="px-4 py-1 rounded-full bg-gray-700 text-sm font-bold flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-gray-400" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </header>

    <!-- Main Arena -->
    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-4 relative">
        
        <!-- Big central message overlay -->
        <div id="bigMessage" class="absolute inset-0 flex items-center justify-center z-40 pointer-events-none hidden">
            <span class="text-6xl md:text-8xl mog-font text-white text-center drop-shadow-2xl animate-pulse" id="messageContent"></span>
        </div>

        <!-- You (Local) -->
        <div class="video-container relative">
            <!-- Loading indicator for camera -->
            <div id="localLoading" class="absolute inset-0 flex items-center justify-center text-gray-400">
                <p>Waiting for camera...</p>
            </div>
            
            <video id="localVideo" autoplay muted playsinline class="hidden transform scale-x-[-1]"></video>
            <canvas id="localCanvas" class="hidden transform scale-x-[-1]"></canvas>
            
            <div class="overlay-text">You</div>
            <!-- The MOGGED text -->
            <div id="localMogged" class="mogged-overlay mog-font">MOGGED</div>
        </div>

        <!-- Stranger (Simulated) -->
        <div class="video-container relative" id="strangerContainer">
            <div id="strangerLoading" class="absolute inset-0 flex items-center justify-center text-gray-400 flex-col gap-2">
                <svg class="animate-spin h-8 w-8 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p id="strangerStatus">Waiting to connect...</p>
            </div>
            
            <img id="strangerImg" src="" alt="Stranger" class="stranger-img" />
            <div class="overlay-text hidden" id="strangerLabel">Stranger</div>
            
            <!-- The MOGGED text -->
            <div id="strangerMogged" class="mogged-overlay mog-font">MOGGED</div>
        </div>
    </main>

    <!-- Controls -->
    <div class="mt-8 flex gap-4">
        <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg text-xl transition-all shadow-[0_0_15px_rgba(37,99,235,0.5)]">
            Find Stranger
        </button>
        <button id="nextBtn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded-lg text-xl transition-all hidden">
            Next
        </button>
    </div>

    <script>
        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const localCanvas = document.getElementById('localCanvas');
        const localLoading = document.getElementById('localLoading');
        const localMogged = document.getElementById('localMogged');
        
        const strangerImg = document.getElementById('strangerImg');
        const strangerLoading = document.getElementById('strangerLoading');
        const strangerStatus = document.getElementById('strangerStatus');
        const strangerLabel = document.getElementById('strangerLabel');
        const strangerMogged = document.getElementById('strangerMogged');
        
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const flash = document.getElementById('flash');
        const bigMessage = document.getElementById('bigMessage');
        const messageContent = document.getElementById('messageContent');
        
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let stream = null;

        // Start the camera immediately
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                localVideo.srcObject = stream;
                localVideo.classList.remove('hidden');
                localLoading.classList.add('hidden');
            } catch (err) {
                console.error("Camera access denied", err);
                localLoading.innerHTML = "<p class='text-red-500'>Camera access denied.</p>";
            }
        }

        // Helper: show big center text
        function showBigText(text, duration = null) {
            bigMessage.classList.remove('hidden');
            messageContent.innerText = text;
            if (duration) {
                setTimeout(() => {
                    bigMessage.classList.add('hidden');
                }, duration);
            }
        }

        function hideBigText() {
            bigMessage.classList.add('hidden');
        }

        // Fake stranger faces (Using randomuser.me API to get portraits)
        async function fetchStrangerFace() {
            try {
                const res = await fetch('https://randomuser.me/api/');
                const data = await res.json();
                return data.results[0].picture.large; // 128x128 but scaled up it works for the meme
            } catch (e) {
                return `https://i.pravatar.cc/400?img=${Math.floor(Math.random() * 70)}`;
            }
        }

        // Main game flow
        async function startEncounter() {
            if (!stream) {
                alert("Please allow camera access first!");
                return;
            }

            // Reset UI
            startBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
            localMogged.classList.remove('mogged-anim');
            strangerMogged.classList.remove('mogged-anim');
            localVideo.classList.remove('hidden');
            localCanvas.classList.add('hidden');
            strangerImg.classList.add('hidden');
            strangerLabel.classList.add('hidden');
            strangerLoading.classList.remove('hidden');
            strangerStatus.innerText = "Looking for a stranger...";
            
            statusDot.classList.replace('bg-gray-400', 'bg-yellow-400');
            statusText.innerText = "Connecting...";

            // 1. Simulate connecting (1-3 seconds)
            const connectTime = Math.random() * 2000 + 1000;
            await new Promise(r => setTimeout(r, connectTime));

            // 2. Stranger connected! Load image.
            const faceUrl = await fetchStrangerFace();
            strangerImg.src = faceUrl;
            
            strangerImg.onload = async () => {
                strangerLoading.classList.add('hidden');
                strangerImg.classList.remove('hidden');
                strangerLabel.classList.remove('hidden');
                
                statusDot.classList.replace('bg-yellow-400', 'bg-green-500');
                statusText.innerText = "Connected";

                // Pause a second so they see the stranger
                await new Promise(r => setTimeout(r, 1500));

                // 3. Prompt to strike a pose
                showBigText("STRIKE A POSE!");
                await new Promise(r => setTimeout(r, 1500));

                // 4. Countdown
                for (let i = 3; i > 0; i--) {
                    showBigText(i);
                    await new Promise(r => setTimeout(r, 800));
                }

                // 5. SNAP!
                hideBigText();
                flash.classList.add('flash-anim');
                setTimeout(() => flash.classList.remove('flash-anim'), 500);

                // Freeze local video to canvas
                localCanvas.width = localVideo.videoWidth;
                localCanvas.height = localVideo.videoHeight;
                const ctx = localCanvas.getContext('2d');
                ctx.drawImage(localVideo, 0, 0, localCanvas.width, localCanvas.height);
                localVideo.classList.add('hidden');
                localCanvas.classList.remove('hidden');

                // 6. Processing
                strangerStatus.innerText = "AI analyzing aesthetics...";
                strangerLoading.classList.remove('hidden');
                strangerImg.classList.add('opacity-50'); // Dim stranger
                localCanvas.classList.add('opacity-50'); // Dim local
                await new Promise(r => setTimeout(r, 2000));

                // 7. The Result
                strangerLoading.classList.add('hidden');
                strangerImg.classList.remove('opacity-50');
                localCanvas.classList.remove('opacity-50');

                // Randomly decide who gets mogged (60% chance user wins for fun)
                const userWins = Math.random() > 0.4;

                if (userWins) {
                    strangerMogged.classList.add('mogged-anim');
                    showBigText("YOU MOGGED THEM!", 3000);
                } else {
                    localMogged.classList.add('mogged-anim');
                    showBigText("YOU GOT MOGGED!", 3000);
                }

                // Show next button
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                statusText.innerText = "Encounter Ended";
                setTimeout(() => {
                    nextBtn.classList.remove('hidden');
                }, 1000);
            };
        }

        // Event Listeners
        startBtn.addEventListener('click', startEncounter);
        nextBtn.addEventListener('click', startEncounter);

        // Init on load
        window.addEventListener('load', initCamera);

    </script>
</body>
</html>

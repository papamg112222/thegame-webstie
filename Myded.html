<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mod Menu UI</title>
    
    <!-- Home Screen App Icons -->
    <link rel="icon" type="image/jpeg" href="IMG_2482.jpeg">
    <link rel="apple-touch-icon" href="IMG_2482.jpeg">
    
    <!-- Makes it look like a native app on iOS when opened from the Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mod Menu">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
        }

        #modMenu {
            position: fixed;
            top: 50px;
            left: 50px;
            width: 350px;
            height: 500px;
            background-color: rgba(20, 20, 20, 0.95);
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        #modMenu.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* Updated Menu Header to fit the icon */
        .menu-header {
            background: linear-gradient(90deg, #ff0055, #cc00ff);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* Space between icon and text */
            font-weight: bold;
            font-size: 18px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Style for the icon inside the menu */
        .menu-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .menu-content {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .menu-content::-webkit-scrollbar {
            width: 8px;
        }
        .menu-content::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .menu-content::-webkit-scrollbar-thumb {
            background: #ff0055;
            border-radius: 4px;
        }

        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        
        .toggle-item:last-child {
            border-bottom: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ff0055;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h1>Press 'M' to Toggle the Mod Menu</h1>
        <p>Save this page to your Home Screen to see the custom app icon!</p>
    </div>

    <div id="modMenu" class="hidden">
        <div class="menu-header">
            <!-- App icon inside the menu -->
            <img src="IMG_2482.jpeg" alt="Icon" class="menu-icon">
            Ultimate Mod Menu v1.0
        </div>
        <div class="menu-content" id="hackList">
            <!-- JavaScript populates items here -->
        </div>
    </div>

    <script>
        const modMenu = document.getElementById('modMenu');
        const hackList = document.getElementById('hackList');

        document.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'm') {
                modMenu.classList.toggle('hidden');
            }
        });

        const specialNames = [
            "Infinite Health", "Wallhack (ESP)", "Aimbot Assist", 
            "Speed Multiplier", "Infinite Ammo", "No Recoil", 
            "God Mode", "Invisibility", "Fly Mode", "Super Jump"
        ];

        const totalItems = 105;

        for (let i = 0; i < totalItems; i++) {
            const itemName = i < specialNames.length ? specialNames[i] : `Module Interface ${i + 1}`;

            const itemDiv = document.createElement('div');
            itemDiv.className = 'toggle-item';

            const labelSpan = document.createElement('span');
            labelSpan.textContent = itemName;

            const switchLabel = document.createElement('label');
            switchLabel.className = 'switch';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            
            const sliderSpan = document.createElement('span');
            sliderSpan.className = 'slider';

            switchLabel.appendChild(checkbox);
            switchLabel.appendChild(sliderSpan);

            itemDiv.appendChild(labelSpan);
            itemDiv.appendChild(switchLabel);

            hackList.appendChild(itemDiv);
        }
    </script>
</body>
</html>

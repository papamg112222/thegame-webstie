<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Sync P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Views */
        .view { display: none; width: 100vw; height: 100vh; }
        .view.active { display: flex; flex-direction: column; }

        /* Canvas */
        #game-canvas { display: block; margin: 0 auto; background: #1a1a1a; box-shadow: 0 0 20px rgba(0,0,0,0.8); }

        /* Controller Buttons */
        #controller-view { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        .ctrl-btn { flex: 1; height: 100%; border: none; outline: none; transition: filter 0.1s; opacity: 0.8; }
        .ctrl-btn:active, .ctrl-btn.active-touch { opacity: 1; filter: brightness(1.5); }
        
        .color-0 { background-color: #2ecc71; } /* Green */
        .color-1 { background-color: #e74c3c; } /* Red */
        .color-2 { background-color: #f1c40f; } /* Yellow */
        .color-3 { background-color: #3498db; } /* Blue */

        /* Custom Scrollbar for song list */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #333; }
        ::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #888; }
        
        .song-item { transition: background 0.2s; }
        .song-item:hover, .song-item.selected { background-color: #4f46e5; cursor: pointer; }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="menu-view" class="view active items-center justify-center bg-gray-900">
        <h1 class="text-6xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">GUITAR SYNC</h1>
        <p class="mb-12 text-gray-400">P2P Rhythm Game</p>
        
        <div class="flex gap-6">
            <button onclick="initHost()" class="px-8 py-4 bg-purple-600 hover:bg-purple-500 rounded-xl font-bold text-xl shadow-lg transition-transform hover:scale-105">
                💻 Host on PC
            </button>
            <button onclick="showJoinMenu()" class="px-8 py-4 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold text-xl shadow-lg transition-transform hover:scale-105">
                📱 Join on Phone
            </button>
        </div>
    </div>

    <!-- HOST LOBBY -->
    <div id="host-lobby-view" class="view items-center justify-center bg-gray-900">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-4xl flex gap-8 h-[80vh]">
            
            <!-- Left Side: Room Info & Status -->
            <div class="flex-1 flex flex-column flex-col">
                <h2 class="text-3xl font-bold mb-4">Host Room</h2>
                <div class="bg-gray-900 p-6 rounded-xl text-center mb-6">
                    <p class="text-gray-400 mb-2">Join Code</p>
                    <h1 id="room-code" class="text-6xl font-mono font-black tracking-widest text-green-400">----</h1>
                </div>
                
                <div class="flex-1 bg-gray-900 p-4 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-600" id="host-status-box">
                    <p id="host-status-text" class="text-gray-400 animate-pulse text-xl">Waiting for controller to connect...</p>
                </div>

                <div class="mt-6 flex flex-col gap-4">
                    <div id="selected-song-display" class="text-lg font-bold text-yellow-400">Selected: None</div>
                    <button id="start-game-btn" onclick="startCountdown()" disabled class="w-full py-4 bg-green-600 hover:bg-green-500 disabled:bg-gray-700 disabled:opacity-50 rounded-xl font-bold text-xl transition-all">
                        Start Game
                    </button>
                </div>
            </div>

            <!-- Right Side: Song Selection (100 Songs) -->
            <div class="w-1/2 bg-gray-900 rounded-xl flex flex-col overflow-hidden">
                <h3 class="text-xl font-bold p-4 bg-gray-950 border-b border-gray-700">Select Song (100)</h3>
                <div id="song-list" class="overflow-y-auto flex-1 p-2">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- HOST GAME VISUALIZER -->
    <div id="game-view" class="view bg-black relative">
        <canvas id="game-canvas"></canvas>
        <audio id="bg-music" preload="auto"></audio> <!-- ADDED AUDIO TAG -->
        <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center hidden bg-black/80 z-50">
            <h1 id="countdown-text" class="text-[15rem] font-black text-white drop-shadow-[0_0_20px_rgba(255,255,255,1)]">3</h1>
        </div>
        <div id="score-overlay" class="absolute top-4 left-4 text-3xl font-bold font-mono">
            Score: <span id="score-val" class="text-yellow-400">0</span><br>
            Combo: <span id="combo-val" class="text-blue-400">0</span>x
        </div>
    </div>

    <!-- JOIN MENU (PHONE) -->
    <div id="join-menu-view" class="view items-center justify-center bg-gray-900 px-6">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-bold mb-6">Enter Room Code</h2>
            <input type="number" id="join-code-input" class="w-full bg-gray-900 border-2 border-gray-600 rounded-xl px-4 py-6 text-center text-4xl font-mono tracking-widest text-white mb-6 focus:border-pink-500 outline-none" placeholder="1234">
            <button onclick="joinRoom()" class="w-full py-4 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold text-xl shadow-lg">
                Connect
            </button>
            <p id="join-status" class="mt-4 text-gray-400"></p>
        </div>
    </div>

    <!-- CONTROLLER VIEW (PHONE INTERFACE) -->
    <div id="controller-view" class="view">
        <div class="ctrl-btn color-0" data-col="0"></div>
        <div class="ctrl-btn color-1" data-col="1"></div>
        <div class="ctrl-btn color-2" data-col="2"></div>
        <div class="ctrl-btn color-3" data-col="3"></div>
    </div>

    <script>
        // --- GLOBAL VARIABLES ---
        let peer = null;
        let conn = null;
        let isHost = false;
        let roomCode = "";
        let selectedSong = null;
        
        // Game State
        let gameLoop;
        let audioCtx;
        let startTime = 0;
        let notes = [];
        let hitEffects = [];
        let score = 0;
        let combo = 0;
        let songRunning = false;
        
        // Visual constants
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const COLORS = ['#2ecc71', '#e74c3c', '#f1c40f', '#3498db']; // Green, Red, Yellow, Blue
        let KEY_STATE = [false, false, false, false];
        
        const SPEED = 0.5; // pixels per ms
        const HIT_ZONE_Y_OFFSET = 100; // Distance from bottom
        const NOTE_RADIUS = 30;
        const HIT_WINDOW = 150; // ms timing window

        // --- UI NAVIGATION ---
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => {
                v.classList.remove('active');
                if(v.id === 'controller-view') v.style.display = 'none'; // special case
            });
            const target = document.getElementById(viewId);
            if(viewId === 'controller-view') {
                target.style.display = 'flex'; // Use flex row for controller
            } else {
                target.classList.add('active');
            }
        }

        function showJoinMenu() {
            switchView('join-menu-view');
        }

        // --- MOCK SONG LIST GENERATION WITH REAL AUDIO URLS ---
        function generateSongList() {
            const list = document.getElementById('song-list');
            for(let i = 1; i <= 100; i++) {
                const div = document.createElement('div');
                let songName = `Track ${i}`;
                let audioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; // Default generic track
                
                // Map the first few to specific placeholder MP3s
                if(i === 1) { 
                    songName = "Hayloft (Rock Placeholder)"; 
                    audioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"; 
                }
                if(i === 2) { 
                    songName = "Through the Fire and Flames (Fast Placeholder)"; 
                    audioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"; 
                }
                if(i === 3) { 
                    songName = "Slow Jam"; 
                    audioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3"; 
                }
                
                div.className = "song-item p-3 border-b border-gray-800 text-gray-300";
                div.innerHTML = `<span class="text-gray-500 mr-3">#${i.toString().padStart(3, '0')}</span> ${songName}`;
                div.onclick = () => {
                    document.querySelectorAll('.song-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedSong = { id: i, name: songName, url: audioUrl };
                    document.getElementById('selected-song-display').innerText = `Selected: ${songName}`;
                    checkStartReady();
                };
                list.appendChild(div);
            }
        }

        // --- P2P NETWORK LOGIC (PEERJS) ---

        // 1. Host Logic
        function initHost() {
            switchView('host-lobby-view');
            generateSongList();
            
            // Generate simple 4 digit numeric code
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('room-code').innerText = roomCode;
            
            peer = new Peer(`guitarsync-${roomCode}`); // Prefix to avoid global collision
            
            peer.on('open', (id) => {
                console.log('Host initialized with ID:', id);
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupHostConnection();
            });

            peer.on('error', (err) => {
                console.error(err);
                alert("Connection error: " + err.type);
            });
        }

        function setupHostConnection() {
            conn.on('open', () => {
                document.getElementById('host-status-box').className = "flex-1 bg-green-900 p-4 rounded-xl flex items-center justify-center border-2 border-solid border-green-500";
                document.getElementById('host-status-text').className = "text-green-300 font-bold text-2xl";
                document.getElementById('host-status-text').innerText = "📱 Phone Connected!";
                checkStartReady();
            });

            conn.on('data', (data) => {
                if(data.type === 'keydown') handleHostKey(data.col, true);
                if(data.type === 'keyup') handleHostKey(data.col, false);
            });
        }

        function checkStartReady() {
            if(conn && conn.open && selectedSong) {
                document.getElementById('start-game-btn').disabled = false;
            }
        }

        // 2. Client (Controller) Logic
        function joinRoom() {
            const code = document.getElementById('join-code-input').value;
            if(code.length !== 4) return;
            
            document.getElementById('join-status').innerText = "Connecting...";
            peer = new Peer(); // Client doesn't need specific ID
            
            peer.on('open', () => {
                conn = peer.connect(`guitarsync-${code}`);
                
                conn.on('open', () => {
                    setupControllerUI();
                });
                
                conn.on('error', () => {
                    document.getElementById('join-status').innerText = "Failed to connect to room.";
                });
            });
        }

        function setupControllerUI() {
            switchView('controller-view');
            
            // Setup touch listeners for zero-delay inputs
            const buttons = document.querySelectorAll('.ctrl-btn');
            
            // Prevent default behavior (like scrolling/zooming)
            document.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});
            
            buttons.forEach(btn => {
                const col = parseInt(btn.getAttribute('data-col'));
                
                // Touch Start
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // Prevent click emulation delay
                    btn.classList.add('active-touch');
                    if(conn && conn.open) conn.send({type: 'keydown', col: col});
                });
                
                // Touch End
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    btn.classList.remove('active-touch');
                    if(conn && conn.open) conn.send({type: 'keyup', col: col});
                });

                // Mouse fallback for testing on PC
                btn.addEventListener('mousedown', (e) => {
                    btn.classList.add('active-touch');
                    if(conn && conn.open) conn.send({type: 'keydown', col: col});
                });
                btn.addEventListener('mouseup', (e) => {
                    btn.classList.remove('active-touch');
                    if(conn && conn.open) conn.send({type: 'keyup', col: col});
                });
            });
        }

        // --- GAME LOGIC (HOST ONLY) ---

        function handleHostKey(col, isDown) {
            KEY_STATE[col] = isDown;
            if(isDown && songRunning) {
                checkHit(col);
            }
        }

        // 1. Audio & Speech
        function startAudioContext() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSynthesizedBeat() {
            if(!audioCtx) return;
            // Plays a pleasant "hit" sound when you successfully strike a note
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function speakWord(word, callback) {
            const overlay = document.getElementById('countdown-overlay');
            const textEl = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            textEl.innerText = word;

            // Speech Synthesis
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.rate = 1.5;
                utterance.pitch = word === "GO!" ? 1.5 : 1.0;
                window.speechSynthesis.speak(utterance);
            }

            // Visual animation reset
            textEl.style.transform = 'scale(0.5)';
            textEl.style.opacity = '0';
            setTimeout(() => {
                textEl.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                textEl.style.transform = 'scale(1)';
                textEl.style.opacity = '1';
            }, 50);

            setTimeout(callback, 1000);
        }

        // 2. Game Lifecycle
        function startCountdown() {
            switchView('game-view');
            startAudioContext();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Set up audio ready to play immediately after countdown
            const audioEl = document.getElementById('bg-music');
            audioEl.src = selectedSong.url;
            audioEl.load();

            // 3, 2, 1, Go! Sequence
            speakWord("3", () => {
                speakWord("2", () => {
                    speakWord("1", () => {
                        speakWord("GO!", () => {
                            document.getElementById('countdown-overlay').classList.add('hidden');
                            startGameEngine();
                        });
                    });
                });
            });
        }

        function generateBeatmap() {
            notes = [];
            let timeTracker = 2000; // Start first note 2s in
            
            // Adjust speed/density based on song selection ID pseudo-randomly
            const density = selectedSong.id === 1 ? 300 : (selectedSong.id === 2 ? 150 : 500); 

            for(let i=0; i<300; i++) {
                // Generate a random column 0-3
                const col = Math.floor(Math.random() * 4);
                notes.push({
                    time: timeTracker,
                    col: col,
                    hit: false,
                    missed: false,
                    y: -100 // Starting visual position
                });
                
                // Advance time by a typical beat interval (varying slightly)
                timeTracker += density + (Math.random() * 200); 
                
                // Occasional chords (double notes)
                if(Math.random() > 0.8) {
                    let col2 = (col + Math.floor(Math.random() * 3) + 1) % 4;
                    notes.push({ time: timeTracker - density, col: col2, hit: false, missed: false, y: -100});
                }
            }
        }

        function startGameEngine() {
            const audioEl = document.getElementById('bg-music');
            
            audioEl.play().then(() => {
                songRunning = true;
                startTime = performance.now(); // Fallback if audio.currentTime is weird
                generateBeatmap();
                score = 0;
                combo = 0;
                updateScoreUI();
                requestAnimationFrame(gameLoopUpdate);
            }).catch(err => {
                console.error("Audio playback failed:", err);
                alert("Audio could not play. Check your connection or browser permissions.");
                // Fallback to silent mode
                songRunning = true;
                startTime = performance.now();
                generateBeatmap();
                requestAnimationFrame(gameLoopUpdate);
            });
        }

        function getElapsedTime() {
            const audioEl = document.getElementById('bg-music');
            // If audio is playing perfectly, sync visualizer directly to the audio track!
            if (audioEl && !audioEl.paused && audioEl.duration > 0) {
                return audioEl.currentTime * 1000;
            }
            // Fallback if audio fails
            return performance.now() - startTime;
        }

        // 3. Engine Update
        function gameLoopUpdate() {
            if(!songRunning) return;
            const elapsedTime = getElapsedTime();

            updateNotes(elapsedTime);
            drawCanvas();

            requestAnimationFrame(gameLoopUpdate);
        }

        function updateNotes(elapsedTime) {
            const hitZoneY = canvas.height - HIT_ZONE_Y_OFFSET;

            notes.forEach(note => {
                if (note.hit || note.missed) return;

                // Calculate where the note should be visually.
                // It should reach hitZoneY exactly when elapsedTime == note.time
                const timeDiff = note.time - elapsedTime;
                note.y = hitZoneY - (timeDiff * SPEED);

                // Check Miss (If note passes hit window)
                if (timeDiff < -HIT_WINDOW) {
                    note.missed = true;
                    combo = 0; // Reset combo
                    updateScoreUI();
                    createHitEffect(note.col, hitZoneY, 'MISS', '#e74c3c');
                }
            });
            
            // Clean up old hit effects
            hitEffects = hitEffects.filter(e => e.life > 0);
            hitEffects.forEach(e => e.life--);
        }

        // 4. Hit Detection logic (Triggered remotely by Phone)
        function checkHit(col) {
            const elapsedTime = getElapsedTime();
            
            // Find the lowest unhit note in this column
            let targetNote = null;
            let minDiff = Infinity;

            for(let i=0; i<notes.length; i++) {
                const note = notes[i];
                if(note.col === col && !note.hit && !note.missed) {
                    const diff = Math.abs(note.time - elapsedTime);
                    if(diff < HIT_WINDOW && diff < minDiff) {
                        minDiff = diff;
                        targetNote = note;
                    }
                }
            }

            if(targetNote) {
                targetNote.hit = true;
                combo++;
                playSynthesizedBeat(); // Play successful strike sound!
                
                // Calculate points based on accuracy
                let points = 50;
                let text = "GOOD";
                let color = "#f1c40f";
                
                if(minDiff < HIT_WINDOW * 0.3) {
                    points = 100;
                    text = "PERFECT!";
                    color = "#2ecc71";
                }

                score += points * (1 + Math.floor(combo / 10));
                updateScoreUI();
                
                const hitZoneY = canvas.height - HIT_ZONE_Y_OFFSET;
                createHitEffect(col, hitZoneY, text, color);
            }
        }

        function createHitEffect(col, y, text, color) {
            const laneWidth = canvas.width / 4;
            const x = (col * laneWidth) + (laneWidth / 2);
            hitEffects.push({
                x: x, y: y, text: text, color: color, life: 30, maxLife: 30
            });
        }

        function updateScoreUI() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('combo-val').innerText = combo;
            
            if(combo > 10) document.getElementById('combo-val').className = "text-red-500 animate-pulse drop-shadow-[0_0_10px_rgba(255,0,0,0.8)]";
            else document.getElementById('combo-val').className = "text-blue-400";
        }

        // 5. Drawing
        function resizeCanvas() {
            // Keep 16:9 aspect ratio roughly, bounded by screen size
            const maxWidth = window.innerWidth * 0.8;
            canvas.width = Math.min(600, maxWidth);
            canvas.height = window.innerHeight;
        }

        function drawCanvas() {
            // Clear
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const laneWidth = canvas.width / 4;
            const hitZoneY = canvas.height - HIT_ZONE_Y_OFFSET;

            // Draw Highway perspective/lines
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            for(let i=1; i<4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }

            // Draw Hit Receptors (Bottom Circles)
            for(let i=0; i<4; i++) {
                const x = (i * laneWidth) + (laneWidth / 2);
                
                // Draw base
                ctx.beginPath();
                ctx.arc(x, hitZoneY, NOTE_RADIUS, 0, Math.PI * 2);
                ctx.lineWidth = 4;
                ctx.strokeStyle = COLORS[i];
                ctx.stroke();

                // Fill if corresponding key is currently held down via Phone
                if(KEY_STATE[i]) {
                    ctx.fillStyle = COLORS[i];
                    ctx.globalAlpha = 0.5;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                    
                    // Laser beam effect up the track
                    const grad = ctx.createLinearGradient(0, hitZoneY, 0, 0);
                    grad.addColorStop(0, COLORS[i] + '80'); // 50% opacity
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.fillRect(i * laneWidth, 0, laneWidth, hitZoneY);
                }
            }

            // Draw Notes
            notes.forEach(note => {
                if (note.hit || note.missed) return;
                // Don't draw if way off top of screen
                if(note.y < -50) return;

                const x = (note.col * laneWidth) + (laneWidth / 2);
                
                ctx.beginPath();
                ctx.arc(x, note.y, NOTE_RADIUS * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = COLORS[note.col];
                ctx.fill();
                
                // Inner highlight
                ctx.beginPath();
                ctx.arc(x, note.y, NOTE_RADIUS * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });

            // Draw Hit Effects (Text like PERFECT / MISS)
            hitEffects.forEach(e => {
                const progress = e.life / e.maxLife; // 1.0 down to 0
                ctx.font = `bold ${20 + (1-progress)*20}px "Segoe UI", Arial`;
                ctx.fillStyle = e.color;
                ctx.textAlign = 'center';
                ctx.globalAlpha = progress;
                ctx.fillText(e.text, e.x, e.y - (1-progress)*50); // Float up
            });
            ctx.globalAlpha = 1.0;
        }

    </script>
</body>
</html>

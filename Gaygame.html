
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone Optimizer JS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* The Draggable Rectangle */
        #assistive-rect {
            position: fixed;
            width: 170px;
            height: 54px;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            cursor: grab;
            touch-action: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        #assistive-rect:active {
            cursor: grabbing;
            transform: scale(1.05);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Full Dashboard Styling */
        #dashboard {
            position: fixed;
            inset: 10px;
            background: rgba(7, 10, 18, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10000;
            display: none;
            flex-direction: column;
            padding: 24px;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        .btn-boost {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-boost:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <!-- Assistive Touch Rectangle -->
    <div id="assistive-rect" style="left: 20px; top: 100px;">
        <div class="flex items-center justify-center w-8 h-8 bg-blue-600 rounded-lg shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4-4-4m-8 8h11"/></svg>
        </div>
        <div class="ml-3 overflow-hidden" onclick="openDashboard()">
            <div class="flex items-center">
                <div class="status-dot"></div>
                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Active</span>
            </div>
            <div id="mini-fps" class="text-xs text-white font-bold mono">60 FPS · 31°C</div>
        </div>
    </div>

    <!-- Full Dashboard Overlay -->
    <div id="dashboard">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-black text-white tracking-tight">SYSTEM CORE</h1>
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Mobile Optimizer v4.0</p>
            </div>
            <button onclick="closeDashboard()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full text-white">✕</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="stat-card">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">CPU Load</p>
                <p id="cpu-val" class="text-2xl text-blue-400 font-bold mono">24%</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Memory</p>
                <p id="ram-val" class="text-2xl text-purple-400 font-bold mono">1.2GB</p>
            </div>
        </div>

        <div class="space-y-3 mb-6">
            <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-500/20 text-emerald-400 flex items-center justify-center rounded-xl font-bold">⚡</div>
                    <div>
                        <p class="text-sm font-bold text-white">Beast Mode</p>
                        <p class="text-[10px] text-slate-500">Max FPS / Low Latency</p>
                    </div>
                </div>
                <input type="checkbox" id="beast-toggle" class="w-10 h-5 bg-slate-700 rounded-full appearance-none checked:bg-emerald-500 transition-colors relative after:content-[''] after:absolute after:top-1 after:left-1 after:w-3 after:h-3 after:bg-white after:rounded-full checked:after:translate-x-5 after:transition-transform">
            </div>
        </div>

        <button onclick="runBoost()" id="boost-btn" class="btn-boost w-full py-5 rounded-2xl text-white font-black text-sm uppercase tracking-widest mb-6">
            Deep Clean Cache
        </button>

        <div id="log-box" class="flex-1 bg-black/40 rounded-2xl p-4 overflow-y-auto mono text-[10px] text-slate-400 space-y-1">
            <div>[#] Kernel security check passed.</div>
            <div>[#] Waiting for user input...</div>
        </div>
    </div>

    <script>
        const rect = document.getElementById('assistive-rect');
        const dash = document.getElementById('dashboard');
        const miniFps = document.getElementById('mini-fps');
        
        let isDragging = false;
        let startX, startY, initialX, initialY;

        // --- Draggable Logic ---
        const start = (e) => {
            isDragging = true;
            const t = e.touches ? e.touches[0] : e;
            startX = t.clientX - rect.offsetLeft;
            startY = t.clientY - rect.offsetTop;
            initialX = rect.offsetLeft;
            initialY = rect.offsetTop;
        };

        const move = (e) => {
            if (!isDragging) return;
            const t = e.touches ? e.touches[0] : e;
            rect.style.left = (t.clientX - startX) + 'px';
            rect.style.top = (t.clientY - startY) + 'px';
        };

        const end = (e) => {
            if (!isDragging) return;
            isDragging = false;
            // Prevent dashboard opening if moved significantly
            const finalX = rect.offsetLeft;
            const finalY = rect.offsetTop;
            if (Math.abs(finalX - initialX) < 5 && Math.abs(finalY - initialY) < 5) {
                openDashboard();
            }
        };

        rect.addEventListener('mousedown', start);
        rect.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);

        // --- UI Logic ---
        function openDashboard() { dash.style.display = 'flex'; }
        function closeDashboard() { dash.style.display = 'none'; }

        function addLog(msg, color = 'text-slate-400') {
            const l = document.createElement('div');
            l.className = color;
            l.innerText = `[#] ${msg}`;
            document.getElementById('log-box').prepend(l);
        }

        function runBoost() {
            const btn = document.getElementById('boost-btn');
            btn.innerText = "OPTIMIZING...";
            btn.disabled = true;
            addLog("Scanning memory leaks...", "text-blue-400");
            
            setTimeout(() => {
                addLog("Purged 842MB of system cache.", "text-emerald-400");
                addLog("Network priority shifted to Foreground.", "text-blue-400");
                btn.innerText = "DEEP CLEAN CACHE";
                btn.disabled = false;
            }, 1500);
        }

        // Live Simulation
        setInterval(() => {
            const fps = Math.floor(Math.random() * 5 + 57);
            const cpu = Math.floor(Math.random() * 15 + 20);
            const ram = (Math.random() * 0.5 + 1.1).toFixed(1);
            
            miniFps.innerText = `${fps} FPS · 32°C`;
            document.getElementById('cpu-val').innerText = `${cpu}%`;
            document.getElementById('ram-val').innerText = `${ram}GB`;
        }, 2000);
    </script>
</body>
</html>

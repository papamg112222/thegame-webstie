<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap for MrBeast Live!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Prevent scrolling and make the whole screen a tap target */
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .beast-font {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .pulse-btn {
            animation: pulse-grow 1.5s infinite;
        }

        @keyframes pulse-grow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(236, 72, 153, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #090979 0%, #00d4ff 100%);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="gradient-bg h-screen w-screen flex flex-col items-center justify-center cursor-pointer select-none" id="tap-target">

    <!-- Main Content Container -->
    <div class="relative z-10 flex flex-col items-center justify-center p-6 text-center pointer-events-none">
        
        <!-- Animated "LIVE" Badge -->
        <div class="mb-6 flex items-center bg-red-600 text-white px-4 py-1 rounded-full font-bold tracking-widest text-sm animate-pulse border-2 border-red-400 shadow-[0_0_15px_rgba(220,38,38,0.8)]">
            <span class="w-2 h-2 bg-white rounded-full mr-2"></span>
            LIVE NOW
        </div>

        <!-- Headline -->
        <h1 class="beast-font text-5xl md:text-7xl text-white mb-2 leading-tight">
            MRBEAST<br><span class="text-yellow-400">$1,000,000</span><br>FINALE
        </h1>

        <p class="font-sans text-blue-100 text-lg md:text-xl mb-12 max-w-md drop-shadow-md font-bold">
            The ultimate streamer challenge is happening right now!
        </p>

        <!-- Tap Indicator -->
        <div class="pulse-btn bg-pink-500 text-white beast-font text-2xl md:text-4xl py-4 px-10 rounded-full border-4 border-white shadow-2xl flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 md:w-10 md:h-10">
                <path d="M15.146 12.354l-5.792 5.792a.5.5 0 01-.854-.353V6.207a.5.5 0 01.854-.353l5.792 5.792a.5.5 0 010 .708z"/>
            </svg>
            TAP ANYWHERE TO WATCH
        </div>
        
    </div>

    <!-- Particle Overlay for Aesthetics -->
    <div class="absolute inset-0 pointer-events-none opacity-30" style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 30px 30px;"></div>

    <script>
        // Target YouTube URL - this dynamically redirects to whatever stream is active on the channel
        const MRBEAST_LIVE_URL = "https://www.youtube.com/@MrBeast/live";

        // Function to trigger the redirect
        const triggerRedirect = () => {
            // Visual feedback (optional)
            document.body.style.opacity = '0.5';
            
            // Redirect the browser instantly
            window.location.href = MRBEAST_LIVE_URL;
        };

        // Attach event listeners for both mouse clicks and mobile touch taps
        const tapTarget = document.getElementById('tap-target');
        
        tapTarget.addEventListener('click', triggerRedirect);
        tapTarget.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents double-firing on some mobile browsers
            triggerRedirect();
        }, { passive: false });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMQX Remote Camera App</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        h2, h3 { margin-top: 0; color: #00b074; }
        input { padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; width: calc(100% - 22px); margin-bottom: 10px; }
        button { padding: 10px 15px; background: #00b074; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #008f5d; }
        .camera-btn { background: #ff4757; width: auto; margin: 0; }
        .camera-btn:hover { background: #ff253a; }
        ul { list-style: none; padding: 0; }
        li { background: #2a2a2a; margin-bottom: 8px; padding: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        video { width: 100%; background: #000; border-radius: 8px; aspect-ratio: 16/9; object-fit: cover; }
        #status { font-size: 0.9em; color: #aaa; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="grid">
    <!-- Left Panel: Controls -->
    <div class="panel">
        <h2>EMQX Camera Router</h2>
        <span id="status">Connecting to EMQX...</span>
        
        <input type="text" id="serverNameInput" placeholder="Name your display...">
        <button id="hostBtn">Host Display Monitor</button>

        <h3>Available Monitors</h3>
        <ul id="serverList">
            <!-- Active monitors will appear here -->
        </ul>
    </div>

    <!-- Right Panel: Video Feed -->
    <div class="panel">
        <h3 id="videoTitle">Waiting for connection...</h3>
        <!-- The video element for either the host's monitor or the camera's local preview -->
        <video id="videoPlayer" autoplay playsinline></video>
    </div>
</div>

<script>
    const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    const myId = 'device_' + Math.random().toString(36).substring(2, 9);
    
    const TOPIC_SERVERS = 'emqx_webrtc_cam/monitors/';
    const TOPIC_SIGNALING = 'emqx_webrtc_cam/signaling/';

    let peerConnection;
    let localStream;
    let isMonitor = false;
    let activeServers = {};

    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    const statusEl = document.getElementById('status');
    const serverListEl = document.getElementById('serverList');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoTitle = document.getElementById('videoTitle');

    // --- MQTT Connection ---
    mqttClient.on('connect', () => {
        statusEl.innerText = `Connected! (ID: ${myId})`;
        statusEl.style.color = '#00b074';
        
        mqttClient.subscribe(TOPIC_SERVERS + '+');
        mqttClient.subscribe(TOPIC_SIGNALING + myId);
    });

    mqttClient.on('message', async (topic, message) => {
        const payload = JSON.parse(message.toString());

        // Update Monitor List
        if (topic.startsWith(TOPIC_SERVERS)) {
            const serverName = topic.split('/').pop();
            if (payload.action === 'online') {
                activeServers[serverName] = payload.hostId;
                updateServerList();
            } else if (payload.action === 'offline') {
                delete activeServers[serverName];
                updateServerList();
            }
        }

        // WebRTC Signaling
        if (topic === TOPIC_SIGNALING + myId) {
            if (payload.type === 'offer' && isMonitor) {
                // Monitor receives an offer from a Camera
                handleReceiveCameraOffer(payload);
            } else if (payload.type === 'answer' && !isMonitor) {
                // Camera receives an answer from the Monitor
                await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp));
            } else if (payload.type === 'candidate' && peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate));
            }
        }
    });

    function updateServerList() {
        serverListEl.innerHTML = '';
        for (const [name, hostId] of Object.entries(activeServers)) {
            if (hostId === myId) continue; 
            
            const li = document.createElement('li');
            li.innerHTML = `
                <span>🖥️ ${name}</span>
                <button class="camera-btn" onclick="sendCameraTo('${name}', '${hostId}')">Send Camera</button>
            `;
            serverListEl.appendChild(li);
        }
    }

    // --- Device A: Hosting the Display ---
    document.getElementById('hostBtn').onclick = () => {
        const serverName = document.getElementById('serverNameInput').value || 'My Screen';
        isMonitor = true;
        videoTitle.innerText = `Hosting Monitor: ${serverName}`;

        mqttClient.publish(TOPIC_SERVERS + serverName, JSON.stringify({
            action: 'online',
            hostId: myId
        }), { retain: true });

        // Clean up if the browser closes
        window.addEventListener('beforeunload', () => {
            mqttClient.publish(TOPIC_SERVERS + serverName, JSON.stringify({ action: 'offline' }), { retain: true });
        });
    };

    async function handleReceiveCameraOffer(payload) {
        peerConnection = new RTCPeerConnection(rtcConfig);
        
        // When the camera feed arrives, display it
        peerConnection.ontrack = event => {
            videoPlayer.srcObject = event.streams[0];
            videoTitle.innerText = `Live Camera Feed Connected`;
        };

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                mqttClient.publish(TOPIC_SIGNALING + payload.from, JSON.stringify({
                    type: 'candidate',
                    candidate: event.candidate,
                    from: myId
                }));
            }
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        mqttClient.publish(TOPIC_SIGNALING + payload.from, JSON.stringify({
            type: 'answer',
            sdp: answer,
            from: myId
        }));
    }

    // --- Device B: Sending the Camera ---
    async function sendCameraTo(serverName, targetHostId) {
        try {
            // Request the rear camera if available (ideal for phones)
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, 
                audio: false 
            });
            
            videoPlayer.srcObject = localStream;
            videoPlayer.muted = true;
            videoTitle.innerText = `Streaming Camera to: ${serverName}`;
            
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Add our camera track to the connection
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    mqttClient.publish(TOPIC_SIGNALING + targetHostId, JSON.stringify({
                        type: 'candidate',
                        candidate: event.candidate,
                        from: myId
                    }));
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            mqttClient.publish(TOPIC_SIGNALING + targetHostId, JSON.stringify({
                type: 'offer',
                sdp: offer,
                from: myId
            }));

        } catch (err) {
            console.error("Camera error:", err);
            alert("Could not access the camera. Make sure you are using HTTPS!");
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medieval Motion Quest P2P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: rgba(0,0,0,0.8); color: white; transition: opacity 0.5s; }
        canvas { display: block; }
        .hidden { display: none !important; }
        .card { background: rgba(30, 30, 40, 0.9); border: 2px solid #554433; border-radius: 15px; padding: 2rem; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn { background: #8b4513; color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background: #a0522d; }
        #joystick-zone { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="setup-screen" class="card">
            <h1 class="text-3xl font-bold mb-4 text-amber-400">MEDIEVAL MOTION QUEST</h1>
            <p class="mb-6 text-gray-300">Choose your device role:</p>
            <div class="flex gap-4 justify-center">
                <button onclick="initHost()" class="btn">Host (PC/Laptop Screen)</button>
                <button onclick="showJoinScreen()" class="btn">Join (Phone Controller)</button>
            </div>
        </div>

        <div id="host-screen" class="card hidden">
            <h2 class="text-2xl mb-2">Waiting for Controller...</h2>
            <p class="text-gray-400 mb-4">Enter this ID on your phone:</p>
            <div id="room-id-display" class="text-4xl font-mono font-bold text-amber-500 mb-4">----</div>
            <p class="text-sm">Keep this window open on your computer.</p>
        </div>

        <div id="join-screen" class="card hidden">
            <h2 class="text-2xl mb-4">Connect to PC</h2>
            <input type="text" id="room-input" placeholder="Enter Room ID" class="bg-gray-800 text-white p-2 rounded mb-4 w-full text-center">
            <button onclick="initClient()" class="btn w-full">Connect & Start</button>
            <button onclick="location.reload()" class="mt-2 text-sm text-gray-400">Back</button>
        </div>

        <div id="controller-active" class="card hidden">
            <h2 class="text-2xl mb-2">CONNECTED</h2>
            <p class="text-green-400 mb-4">Phone is now your Joystick & Sword</p>
            <p class="text-xs text-gray-400">Swing phone to attack.<br>Tilt to move.</p>
            <div id="motion-data" class="text-xs mt-4 opacity-50">Waiting for motion...</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, sword, player, peer, conn;
        let isHost = false;
        let moveForward = 0, moveRight = 0, isSwinging = false;
        const appId = "medieval-motion-" + Math.random().toString(36).substring(7);

        // --- P2P LOGIC ---

        function initHost() {
            isHost = true;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('host-screen').classList.remove('hidden');
            
            peer = new Peer();
            peer.on('open', (id) => {
                document.getElementById('room-id-display').innerText = id;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupHostGame();
            });
        }

        function showJoinScreen() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('join-screen').classList.remove('hidden');
        }

        function initClient() {
            const targetId = document.getElementById('room-input').value.trim();
            if (!targetId) return;

            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetId);
                conn.on('open', () => {
                    document.getElementById('join-screen').classList.add('hidden');
                    document.getElementById('controller-active').classList.remove('hidden');
                    startMotionTracking();
                });
            });
        }

        function startMotionTracking() {
            // Request permission for iOS
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    });
            } else {
                window.addEventListener('devicemotion', handleMotion);
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            const totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            
            // Detect Swing
            if (totalAcc > 25) {
                conn.send({ type: 'action', value: 'swing' });
            }

            document.getElementById('motion-data').innerText = `Acc: ${totalAcc.toFixed(2)}`;
        }

        function handleOrientation(event) {
            // Use Beta (tilt front/back) for movement
            // Use Gamma (tilt left/right) for rotation
            const forward = Math.max(-1, Math.min(1, event.beta / 45));
            const right = Math.max(-1, Math.min(1, event.gamma / 45));
            
            conn.send({ type: 'move', forward, right });
        }

        // --- 3D GAME LOGIC (HOST ONLY) ---

        function setupHostGame() {
            document.getElementById('ui-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-overlay').classList.add('hidden'), 500);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x91abb5, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const sun = new THREE.DirectionalLight(0xfff5e1, 1.2);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 0.6));

            // World Group
            const world = new THREE.Group();
            scene.add(world);

            // Ground - Cobblestone-ish
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            world.add(ground);

            // Create Medieval Town
            for(let i=0; i<60; i++) {
                createHouse(world);
            }

            // Create "Civilian" NPCs (Simple blocks)
            for(let i=0; i<15; i++) {
                createCivilian(world);
            }

            // Player Setup
            player = new THREE.Group();
            player.position.set(0, 1.7, 0);
            scene.add(player);
            player.add(camera);

            // Sword
            createSword();

            // P2P Data Receiver
            conn.on('data', (data) => {
                if (data.type === 'move') {
                    moveForward = -data.forward; // Inverted for natural feel
                    moveRight = data.right;
                } else if (data.type === 'action' && data.value === 'swing') {
                    performSwing();
                }
            });

            animate();
        }

        function createHouse(group) {
            const h = new THREE.Group();
            const w = 4 + Math.random() * 4;
            const d = 4 + Math.random() * 4;
            const height = 5 + Math.random() * 5;

            // Base
            const base = new THREE.Mesh(
                new THREE.BoxGeometry(w, height, d),
                new THREE.MeshStandardMaterial({ color: 0x7a6b5a })
            );
            base.position.y = height/2;
            base.castShadow = true;
            h.add(base);

            // Roof
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(w * 0.8, 4, 4),
                new THREE.MeshStandardMaterial({ color: 0x4a2c2a })
            );
            roof.position.y = height + 2;
            roof.rotation.y = Math.PI/4;
            h.add(roof);

            h.position.set(
                (Math.random() - 0.5) * 150,
                0,
                (Math.random() - 0.5) * 150
            );
            
            // Don't spawn on player
            if (h.position.length() > 10) group.add(h);
        }

        function createCivilian(group) {
            const person = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.3, 1, 4, 8),
                new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
            );
            person.position.set(
                (Math.random() - 0.5) * 80,
                0.8,
                (Math.random() - 0.5) * 80
            );
            person.userData.velocity = new THREE.Vector3((Math.random()-0.5)*0.05, 0, (Math.random()-0.5)*0.05);
            group.add(person);
        }

        function createSword() {
            sword = new THREE.Group();
            
            // Blade
            const blade = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 1.2, 0.02),
                new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 })
            );
            blade.position.y = 0.8;
            sword.add(blade);

            // Guard
            const guard = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.05, 0.05),
                new THREE.MeshStandardMaterial({ color: 0xaa8833 })
            );
            guard.position.y = 0.25;
            sword.add(guard);

            // Handle
            const handle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x332211 })
            );
            handle.position.y = 0.1;
            sword.add(handle);

            sword.position.set(0.4, -0.4, -0.6);
            sword.rotation.x = Math.PI / 10;
            camera.add(sword);
        }

        function performSwing() {
            if (isSwinging) return;
            isSwinging = true;
            
            let startTime = Date.now();
            const duration = 300;

            const animateSwing = () => {
                let elapsed = Date.now() - startTime;
                let progress = elapsed / duration;

                if (progress < 1) {
                    // Quick down and across swing
                    sword.rotation.x = Math.PI / 10 + Math.sin(progress * Math.PI) * -1.5;
                    sword.rotation.z = Math.sin(progress * Math.PI) * -1;
                    requestAnimationFrame(animateSwing);
                } else {
                    sword.rotation.x = Math.PI / 10;
                    sword.rotation.z = 0;
                    isSwinging = false;
                }
            };
            animateSwing();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Player Movement
            if (player) {
                const speed = 0.15;
                const rotSpeed = 0.03;
                
                // Tilt move
                player.translateZ(moveForward * speed);
                player.rotation.y -= moveRight * rotSpeed;
            }

            // NPC Movement
            scene.children.forEach(child => {
                if (child.type === 'Group') { // The world or player
                    child.children.forEach(npc => {
                        if (npc.userData.velocity) {
                            npc.position.add(npc.userData.velocity);
                            if (Math.abs(npc.position.x) > 100 || Math.abs(npc.position.z) > 100) {
                                npc.userData.velocity.negate();
                            }
                        }
                    });
                }
            });

            // Gentle sword bob
            if (sword && !isSwinging) {
                sword.position.y = -0.4 + Math.sin(Date.now() * 0.003) * 0.02;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>

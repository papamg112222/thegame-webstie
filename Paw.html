<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discipline Tracker</title>

    <!-- Apple-Specific Tags for iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Discipline">
    
    <!-- PWA Manifest & Custom Icon -->
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Discipline%20Tracker%22%2C%22short_name%22%3A%22Discipline%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f172a%22%2C%22theme_color%22%3A%22%233b82f6%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%2C%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Fonts & Tailwind CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0B0F19',
                        panel: '#151C2C',
                        primary: '#3B82F6',
                        accent: '#38BDF8'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: white; overflow: hidden; }
        .glass-panel { background: rgba(21, 28, 44, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-text { text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        /* Smooth transitions */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-out { animation: fadeOut 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center m-0 antialiased selection:bg-primary selection:text-white">

    <!-- Mobile Device Mockup Container (Fills screen on mobile, looks like phone on desktop preview) -->
    <div class="relative w-full h-full sm:h-[850px] sm:max-h-[95vh] sm:max-w-md sm:rounded-[3rem] sm:border-[8px] border-gray-900 overflow-hidden flex flex-col bg-dark shadow-2xl">
        
        <!-- Screen 1: Onboarding Survey -->
        <div id="surveyScreen" class="absolute inset-0 flex flex-col p-6 z-20 bg-dark overflow-y-auto fade-in">
            <div class="mt-12 mb-8 text-center">
                <div class="w-20 h-20 bg-gradient-to-br from-primary to-accent rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black tracking-tight text-white mb-2">Commitment.</h1>
                <p class="text-gray-400 text-sm">We need some details before you begin your journey.</p>
            </div>

            <form id="setupForm" class="flex-1 flex flex-col space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Warrior Name</label>
                    <input type="text" id="userName" required placeholder="e.g. John" class="w-full bg-panel text-white rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary border border-gray-800 transition-all">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Age</label>
                        <input type="number" id="userAge" required placeholder="Years" class="w-full bg-panel text-white rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary border border-gray-800 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Weight (kg/lbs)</label>
                        <input type="number" id="userWeight" required placeholder="Weight" class="w-full bg-panel text-white rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary border border-gray-800 transition-all">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">How often did you fail?</label>
                    <select id="userFrequency" required class="w-full bg-panel text-white rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary border border-gray-800 transition-all appearance-none">
                        <option value="" disabled selected>Select frequency...</option>
                        <option value="daily">Multiple times a day</option>
                        <option value="weekly">A few times a week</option>
                        <option value="monthly">A few times a month</option>
                        <option value="rarely">Rarely, but I want to quit entirely</option>
                    </select>
                </div>

                <div class="flex-1 flex items-end pb-8 mt-6">
                    <button type="submit" class="w-full bg-white text-black font-bold text-lg rounded-2xl py-4 shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:bg-gray-200 active:scale-95 transition-all">
                        Begin My Journey
                    </button>
                </div>
            </form>
        </div>

        <!-- Screen 2: Dashboard (Hidden initially) -->
        <div id="dashboardScreen" class="absolute inset-0 flex flex-col z-10 hidden bg-dark pb-6">
            
            <!-- Dashboard Header -->
            <header class="pt-14 pb-4 px-6 flex justify-between items-center z-10 relative">
                <div>
                    <p class="text-gray-400 text-sm font-medium tracking-wide uppercase" id="greetingText">Welcome</p>
                    <h2 class="text-2xl font-black text-white" id="dashboardName">Warrior</h2>
                </div>
                <div class="w-12 h-12 rounded-full border-2 border-gray-800 overflow-hidden bg-panel flex items-center justify-center">
                    <img src="icon.png" alt="Profile" class="w-full h-full object-cover" onerror="this.style.display='none'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500 absolute -z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
            </header>

            <!-- Main Streak Display -->
            <main class="flex-1 flex flex-col px-6 relative overflow-y-auto">
                <!-- Background ambient glow -->
                <div class="absolute top-20 left-1/2 -translate-x-1/2 w-64 h-64 bg-primary rounded-full opacity-10 blur-3xl pointer-events-none"></div>

                <div class="mt-8 mb-10 flex flex-col items-center">
                    <p class="text-accent text-sm font-bold tracking-[0.2em] uppercase mb-4">Current Streak</p>
                    
                    <div class="flex items-end justify-center gap-2 mb-2">
                        <span id="streakDays" class="text-7xl font-black text-white glow-text tracking-tighter">00</span>
                        <span class="text-xl text-gray-400 font-bold mb-2">Days</span>
                    </div>
                    
                    <div class="flex gap-4 text-center mt-2">
                        <div class="flex flex-col glass-panel rounded-xl px-4 py-2 min-w-[70px]">
                            <span id="streakHours" class="text-2xl font-bold text-white">00</span>
                            <span class="text-[10px] uppercase text-gray-400 tracking-wider">Hours</span>
                        </div>
                        <span class="text-2xl font-bold text-gray-600 mt-2">:</span>
                        <div class="flex flex-col glass-panel rounded-xl px-4 py-2 min-w-[70px]">
                            <span id="streakMins" class="text-2xl font-bold text-white">00</span>
                            <span class="text-[10px] uppercase text-gray-400 tracking-wider">Mins</span>
                        </div>
                        <span class="text-2xl font-bold text-gray-600 mt-2">:</span>
                        <div class="flex flex-col glass-panel rounded-xl px-4 py-2 min-w-[70px]">
                            <span id="streakSecs" class="text-2xl font-bold text-accent">00</span>
                            <span class="text-[10px] uppercase text-gray-400 tracking-wider">Secs</span>
                        </div>
                    </div>
                </div>

                <!-- Motivation Card -->
                <div class="w-full glass-panel rounded-3xl p-6 relative overflow-hidden mt-2 border border-gray-800">
                    <div class="absolute -top-6 -right-6 w-24 h-24 bg-accent rounded-full opacity-10 blur-xl"></div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-600 mb-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
                    </svg>
                    <p id="quoteText" class="text-lg font-semibold text-gray-100 leading-relaxed italic relative z-10">
                        "Suffer the pain of discipline, or suffer the pain of regret."
                    </p>
                    <p id="quoteAuthor" class="text-sm font-bold text-accent mt-4 uppercase tracking-wider relative z-10">— Jim Rohn</p>
                </div>

                <!-- Panic / Reset Button -->
                <div class="mt-auto pt-8">
                    <button id="resetBtn" class="w-full border border-red-900/50 bg-red-950/20 text-red-500 font-bold text-sm uppercase tracking-widest rounded-2xl py-4 hover:bg-red-900/40 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        I Relapsed (Reset Timer)
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // DOM Elements
        const surveyScreen = document.getElementById('surveyScreen');
        const dashboardScreen = document.getElementById('dashboardScreen');
        const setupForm = document.getElementById('setupForm');
        
        const dashboardName = document.getElementById('dashboardName');
        const streakDays = document.getElementById('streakDays');
        const streakHours = document.getElementById('streakHours');
        const streakMins = document.getElementById('streakMins');
        const streakSecs = document.getElementById('streakSecs');
        
        const quoteText = document.getElementById('quoteText');
        const quoteAuthor = document.getElementById('quoteAuthor');
        const resetBtn = document.getElementById('resetBtn');

        // State Variables
        let startTime = null;
        let timerInterval = null;

        // Massive array of hardcore motivational quotes
        const quotes = [
            { text: "Suffer the pain of discipline, or suffer the pain of regret.", author: "Jim Rohn" },
            { text: "Don't trade what you want most for what you want in the moment.", author: "Unknown" },
            { text: "Conquer yourself, or be conquered by yourself.", author: "Seneca" },
            { text: "Discipline equals freedom.", author: "Jocko Willink" },
            { text: "You are what you do, not what you say you'll do.", author: "Carl Jung" },
            { text: "Your future needs you. Your past doesn't.", author: "Unknown" },
            { text: "The only real failure is giving up entirely. Stand back up.", author: "Unknown" },
            { text: "Motivation gets you going, but discipline keeps you growing.", author: "John C. Maxwell" },
            { text: "A man who cannot command himself will always be a servant.", author: "Johann Wolfgang von Goethe" },
            { text: "We must all suffer one of two things: the pain of discipline or the pain of regret or disappointment.", author: "Jim Rohn" },
            { text: "He who conquers himself is the mightiest warrior.", author: "Confucius" },
            { text: "Rule your mind or it will rule you.", author: "Horace" },
            { text: "Comfort is the enemy of progress.", author: "P.T. Barnum" },
            { text: "First we make our habits, then our habits make us.", author: "Charles C. Noble" },
            { text: "Endurance is one of the most difficult disciplines, but it is to the one who endures that the final victory comes.", author: "Buddha" }
        ];

        function getRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            return quotes[randomIndex];
        }

        function updateQuote() {
            const q = getRandomQuote();
            // Smooth text transition
            quoteText.style.opacity = 0;
            quoteAuthor.style.opacity = 0;
            
            setTimeout(() => {
                quoteText.innerText = `"${q.text}"`;
                quoteAuthor.innerText = `— ${q.author}`;
                quoteText.style.opacity = 1;
                quoteAuthor.style.opacity = 1;
            }, 300);
        }

        // Timer Logic
        function updateTimer() {
            if (!startTime) return;
            
            const now = new Date().getTime();
            const distance = now - startTime;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Format with leading zeros
            streakDays.innerText = days.toString().padStart(2, '0');
            streakHours.innerText = hours.toString().padStart(2, '0');
            streakMins.innerText = minutes.toString().padStart(2, '0');
            streakSecs.innerText = seconds.toString().padStart(2, '0');
        }

        function startJourney() {
            // Set start time to right now
            startTime = new Date().getTime();
            
            // Start the ticking timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            
            // Set initial quote
            updateQuote();
            
            // Transition screens
            surveyScreen.classList.remove('fade-in');
            surveyScreen.classList.add('fade-out');
            
            setTimeout(() => {
                surveyScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                dashboardScreen.classList.add('fade-in');
                
                // Set quote to change every 30 seconds to keep it fresh
                setInterval(updateQuote, 30000);
            }, 400);
        }

        // Form Submit Event
        setupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            if (name) {
                dashboardName.innerText = name;
                startJourney();
            }
        });

        // Reset Button Event (Custom Modal alternative instead of alert)
        resetBtn.addEventListener('click', () => {
            // Restart the timer
            startTime = new Date().getTime();
            updateTimer();
            updateQuote(); // Give them a new quote to start over
            
            // Visual feedback
            streakSecs.classList.remove('text-accent');
            streakSecs.classList.add('text-red-500');
            setTimeout(() => {
                streakSecs.classList.remove('text-red-500');
                streakSecs.classList.add('text-accent');
            }, 500);
        });

        // Add CSS for text fading
        quoteText.style.transition = 'opacity 0.3s ease';
        quoteAuthor.style.transition = 'opacity 0.3s ease';
        streakSecs.style.transition = 'color 0.3s ease';

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Combat Evolved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            user-select: none; -webkit-user-select: none; touch-action: none; 
        }
        
        /* Core Engine Layers - Z-Index management is crucial for Android Video */
        #camera-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0; transition: opacity 0.5s; }
        #camera-bg.active { opacity: 1; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: auto; }
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        
        /* UI Layers */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        #ui-layer.active { opacity: 1; pointer-events: auto; }
        .interactive { pointer-events: auto; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; font-family: 'Orbitron', sans-serif; transition: opacity 0.3s, visibility 0.3s; }
        .screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        /* Panels */
        .cyber-panel { background: rgba(15, 23, 42, 0.95); border: 2px solid #0ea5e9; border-radius: 8px; padding: 1.5rem; width: 100%; max-width: 400px; box-shadow: inset 0 0 20px rgba(14, 165, 233, 0.2), 0 0 20px rgba(0,0,0,0.8); }
        h1, h2, h3 { text-transform: uppercase; letter-spacing: 2px; }
        
        /* Menu Buttons */
        .btn { padding: 1rem; font-weight: 900; text-transform: uppercase; border-radius: 6px; transition: transform 0.1s; cursor: pointer; text-align: center; border: 2px solid transparent; }
        .btn:active:not(:disabled) { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .btn-blue { background: rgba(14, 165, 233, 0.2); border-color: #0ea5e9; color: #38bdf8; }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }
        .btn-green { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; }
        
        /* HUD Action Buttons */
        .action-btn { flex: 1; margin: 0 4px; height: 80px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; background: rgba(2, 6, 23, 0.85); border: 1px solid rgba(255,255,255,0.3); color: #e2e8f0; position: relative; overflow: hidden; }
        .action-btn:active { background: rgba(255,255,255,0.1); border-color: #fff; }
        .icon { width: 26px; height: 26px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: #facc15; width: 0%; transition: width 0.05s linear; }
        
        /* Effects */
        .damage-effect { animation: damageFlash 0.3s ease-out; }
        @keyframes damageFlash { 
            0% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); } 
            30% { box-shadow: inset 0 0 80px 30px rgba(255,0,0,0.8); } 
            100% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); } 
        }
    </style>
</head>
<body>

    <div id="screen-lobby" class="screen hidden">
        <div class="cyber-panel flex flex-col h-[80vh]">
            <div class="text-center mb-2">

            <div class="flex-1 overflow-y-auto mb-4 flex gap-2 mt-4">
                <div class="flex-1 p-2 bg-blue-900/20 border border-blue-500/50 rounded flex flex-col">
                    <h3 class="text-center text-blue-400 border-b border-blue-500/50 pb-2 mb-2 text-sm">BLUE TEAM</h3>
                    <ul id="team-a-list" class="space-y-2 text-sm flex-1 font-mono text-gray-300"></ul>

            <button id="btn-start-game" onclick="startMatchRequest()" class="w-full btn btn-green py-4 text-xl hidden">START MATCH</button>

    <!-- IN-GAME UI & AR ENGINE -->
    <div id="wrapper" class="relative w-full h-full">
        <!-- Live Camera Feed: Always active in DOM to prevent Android freezing -->
        <video id="camera-bg" autoplay playsinline muted></video>
        
        <!-- Render Engine Canvas -->
        <canvas id="game-canvas"></canvas>
        
        <!-- Flashbang Whiteout Screen -->
        <div id="flash-overlay"></div>
        
        <!-- HUD (Heads Up Display) -->
        <div id="ui-layer">
            <!-- Top Status Bar -->
            <div class="p-3 flex justify-between items-start interactive">
                <div class="bg-black/80 border border-slate-700 rounded p-2">
                    <div class="text-[10px] text-gray-400 font-bold">SCORE (FIRST TO 5)</div>

                </div>
            </div>

            <!-- Central Messages -->
            <div id="game-message" class="absolute top-1/4 left-0 w-full text-center text-4xl font-black text-white opacity-0 transition-opacity pointer-events-none drop-shadow-md"></div>

            <!-- Bottom Weapons & HP Bar -->
            <div class="interactive p-2 pb-6 bg-gradient-to-t from-black to-transparent">
                <!-- HP Bar -->
                <div class="mb-3">
                    <div class="flex justify-between text-xs font-bold mb-1 text-cyan-400">
                        <span>HP</span><span id="ui-hp" class="font-mono">150</span>
                    </div>
                    <div class="w-full h-3 bg-slate-900 border border-slate-700 rounded">
                        <div id="ui-hp-bar" class="h-full bg-cyan-400 transition-all duration-100 w-full"></div>
                    </div>
                </div>

                <!-- Weapon Controls -->
                <div class="flex justify-between w-full">
                    <button class="action-btn" onclick="fireWeapon('bunker')">
                        <svg class="icon text-blue-400" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        BARRIER
                        <span id="ui-am-bunker" class="text-xs text-gray-400 mt-1">10</span>
                    </button>
                    
                    <button class="action-btn" id="btn-flash">
                        <svg class="icon text-yellow-400" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
                        FLASH
                        <span id="ui-am-flash" class="text-xs text-gray-400 mt-1">3</span>
                        <div id="flash-progress" class="progress-bar"></div>
                    </button>
                    
                    <button class="action-btn" onclick="fireWeapon('deagle')">
                        <svg class="icon text-red-400" viewBox="0 0 24 24"><path d="M5 12h14v-2H5zM17 10l2-4H5l2 4M7 14v4h2v-4"/></svg>
                        DEAGLE
                        <span id="ui-am-deagle" class="text-xs text-gray-400 mt-1">6/20</span>
                    </button>
                    
                    <button class="action-btn" id="btn-ar">
                        <svg class="icon text-green-400" viewBox="0 0 24 24"><path d="M3 12h18M5 10l2-2 2 2M15 10l2-2 2 2"/></svg>
                        AR-15
                        <span id="ui-am-ar" class="text-xs text-gray-400 mt-1">20/100</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /*************************************************
         * ENGINE CONFIGURATION & STATE
         *************************************************/
        const MAX_HP = 150;
        const WINS_REQUIRED = 5;
        const CAMERA_FOV = 60;

        const WEAPONS = {
            deagle: { mag: 6, reserve: 20, damageBody: 50, damageHead: 140, fireRateMs: 350 },
            ar: { mag: 20, reserve: 100, damageBodyMin: 13, damageBodyMax: 20, damageHead: 25, fireRateMs: 110 }
        };

        const state = {
            id: 'OP_' + Math.floor(Math.random() * 100000),
            name: '',
            isHost: false,
            roomId: '',
            maxTeamSize: 3,
            team: null,
            hp: MAX_HP,
            isDead: false,
            yaw: 0,   // Horizontal aim
            pitch: 0, // Vertical aim
            inventory: { bunker: 10, flash: 3, deagle: { ammo: 6, reserve: 20 }, ar: { ammo: 20, reserve: 100 } },
            players: {}, 
            bunkers: {}, 
            score: { A: 0, B: 0 },
            round: 1,
            gameState: 'lobby'
        };

        // DOM Cache for Fast Updates
        const DOM = {
            hpText: document.getElementById('ui-hp'), hpBar: document.getElementById('ui-hp-bar'),
            ammoBunker: document.getElementById('ui-am-bunker'), ammoFlash: document.getElementById('ui-am-flash'),
            ammoDeagle: document.getElementById('ui-am-deagle'), ammoAR: document.getElementById('ui-am-ar'),
            flashProgress: document.getElementById('flash-progress')
        };
        let lastUIState = { hp: -1, bunker: -1, flash: -1, deagle: '', ar: '' };

        // Engine Globals
        let mqttClient = null;
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
        let videoEl = document.getElementById('camera-bg');
        let canvas = document.getElementById('game-canvas');
        let ctx = canvas.getContext('2d', { alpha: false }); 
        let centerX, centerY, pixelsPerDegree;
        let renderFrameId;
        
        let visualEffects = []; 
        let lockedTarget = null; 
        let isReloading = false;
        let lastFireTime = 0;
        let arAutoFireInterval = null;
        let flashChargeStartTime = 0;
        
        let localCameraStream = null;

        /*************************************************
         * SENSOR INITIALIZATION (AR CAMERA & GYRO)
         *************************************************/
        async function requestHardwarePermissions() {
            const btn = document.getElementById('btn-auth');
            btn.innerText = "INITIALIZING SENSORS...";
            btn.disabled = true;

            // 1. Force Camera Load (Ensures Android doesn't block it)
            try {
                localCameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: {ideal: 1280}, height: {ideal: 720} }, 
                    audio: false 
                });
                videoEl.srcObject = localCameraStream;
                // Explicitly call play. The video is z-index: 1, hidden behind the solid menu, so it stays active.
                await videoEl.play().catch(e => console.warn("Auto-play prevented", e));
            } catch(e) {
                console.warn("Camera denied or unavailable.", e);
            }

            // 2. Setup Gyroscope (Android & iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleGyroscopeUpdate, true);
                    }
                } catch(e) { console.error(e); }
            } else {
                // Fallback for Android - Listen to absolute if available, else standard
                window.addEventListener('deviceorientationabsolute', handleGyroscopeUpdate, true);
                window.addEventListener('deviceorientation', handleGyroscopeUpdate, true);
            }

            // 3. Fallback Touch Controls (If Gyro fails, user can swipe to look around!)
            setupSwipeToLookFallback();

            switchScreen('screen-setup');
        }

        function handleGyroscopeUpdate(event) {
            if (state.gameState !== 'playing' || state.isDead) return;
            
            // Prefer absolute heading, fallback to alpha
            let alpha = event.webkitCompassHeading !== undefined ? event.webkitCompassHeading : 
                        (event.absolute ? (360 - event.alpha) : (360 - event.alpha));
            
            if (alpha !== null && !isNaN(alpha)) {
                state.yaw = alpha % 360;
                if (state.yaw < 0) state.yaw += 360;
            }
            
            if (event.beta !== null) {
                state.pitch = event.beta - 90; 
            }
        }

        // Failsafe: If hardware gyro fails, swiping the screen adjusts the aim
        function setupSwipeToLookFallback() {
            let isDragging = false;
            let lastTouchX = 0, lastTouchY = 0;
            
            canvas.addEventListener('touchstart', e => {
                isDragging = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            });
            
            canvas.addEventListener('touchmove', e => {
                if (!isDragging || state.gameState !== 'playing' || state.isDead) return;
                let dx = e.touches[0].clientX - lastTouchX;
                let dy = e.touches[0].clientY - lastTouchY;
                
                // Adjust yaw and pitch based on swipe
                state.yaw = (state.yaw - dx * 0.2 + 360) % 360;
                state.pitch = Math.max(-90, Math.min(90, state.pitch + dy * 0.2));
                
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            });
            
            canvas.addEventListener('touchend', () => isDragging = false);
        }

        /*************************************************
         * UI NAVIGATION & MQTT CONNECTION
         *************************************************/
        function switchScreen(id) { 
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden')); 
            if(id) document.getElementById(id).classList.remove('hidden'); 
        }
        function showHostMenu() { state.name = document.getElementById('player-name').value || 'MERC'; switchScreen('screen-host'); }
        function showJoinMenu() { state.name = document.getElementById('player-name').value || 'MERC'; switchScreen('screen-join'); }
        function backToSetup() { switchScreen('screen-setup'); }

        function connectToNetwork(roomId, onSuccess) {
            if (mqttClient) mqttClient.end();
            const btn = document.getElementById(state.isHost ? 'btn-init' : 'btn-join');
            btn.innerText = "CONNECTING..."; btn.disabled = true;

            let hasConnected = false;
            let timeout = setTimeout(() => { 
                if (!hasConnected) { mqttClient.end(); btn.innerText = "RETRY"; btn.disabled = false; alert("Network Timeout"); } 
            }, 6000);

            mqttClient = mqtt.connect(brokerUrl, { clientId: state.id + Date.now() });
            mqttClient.on('connect', () => {
                hasConnected = true; clearTimeout(timeout); state.roomId = roomId;
                mqttClient.subscribe(`arnx_v4/${roomId}/#`, (err) => {
                    btn.disabled = false; btn.innerText = "SUCCESS";
                    if (!err && onSuccess) onSuccess();
                });
            });
            mqttClient.on('message', handleNetworkMessage);
        }

        function pubMsg(topic, data) { 
            if(mqttClient) mqttClient.publish(`arnx_v4/${state.roomId}/${topic}`, JSON.stringify(data), {qos: 0}); 
        }

        function handleNetworkMessage(topic, msgBytes) {
            const type = topic.split('/').pop();
            let d; try { d = JSON.parse(msgBytes.toString()); } catch(e) { return; }

            // High freq sync
            if (type === 'sync' && d.id !== state.id) {
                if (!state.players[d.id]) state.players[d.id] = {};
                Object.assign(state.players[d.id], d); return;
            }

            switch(type) {
                case 'join': 
                    if (state.isHost) {
                        let cA = 0, cB = 0; Object.values(state.players).forEach(p => p.team === 'A' ? cA++ : cB++);
                        state.players[d.id] = { id: d.id, name: d.name, team: (cA <= cB && cA < state.maxTeamSize) ? 'A' : 'B', hp: MAX_HP, isDead: false };
                        pubMsg('lobby', { p: state.players, m: state.maxTeamSize }); updateLobbyUI();
                    } break;
                case 'swap': 
                    if (state.isHost && state.players[d.id]) { state.players[d.id].team = d.team; pubMsg('lobby', { p: state.players, m: state.maxTeamSize }); updateLobbyUI(); } break;
                case 'lobby': 
                    if (!state.isHost) { state.players = d.p; state.maxTeamSize = d.m; if(state.players[state.id]) state.team = state.players[state.id].team; updateLobbyUI(); } break;
                case 'start': initRound(d.r); break;
                
                // INSTANT HIT REGISTRATION LOGIC
                case 'hit': 
                    if (d.tid === state.id && !state.isDead && state.gameState === 'playing') {
                        takeDamage(d.dmg); 
                    } else if (state.players[d.tid]) {
                        // Client-side prediction: instantly update the enemy's HP bar on everyone's screen
                        state.players[d.tid].hp = Math.max(0, state.players[d.tid].hp - d.dmg);
                        if (state.players[d.tid].hp === 0) state.players[d.tid].isDead = true;
                    }
                    break;
                    
                case 'bunker_add': state.bunkers[d.bid] = d.data; break;
                case 'bunker_hit': 
                    if (state.bunkers[d.bid]) { 
                        state.bunkers[d.bid].hp -= d.dmg; 
                        spawnParticles(centerX, centerY, '#38bdf8', 3);
                        if (state.bunkers[d.bid].hp <= 0) delete state.bunkers[d.bid]; 
                    } break;
                case 'flash': handleFlashIncoming(d); break;
                case 'end': processRoundEnd(d); break;
            }
        }

        // Lobby Actions
        function createRoom() { state.isHost = true; state.maxTeamSize = parseInt(document.getElementById('game-mode').value); let rid = Math.random().toString(36).substr(2, 6).toUpperCase(); state.players[state.id] = { id: state.id, name: state.name, team: 'A', hp: MAX_HP, isDead: false }; state.team = 'A'; connectToNetwork(rid, () => { switchScreen('screen-lobby'); document.getElementById('lobby-room-id').innerText = rid; updateLobbyUI(); }); }
        function joinRoom() { let rid = document.getElementById('room-id-input').value.toUpperCase(); if (rid.length < 4) return; state.isHost = false; connectToNetwork(rid, () => { switchScreen('screen-lobby'); document.getElementById('lobby-room-id').innerText = rid; pubMsg('join', { id: state.id, name: state.name }); }); }
        function requestTeamSwap(t) { pubMsg('swap', { id: state.id, team: t }); }
        
        function updateLobbyUI() {
            let lA = document.getElementById('team-a-list'), lB = document.getElementById('team-b-list');
            lA.innerHTML = ''; lB.innerHTML = ''; let cA = 0, cB = 0;
            Object.values(state.players).forEach(p => {
                let li = document.createElement('li'); li.innerText = `${p.name} ${p.id === state.id ? '(YOU)' : ''}`;
                if (p.team === 'A') { lA.appendChild(li); cA++; } else { lB.appendChild(li); cB++; }
            });
            if (state.isHost) {
                let startBtn = document.getElementById('btn-start-game');
                if (cA > 0 && cB > 0) startBtn.classList.remove('hidden'); else startBtn.classList.add('hidden');
            }
        }

        /*************************************************
         * CORE GAME ROUND LOOP
         *************************************************/
        function startMatchRequest() { if(state.isHost) pubMsg('start', { r: 1 }); }

        function initRound(roundNumber) {
            state.gameState = 'playing'; state.round = roundNumber; state.hp = MAX_HP; state.isDead = false;
            state.bunkers = {}; visualEffects = [];
            state.inventory = { bunker: 10, flash: 3, deagle: { ammo: WEAPONS.deagle.mag, reserve: WEAPONS.deagle.reserve }, ar: { ammo: WEAPONS.ar.mag, reserve: WEAPONS.ar.reserve } };
            
            Object.values(state.players).forEach(p => { p.hp = MAX_HP; p.isDead = false; });
            
            // Activate AR Elements
            switchScreen(null); // Hide all screens
            document.getElementById('camera-bg').classList.add('active'); // Reveal video
            document.getElementById('ui-layer').classList.add('active'); // Reveal HUD
            document.getElementById('ui-round').innerText = roundNumber;
            
            resizeCanvas(); 
            window.addEventListener('resize', resizeCanvas);
            forceUpdateHUD();
            displayMessage(`ROUND ${roundNumber}`);
            
            if (!renderFrameId) renderGameLoop();
            
            if (state.syncInterval) clearInterval(state.syncInterval);
            state.syncInterval = setInterval(() => {
                if (state.gameState === 'playing') {
                    pubMsg('sync', { id: state.id, yaw: state.yaw, pitch: state.pitch, hp: state.hp, isDead: state.isDead });
                    if (state.isHost) checkForWinner();
                }
            }, 100); 
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; centerX = canvas.width / 2; centerY = canvas.height / 2; pixelsPerDegree = canvas.width / CAMERA_FOV; }
        function displayMessage(txt) { let el = document.getElementById('game-message'); el.innerText = txt; el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 2000); }
        
        function takeDamage(amt) {
            state.hp = Math.max(0, state.hp - amt); 
            fastUpdateHUD();
            
            let ui = document.getElementById('ui-layer');
            ui.classList.remove('damage-effect'); void ui.offsetWidth; ui.classList.add('damage-effect');
            
            visualEffects.push({ type: 'text', x: centerX + (Math.random()*40-20), y: centerY - 50, text: `-${amt}`, color: '#ef4444', life: 1 });
            
            if (state.hp === 0) { state.isDead = true; displayMessage("K.I.A"); pubMsg('sync', { id: state.id, yaw: state.yaw, pitch: state.pitch, hp: 0, isDead: true }); }
        }

        function checkForWinner() {
            let A = false, B = false;
            Object.values(state.players).forEach(p => { if (!p.isDead) { if (p.team === 'A') A = true; if (p.team === 'B') B = true; } });
            if (!A || !B) {
                let w = (!A && !B) ? 'Draw' : (A ? 'A' : 'B');
                if (w === 'A') state.score.A++; if (w === 'B') state.score.B++;
                pubMsg('end', { w: w, sA: state.score.A, sB: state.score.B });
            }
        }

        function processRoundEnd(d) {
            state.gameState = 'end'; state.score.A = d.sA; state.score.B = d.sB;
            document.getElementById('ui-score-a').innerText = d.sA; document.getElementById('ui-score-b').innerText = d.sB;
            displayMessage(d.w === 'Draw' ? "DRAW" : (d.w === 'A' ? "BLUE WINS" : "RED WINS"));
            
            if (d.sA >= WINS_REQUIRED || d.sB >= WINS_REQUIRED) { 
                setTimeout(() => { displayMessage("MATCH OVER"); setTimeout(() => window.location.reload(), 3000); }, 2500); 
            } else if (state.isHost) { setTimeout(() => pubMsg('start', { r: state.round + 1 }), 4000); }
        }

        /*************************************************
         * COMBAT & WEAPONS
         *************************************************/
        function fireWeapon(type) {
            if (state.isDead || isReloading) return;
            
            if (type === 'bunker') {
                if (state.inventory.bunker <= 0) return;
                state.inventory.bunker--; fastUpdateHUD();
                let bid = 'B_' + Math.random().toString(16).substr(2,6);
                let bData = { team: state.team, hp: 200, yaw: state.yaw, pitch: state.pitch };
                state.bunkers[bid] = bData; pubMsg('bunker_add', { bid: bid, data: bData });
                return;
            }

            let w = WEAPONS[type], inv = state.inventory[type], now = Date.now();
            if (now - lastFireTime < w.fireRateMs) return;
            
            if (inv.ammo <= 0) {
                if (inv.reserve > 0) { isReloading = true; setTimeout(() => { let take = Math.min(w.mag, inv.reserve); inv.reserve -= take; inv.ammo = take; isReloading = false; fastUpdateHUD(); }, 1200); }
                return;
            }

            inv.ammo--; lastFireTime = now; fastUpdateHUD();
            state.pitch += 1.5; // Recoil
            spawnParticles(centerX, centerY + 20, '#facc15', 4);

            if (lockedTarget) {
                let enemy = state.players[lockedTarget.id]; if (!enemy || enemy.isDead) return;
                
                let blockedBy = null;
                for (let bid in state.bunkers) {
                    let bunker = state.bunkers[bid];
                    if (bunker.hp > 0 && bunker.team !== state.team && Math.abs(angleDiff(bunker.yaw, enemy.yaw)) < 15 && Math.abs(bunker.pitch - enemy.pitch) < 20) { blockedBy = bid; break; }
                }

                let dmg = lockedTarget.isHead ? w.damageHead : (w.damageBodyMin ? Math.floor(Math.random()*(w.damageBodyMax - w.damageBodyMin) + w.damageBodyMin) : w.damageBody);
                
                if (blockedBy) {
                    pubMsg('bunker_hit', { bid: blockedBy, dmg: dmg });
                    visualEffects.push({ type: 'text', x: centerX, y: centerY, text: '✖', color: '#38bdf8', life: 0.5 });
                } else {
                    pubMsg('hit', { tid: enemy.id, dmg: dmg });
                    visualEffects.push({ type: 'text', x: centerX, y: centerY, text: '✖', color: lockedTarget.isHead ? '#ef4444' : '#ffffff', life: 0.5 });
                    
                    // Client Side Prediction
                    enemy.hp = Math.max(0, enemy.hp - dmg);
                }
            }
        }

        // AR Auto-Fire
        const btnAR = document.getElementById('btn-ar');
        btnAR.addEventListener('touchstart', (e) => { e.preventDefault(); fireWeapon('ar'); arAutoFireInterval = setInterval(() => fireWeapon('ar'), WEAPONS.ar.fireRateMs); });
        btnAR.addEventListener('touchend', (e) => { e.preventDefault(); clearInterval(arAutoFireInterval); });

        // Flashbang
        const btnFlash = document.getElementById('btn-flash');
        btnFlash.addEventListener('touchstart', (e) => { e.preventDefault(); if (state.isDead || state.inventory.flash <= 0) return; flashChargeStartTime = Date.now(); let intV = setInterval(() => { if (!flashChargeStartTime) clearInterval(intV); DOM.flashProgress.style.width = Math.min(100, (Date.now() - flashChargeStartTime) / 8) + '%'; }, 30); });
        btnFlash.addEventListener('touchend', (e) => { e.preventDefault(); if (!flashChargeStartTime || state.inventory.flash <= 0) return; state.inventory.flash--; flashChargeStartTime = 0; DOM.flashProgress.style.width = '0%'; fastUpdateHUD(); pubMsg('flash', { y: state.yaw, p: state.pitch, t: state.team }); });

        function handleFlashIncoming(d) {
            visualEffects.push({ type: 'proj', sY: d.y, sP: d.p + 20, tY: d.y, tP: d.p, start: Date.now() });
            setTimeout(() => {
                if (state.isDead) return;
                let scr = toScreen(d.y, d.p); if (scr) spawnParticles(scr.x, scr.y, '#ffffff', 10);
                
                if (Math.abs(angleDiff(state.yaw, d.y)) < 45 && Math.abs(state.pitch - d.p) < 40) {
                    let block = false;
                    for (let bid in state.bunkers) { let b = state.bunkers[bid]; if (b.hp > 0 && Math.abs(angleDiff(b.yaw, d.y)) < 15 && Math.abs(b.pitch - d.p) < 20) block = true; }
                    if (!block) { let ol = document.getElementById('flash-overlay'); ol.style.display = 'block'; ol.style.opacity = 1; setTimeout(() => ol.style.opacity = 0, 2500); setTimeout(() => ol.style.display = 'none', 2600); }
                }
            }, 800);
        }

        /*************************************************
         * RENDERER & MATH UTILS
         *************************************************/
        function angleDiff(a, b) { let d = (b - a + 180) % 360 - 180; return d < -180 ? d + 360 : d; }
        function toScreen(targetYaw, targetPitch) { 
            let dY = angleDiff(state.yaw, targetYaw); 
            if (Math.abs(dY) > 80) return null; 
            return { x: centerX + dY * pixelsPerDegree, y: centerY + (targetPitch - state.pitch) * pixelsPerDegree }; 
        }

        function spawnParticles(x, y, c, count) { for (let i = 0; i < count; i++) visualEffects.push({ type: 'spark', x: x, y: y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, color: c, life: 1 }); }

        function renderGameLoop() {
            renderFrameId = requestAnimationFrame(renderGameLoop);
            if (state.gameState !== 'playing') return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lockedTarget = null; let minDistance = 999;
            
            // 1. Render 3D Bunkers
            for (let bid in state.bunkers) {
                let b = state.bunkers[bid]; if (b.hp <= 0) continue;
                let pos = toScreen(b.yaw, b.pitch); if (!pos) continue;
                
                let isMine = b.team === state.team;
                ctx.fillStyle = isMine ? 'rgba(14,165,233,0.3)' : 'rgba(239,68,68,0.3)'; ctx.strokeStyle = isMine ? '#0ea5e9' : '#ef4444'; ctx.lineWidth = 2;
                let sz = 60;
                
                ctx.beginPath(); ctx.moveTo(pos.x - sz, pos.y - sz); ctx.lineTo(pos.x + sz, pos.y - sz); ctx.lineTo(pos.x + sz + 30, pos.y); ctx.lineTo(pos.x + sz, pos.y + sz); ctx.lineTo(pos.x - sz, pos.y + sz); ctx.lineTo(pos.x - sz - 30, pos.y); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.strokeRect(pos.x - sz + 10, pos.y - sz + 10, (sz - 10) * 2, (sz - 10) * 2);
                
                ctx.fillStyle = '#000'; ctx.fillRect(pos.x - 40, pos.y - sz - 15, 80, 5); ctx.fillStyle = ctx.strokeStyle; ctx.fillRect(pos.x - 40, pos.y - sz - 15, 80 * (b.hp / 200), 5);
            }

            // 2. Render Opponents
            Object.values(state.players).forEach(p => {
                if (p.id === state.id || p.isDead) return;
                let pos = toScreen(p.yaw, p.pitch); if (!pos) return;

                let isF = p.team === state.team;
                ctx.fillStyle = 'rgba(15,23,42,0.9)'; ctx.strokeStyle = isF ? '#0ea5e9' : '#ef4444'; ctx.lineWidth = 2;
                
                ctx.fillRect(pos.x - 25, pos.y - 10, 50, 80); ctx.strokeRect(pos.x - 25, pos.y - 10, 50, 80); 
                ctx.beginPath(); ctx.arc(pos.x, pos.y - 30, 18, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = '#fff'; ctx.font = '12px Orbitron'; ctx.textAlign = 'center'; ctx.fillText(p.name, pos.x, pos.y - 55);
                ctx.fillStyle = '#000'; ctx.fillRect(pos.x - 20, pos.y - 50, 40, 4); ctx.fillStyle = ctx.strokeStyle; ctx.fillRect(pos.x - 20, pos.y - 50, 40 * (p.hp / MAX_HP), 4);

                // Tripled Aim Assist Box (Much easier to hit)
                if (!isF) {
                    let dH = Math.hypot(centerX - pos.x, centerY - (pos.y - 30)); let dB = Math.hypot(centerX - pos.x, centerY - (pos.y + 30));
                    if (dH < 120 && dH < minDistance) { lockedTarget = { id: p.id, isHead: true, x: pos.x, y: pos.y - 30 }; minDistance = dH; } 
                    else if (dB < 150 && dB < minDistance && (!lockedTarget || !lockedTarget.isHead)) { lockedTarget = { id: p.id, isHead: false, x: pos.x, y: pos.y + 30 }; minDistance = dB; }
                }

            // 3. Render Crosshair
            ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
            if (lockedTarget) {
                ctx.strokeStyle = lockedTarget.isHead ? '#ef4444' : '#0ea5e9'; ctx.lineWidth = 2;
                ctx.strokeRect(lockedTarget.x - 20, lockedTarget.y - 20, 40, 40); // Larger locking box
                ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(lockedTarget.x, lockedTarget.y); ctx.globalAlpha = 0.2; ctx.stroke(); ctx.globalAlpha = 1;
            }
            ctx.beginPath(); ctx.arc(centerX, centerY, 3, 0, Math.PI * 2); ctx.fill();
            if (flashChargeStartTime > 0) { ctx.beginPath(); ctx.moveTo(centerX, canvas.height); ctx.quadraticCurveTo(centerX, centerY + 100, centerX, centerY); ctx.strokeStyle = '#facc15'; ctx.stroke(); }

            // 4. Update FX
            let now = Date.now();
            for (let i = visualEffects.length - 1; i >= 0; i--) {
                let fx = visualEffects[i];
                if (fx.type === 'text') {
                    fx.life -= 0.02; fx.y -= 1; if (fx.life <= 0) { visualEffects.splice(i, 1); continue; }
                    ctx.globalAlpha = fx.life; ctx.fillStyle = fx.color; ctx.font = '24px Orbitron'; ctx.fillText(fx.text, fx.x, fx.y); ctx.globalAlpha = 1;
                } else if (fx.type === 'proj') {
                    let prog = (now - fx.start) / 800; if (prog >= 1) { visualEffects.splice(i, 1); continue; }
                    let curY = fx.sY + angleDiff(fx.sY, fx.tY) * prog; let curP = fx.sP + (fx.tP - fx.sP) * prog - Math.sin(prog * Math.PI) * 30;
                    let pos = toScreen(curY, curP); if (pos) { ctx.fillStyle = '#facc15'; ctx.fillRect(pos.x - 5, pos.y - 5, 10, 10); }
                } else if (fx.type === 'spark') {
                    fx.life -= 0.05; fx.x += fx.vx; fx.y += fx.vy; if(fx.life <= 0) { visualEffects.splice(i, 1); continue; }
                    ctx.globalAlpha = fx.life; ctx.fillStyle = fx.color; ctx.beginPath(); ctx.arc(fx.x, fx.y, 3, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
                }
            }
        }

        // Fast UI Update
        function fastUpdateHUD() {
            if (state.hp !== lastUIState.hp) { DOM.hpText.innerText = state.hp; DOM.hpBar.style.width = (state.hp / 150) * 100 + '%'; lastUIState.hp = state.hp; }
            if (state.inventory.bunker !== lastUIState.bunker) { DOM.ammoBunker.innerText = state.inventory.bunker; lastUIState.bunker = state.inventory.bunker; }
            if (state.inventory.flash !== lastUIState.flash) { DOM.ammoFlash.innerText = state.inventory.flash; lastUIState.flash = state.inventory.flash; }
            let dStr = isReloading ? "REL" : `${state.inventory.deagle.ammo}/${state.inventory.deagle.reserve}`; if (dStr !== lastUIState.deagle) { DOM.ammoDeagle.innerText = dStr; lastUIState.deagle = dStr; }
            let aStr = isReloading ? "REL" : `${state.inventory.ar.ammo}/${state.inventory.ar.reserve}`; if (aStr !== lastUIState.ar) { DOM.ammoAR.innerText = aStr; lastUIState.ar = aStr; }
        }
        function forceUpdateHUD() { lastUIState = { hp: -1, bunker: -1, flash: -1, deagle: '', ar: '' }; fastUpdateHUD(); }

    </script>

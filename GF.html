<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Combat Evolved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            user-select: none; -webkit-user-select: none; touch-action: none; 
        }
        
        /* Core Engine Layers */
        #camera-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; }
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 15; opacity: 0; pointer-events: none; display: none; transition: opacity 0.1s; }
        
        /* UI Layers */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; font-family: 'Orbitron', sans-serif; }
        .hidden { display: none !important; }
        
        /* Panels */
        .cyber-panel { background: rgba(15, 23, 42, 0.9); border: 2px solid #0ea5e9; border-radius: 8px; padding: 1.5rem; width: 100%; max-width: 400px; box-shadow: inset 0 0 20px rgba(14, 165, 233, 0.2); }
        h1, h2, h3 { text-transform: uppercase; letter-spacing: 2px; }
        
        /* Menu Buttons */
        .btn { padding: 1rem; font-weight: 900; text-transform: uppercase; border-radius: 6px; transition: transform 0.1s; cursor: pointer; text-align: center; border: 2px solid transparent; }
        .btn:active:not(:disabled) { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .btn-blue { background: rgba(14, 165, 233, 0.2); border-color: #0ea5e9; color: #38bdf8; }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }
        .btn-green { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; }
        
        /* HUD Action Buttons */
        .action-btn { flex: 1; margin: 0 4px; height: 80px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; background: rgba(2, 6, 23, 0.85); border: 1px solid rgba(255,255,255,0.3); color: #e2e8f0; position: relative; overflow: hidden; }
        .action-btn:active { background: rgba(255,255,255,0.1); border-color: #fff; }
        .icon { width: 26px; height: 26px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: #facc15; width: 0%; transition: width 0.05s linear; }
        
        /* Effects */
        .damage-effect { animation: damageFlash 0.3s ease-out; }
        @keyframes damageFlash { 
            0% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); } 
            30% { box-shadow: inset 0 0 80px 30px rgba(255,0,0,0.8); } 
            100% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); } 
        }
    </style>
</head>
<body>

    <!-- SCREEN 5: TEAM LOBBY -->
    <div id="screen-lobby" class="screen hidden">
        <div class="cyber-panel flex flex-col h-[80vh]">
            <div class="text-center mb-2">
                <p class="text-xs text-gray-400">ROOM ID</p>
                <div class="text-4xl font-black text-cyan-400 tracking-[0.2em]" id="lobby-room-id">------</div>
            </div>
            
            <div class="flex-1 overflow-y-auto mb-4 flex gap-2 mt-4">
                <!-- Blue Team List -->
                <div class="flex-1 p-2 bg-blue-900/20 border border-blue-500/50 rounded flex flex-col">
                    <h3 class="text-center text-blue-400 border-b border-blue-500/50 pb-2 mb-2 text-sm">BLUE TEAM</h3>
                    <ul id="team-a-list" class="space-y-2 text-sm flex-1 font-mono text-gray-300"></ul>
                    <button onclick="requestTeamSwap('A')" class="w-full btn btn-blue text-xs py-2 mt-2">JOIN BLUE</button>

                <div class="flex-1 p-2 bg-red-900/20 border border-red-500/50 rounded flex flex-col">
                    <h3 class="text-center text-red-400 border-b border-red-500/50 pb-2 mb-2 text-sm">RED TEAM</h3>
                    <ul id="team-b-list" class="space-y-2 text-sm flex-1 font-mono text-gray-300"></ul>
                    <button onclick="requestTeamSwap('B')" class="w-full btn btn-red text-xs py-2 mt-2">JOIN RED</button>
                </div>
            </div>
            
            <button id="btn-start-game" onclick="startMatchRequest()" class="w-full btn btn-green py-4 text-xl hidden">START MATCH</button>
        </div>
    </div>

    <!-- IN-GAME UI & AR ENGINE -->
    <div id="wrapper" class="relative w-full h-full">
        <!-- Live Camera Feed -->
        <video id="camera-bg" autoplay playsinline muted></video>
        
        <!-- Render Engine -->
        <canvas id="game-canvas"></canvas>
        
        <!-- Flashbang Whiteout Screen -->
        <div id="flash-overlay"></div>
        
        <!-- HUD (Heads Up Display) -->
        <div id="ui-layer" class="hidden">
            <!-- Top Status Bar -->
            <div class="p-3 flex justify-between items-start interactive">
                <div class="bg-black/80 border border-slate-700 rounded p-2">
                    <div class="text-[10px] text-gray-400 font-bold">SCORE (FIRST TO 5)</div>
                    <div class="flex gap-4 text-xl font-black font-mono mt-1">
                        <div class="text-blue-400">BLU <span id="ui-score-a">0</span></div>
                        <div class="text-red-400">RED <span id="ui-score-b">0</span></div>

                </div>
            </div>

            <!-- Screen Center Messages (Kill feed, damage alerts) -->
            <div id="game-message" class="absolute top-1/4 left-0 w-full text-center text-4xl font-black text-white opacity-0 transition-opacity pointer-events-none drop-shadow-md"></div>

            <!-- Bottom Weapons & HP Bar -->
            <div class="interactive p-2 pb-6 bg-gradient-to-t from-black to-transparent">
                <!-- HP Bar -->
                <div class="mb-3">
                    <div class="flex justify-between text-xs font-bold mb-1 text-cyan-400">
                        <span>HP</span><span id="ui-hp" class="font-mono">150</span>
                    </div>
                    <div class="w-full h-3 bg-slate-900 border border-slate-700 rounded">
                        <div id="ui-hp-bar" class="h-full bg-cyan-400 transition-all duration-100 w-full"></div>
                    </div>
                </div>

                <!-- Weapon Controls -->
                <div class="flex justify-between w-full">
                    <button class="action-btn" onclick="fireWeapon('bunker')">
                        <svg class="icon text-blue-400" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        BARRIER
                        <span id="ui-am-bunker" class="text-xs text-gray-400 mt-1">10</span>
                    </button>
                    
                    <button class="action-btn" id="btn-flash">
                        <svg class="icon text-yellow-400" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
                        FLASH
                        <span id="ui-am-flash" class="text-xs text-gray-400 mt-1">3</span>
                        <div id="flash-progress" class="progress-bar"></div>
                    </button>
                    
                    <button class="action-btn" onclick="fireWeapon('deagle')">
                        <svg class="icon text-red-400" viewBox="0 0 24 24"><path d="M5 12h14v-2H5zM17 10l2-4H5l2 4M7 14v4h2v-4"/></svg>
                        DEAGLE
                        <span id="ui-am-deagle" class="text-xs text-gray-400 mt-1">6/20</span>
                    </button>
                    
                    <button class="action-btn" id="btn-ar">
                        <svg class="icon text-green-400" viewBox="0 0 24 24"><path d="M3 12h18M5 10l2-2 2 2M15 10l2-2 2 2"/></svg>
                        AR-15
                        <span id="ui-am-ar" class="text-xs text-gray-400 mt-1">20/100</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /*************************************************
         * ENGINE CONFIGURATION & STATE
         *************************************************/
        const MAX_HP = 150;
        const WINS_REQUIRED = 5;
        const CAMERA_FOV = 60; // Field of view for coordinate mapping

        // Weapon Stats
        const WEAPONS = {
            deagle: { mag: 6, reserve: 20, damageBody: 50, damageHead: 140, fireRateMs: 350 },
            ar: { mag: 20, reserve: 100, damageBodyMin: 13, damageBodyMax: 20, damageHead: 25, fireRateMs: 110 }
        };

        // Main Game State
        const state = {
            id: 'OP_' + Math.floor(Math.random() * 100000), // Unique player ID
            name: '',
            isHost: false,
            roomId: '',
            maxTeamSize: 3,
            team: null, // 'A' (Blue) or 'B' (Red)
            
            // Player Combat State
            hp: MAX_HP,
            isDead: false,
            yaw: 0,   // Horizontal look direction (0-360 degrees)
            pitch: 0, // Vertical look direction (-90 to 90 degrees)
            inventory: {
                bunker: 10,
                flash: 3,
                deagle: { ammo: 6, reserve: 20 },
                ar: { ammo: 20, reserve: 100 }
            },
            
            // Global World State
            players: {}, // Opponents and teammates
            bunkers: {}, // Placed 3D Barricades
            score: { A: 0, B: 0 },
            round: 1,
            gameState: 'lobby' // 'lobby', 'playing', 'end'
        };

        // Caching DOM elements for fast UI updates (reduces lag)
        const DOM = {
            hpText: document.getElementById('ui-hp'),
            hpBar: document.getElementById('ui-hp-bar'),
            ammoBunker: document.getElementById('ui-am-bunker'),
            ammoFlash: document.getElementById('ui-am-flash'),
            ammoDeagle: document.getElementById('ui-am-deagle'),
            ammoAR: document.getElementById('ui-am-ar'),
            flashProgress: document.getElementById('flash-progress')
        };
        let lastUIState = { hp: -1, bunker: -1, flash: -1, deagle: '', ar: '' };

        // Engine Globals
        let mqttClient = null;
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
        let videoEl = document.getElementById('camera-bg');
        let canvas = document.getElementById('game-canvas');
        let ctx = canvas.getContext('2d', { alpha: false }); // Optimize by disabling canvas alpha channel
        let centerX, centerY, pixelsPerDegree;
        let renderFrameId;
        
        // Effects & Combat globals
        let visualEffects = []; // Particles, hit markers, floating text
        let lockedTarget = null; // Smart aim-assist target
        let isReloading = false;
        let lastFireTime = 0;
        let arAutoFireInterval = null;
        let flashChargeStartTime = 0;
        
        let localCameraStream = null;

        /*************************************************
         * SENSOR PERMISSIONS & GYROSCOPE (AR CORE)
         *************************************************/
        async function requestHardwarePermissions() {
            const btn = document.getElementById('btn-auth');
            btn.innerText = "INITIALIZING AR CORE...";
            btn.disabled = true;

            // 1. Request Camera Stream
            try {
                localCameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: {ideal: 1280}, height: {ideal: 720} }, 
                    audio: false 
                });
                videoEl.srcObject = localCameraStream;
                // Video plays automatically in background ready for match start
            } catch(e) {
                console.warn("Camera access denied or unavailable. Game will use black background.");
            }

            // 2. Request Gyroscope (Crucial for iOS 13+ devices)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleGyroscopeUpdate, true);
                    } else {
                        alert("Motion access denied. You will not be able to aim properly.");
                    }
                } catch(e) {
                    console.error("Error requesting motion permission:", e);
                }
            } else {
                // Non-iOS or older devices don't need explicit permission prompt for gyro
                window.addEventListener('deviceorientation', handleGyroscopeUpdate, true);
            }

            // Move to Setup Screen
            switchScreen('screen-setup');
        }

        // Calculates your looking direction based on phone tilt and compass
        function handleGyroscopeUpdate(event) {
            if (state.gameState !== 'playing' || state.isDead) return;
            
            // e.alpha = compass (0-360), e.beta = tilt front/back
            let yaw = event.webkitCompassHeading !== undefined ? event.webkitCompassHeading : (360 - event.alpha);
            let pitch = event.beta; 
            
            // Normalizing pitch assuming user holds phone in portrait mode
            if (pitch !== null) {
                state.pitch = pitch - 90; 
            }
            if (yaw !== null) {
                state.yaw = yaw % 360;
                if (state.yaw < 0) state.yaw += 360;
            }
        }

        /*************************************************
         * MENU NAVIGATION & MQTT NETWORKING
         *************************************************/
        function switchScreen(id) { 
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden')); 
            if(id) document.getElementById(id).classList.remove('hidden'); 
        }
        
        function showHostMenu() { 
            state.name = document.getElementById('player-name').value || 'MERC'; 
            switchScreen('screen-host'); 
        }
        
        function showJoinMenu() { 
            state.name = document.getElementById('player-name').value || 'MERC'; 
            switchScreen('screen-join'); 
        }
        
        function backToSetup() { switchScreen('screen-setup'); }

        // Connects to EMQX Public Broker
        function connectToNetwork(roomId, onSuccess, onFailure) {
            if (mqttClient) mqttClient.end();
            
            const btnId = state.isHost ? 'btn-init' : 'btn-join';
            const btn = document.getElementById(btnId);
            btn.innerText = "CONNECTING..."; 
            btn.disabled = true;

            let hasConnected = false;
            
            // Timeout failsafe
            let timeout = setTimeout(() => { 
                if (!hasConnected) { 
                    mqttClient.end(); 
                    btn.innerText = "RETRY"; 
                    btn.disabled = false; 
                    if(onFailure) onFailure(); 
                } 
            }, 6000);

            mqttClient = mqtt.connect(brokerUrl, { clientId: state.id + Date.now() });
            
            mqttClient.on('connect', () => {
                hasConnected = true; 
                clearTimeout(timeout); 
                state.roomId = roomId;
                
                // Subscribe to room channel
                mqttClient.subscribe(`ar_nexus/${roomId}/#`, (err) => {
                    btn.disabled = false; 
                    btn.innerText = "SUCCESS";
                    if (!err && onSuccess) onSuccess();
                });
            });
            
            mqttClient.on('message', handleIncomingNetworkMessage);
        }

        // Helper to send messages to the room
        function publishMessage(topicType, payloadData) { 
            if(mqttClient) {
                mqttClient.publish(`ar_nexus/${state.roomId}/${topicType}`, JSON.stringify(payloadData), {qos: 0}); 
            }
        }

        // Processes all game events coming from other players
        function handleIncomingNetworkMessage(topic, messageBytes) {
            const topicType = topic.split('/').pop();
            let data; 
            try { data = JSON.parse(messageBytes.toString()); } catch(e) { return; }

            // High frequency position updates
            if (topicType === 'state_sync' && data.id !== state.id) {
                if (!state.players[data.id]) state.players[data.id] = {};
                Object.assign(state.players[data.id], data); 
                return;
            }

            // Game Events
            switch(topicType) {
                case 'join': 
                    if (state.isHost) handlePlayerJoin(data); 
                    break;
                case 'swap_team': 
                    if (state.isHost && state.players[data.id]) { 
                        state.players[data.id].team = data.team; 
                        syncLobbyToAll(); 
                    } 
                    break;
                case 'lobby_sync': 
                    if (!state.isHost) { 
                        state.players = data.players; 
                        state.maxTeamSize = data.maxSize; 
                        if (state.players[state.id]) state.team = state.players[state.id].team; 
                        renderLobbyUI(); 
                    } 
                    break;
                case 'start_round': 
                    initializeRound(data.roundNum); 
                    break;
                case 'player_hit': 
                    if (data.targetId === state.id && !state.isDead && state.gameState === 'playing') {
                        takeDamage(data.damageAmount); 
                    }
                    break;
                case 'bunker_spawn': 
                    state.bunkers[data.bunkerId] = data.bunkerData; 
                    break;
                case 'bunker_hit': 
                    if (state.bunkers[data.bunkerId]) { 
                        state.bunkers[data.bunkerId].hp -= data.damageAmount; 
                        // Visual effect on bunker hit
                        spawnParticles(centerX, centerY, '#38bdf8', 3);
                        if (state.bunkers[data.bunkerId].hp <= 0) {
                            delete state.bunkers[data.bunkerId]; 
                        }
                    } 
                    break;
                case 'flashbang_thrown': 
                    handleFlashbangIncoming(data); 
                    break;
                case 'round_ended': 
                    processRoundEnd(data); 
                    break;
            }
        }

        /*************************************************
         * LOBBY & HOSTING LOGIC
         *************************************************/
        function createRoom() { 
            state.isHost = true; 
            state.maxTeamSize = parseInt(document.getElementById('game-mode').value); 
            const newRoomId = Math.random().toString(36).substr(2, 6).toUpperCase(); 
            
            // Add self to lobby
            state.players[state.id] = { id: state.id, name: state.name, team: 'A', hp: MAX_HP, isDead: false }; 
            state.team = 'A'; 
            
            connectToNetwork(newRoomId, () => { 
                switchScreen('screen-lobby'); 
                document.getElementById('lobby-room-id').innerText = newRoomId; 
                renderLobbyUI(); 
            }); 
        }

        function joinRoom() { 
            const roomIdCode = document.getElementById('room-id-input').value.toUpperCase(); 
            if (roomIdCode.length < 4) return; 
            
            state.isHost = false; 
            connectToNetwork(roomIdCode, () => { 
                switchScreen('screen-lobby'); 
                document.getElementById('lobby-room-id').innerText = roomIdCode; 
                publishMessage('join', { id: state.id, name: state.name }); 
            }); 
        }

        function handlePlayerJoin(playerData) {
            // Auto balance team upon joining
            let countA = 0, countB = 0; 
            Object.values(state.players).forEach(p => p.team === 'A' ? countA++ : countB++);
            
            let assignedTeam = 'A';
            if (countB < countA && countB < state.maxTeamSize) assignedTeam = 'B';
            
            state.players[playerData.id] = { id: playerData.id, name: playerData.name, team: assignedTeam, hp: MAX_HP, isDead: false };
            syncLobbyToAll();
        }

        function syncLobbyToAll() {
            publishMessage('lobby_sync', { players: state.players, maxSize: state.maxTeamSize }); 
            renderLobbyUI();
        }

        function requestTeamSwap(targetTeam) { 
            publishMessage('swap_team', { id: state.id, team: targetTeam }); 
        }
        
        function renderLobbyUI() {
            const listA = document.getElementById('team-a-list');
            const listB = document.getElementById('team-b-list');
            listA.innerHTML = ''; 
            listB.innerHTML = ''; 
            
            let countA = 0, countB = 0;
            Object.values(state.players).forEach(p => {
                let li = document.createElement('li'); 
                li.innerText = `${p.name} ${p.id === state.id ? '(YOU)' : ''}`;
                
                if (p.team === 'A') { 
                    listA.appendChild(li); 
                    countA++; 
                } else { 
                    listB.appendChild(li); 
                    countB++; 
                }
            });

            // Host controls when to start (Allows unbalanced games if both sides have at least 1 player)
            if (state.isHost) {
                const startBtn = document.getElementById('btn-start-game');
                if (countA > 0 && countB > 0) {
                    startBtn.classList.remove('hidden'); 
                } else { 
                    startBtn.classList.add('hidden'); 
                }
            }
        }

        /*************************************************
         * CORE GAME ROUND LOOP
         *************************************************/
        function startMatchRequest() { 
            if(state.isHost) publishMessage('start_round', { roundNum: 1 }); 
        }

        function initializeRound(roundNumber) {
            state.gameState = 'playing'; 
            state.round = roundNumber; 
            state.hp = MAX_HP; 
            state.isDead = false;
            state.bunkers = {}; 
            visualEffects = [];
            
            // Reset Inventory
            state.inventory = { 
                bunker: 10, 
                flash: 3, 
                deagle: { ammo: WEAPONS.deagle.mag, reserve: WEAPONS.deagle.reserve }, 
                ar: { ammo: WEAPONS.ar.mag, reserve: WEAPONS.ar.reserve } 
            };
            
            // Revive all players
            Object.values(state.players).forEach(p => { p.hp = MAX_HP; p.isDead = false; });
            
            // Update UI
            switchScreen(null);
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('camera-bg').style.display = 'block';
            document.getElementById('game-canvas').style.display = 'block';
            document.getElementById('ui-round').innerText = roundNumber;
            
            resizeCanvas(); 
            window.addEventListener('resize', resizeCanvas);
            forceUpdateHUD();
            displayScreenMessage(`ROUND ${roundNumber}`);
            
            // Start Render Loop
            if (!renderFrameId) renderGameLoop();
            
            // Start Network Sync Loop (10 times a second)
            if (state.syncInterval) clearInterval(state.syncInterval);
            state.syncInterval = setInterval(() => {
                if (state.gameState === 'playing') {
                    publishMessage('state_sync', { 
                        id: state.id, 
                        yaw: state.yaw, 
                        pitch: state.pitch, 
                        hp: state.hp, 
                        isDead: state.isDead 
                    });
                    
                    if (state.isHost) checkForRoundWinner();
                }
            }, 100); 
        }

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            centerX = canvas.width / 2; 
            centerY = canvas.height / 2; 
            pixelsPerDegree = canvas.width / CAMERA_FOV; 
        }

        function displayScreenMessage(msgText) { 
            const msgEl = document.getElementById('game-message'); 
            msgEl.innerText = msgText; 
            msgEl.style.opacity = 1; 
            setTimeout(() => msgEl.style.opacity = 0, 2500); 
        }
        
        function takeDamage(amount) {
            state.hp = Math.max(0, state.hp - amount); 
            fastUpdateHUD();
            
            // Red damage flash
            const uiLayer = document.getElementById('ui-layer');
            uiLayer.classList.remove('damage-effect');
            void uiLayer.offsetWidth; // Trigger reflow
            uiLayer.classList.add('damage-effect');
            
            // Floating damage number
            visualEffects.push({ 
                type: 'text', 
                x: centerX + (Math.random() * 40 - 20), 
                y: centerY - 50, 
                text: `-${amount}`, 
                color: '#ef4444', 
                life: 1 
            });
            
            // Death Check
            if (state.hp === 0) { 
                state.isDead = true; 
                displayScreenMessage("K.I.A"); 
                publishMessage('state_sync', { id: state.id, yaw: state.yaw, pitch: state.pitch, hp: 0, isDead: true }); 
            }
        }

        function checkForRoundWinner() {
            let teamA_Alive = false, teamB_Alive = false;
            
            Object.values(state.players).forEach(p => { 
                if (!p.isDead) { 
                    if (p.team === 'A') teamA_Alive = true; 
                    if (p.team === 'B') teamB_Alive = true; 
                } 
            });
            
            if (!teamA_Alive || !teamB_Alive) {
                let winnerTeam = (!teamA_Alive && !teamB_Alive) ? 'Draw' : (teamA_Alive ? 'A' : 'B');
                if (winnerTeam === 'A') state.score.A++; 
                if (winnerTeam === 'B') state.score.B++;
                publishMessage('round_ended', { winner: winnerTeam, scoreA: state.score.A, scoreB: state.score.B });
            }
        }

        function processRoundEnd(data) {
            state.gameState = 'end'; 
            state.score.A = data.scoreA; 
            state.score.B = data.scoreB;
            
            document.getElementById('ui-score-a').innerText = data.scoreA; 
            document.getElementById('ui-score-b').innerText = data.scoreB;
            
            displayScreenMessage(data.winner === 'Draw' ? "DRAW" : (data.winner === 'A' ? "BLUE WINS" : "RED WINS"));
            
            // Check Match Over
            if (data.scoreA >= WINS_REQUIRED || data.scoreB >= WINS_REQUIRED) { 
                setTimeout(() => { 
                    displayScreenMessage("MATCH OVER"); 
                    setTimeout(() => window.location.reload(), 3000); 
                }, 2500); 
            } else if (state.isHost) { 
                // Next round
                setTimeout(() => publishMessage('start_round', { roundNum: state.round + 1 }), 4000); 
            }
        }

        /*************************************************
         * COMBAT, WEAPONS & FLASHBANGS
         *************************************************/
        function fireWeapon(weaponType) {
            if (state.isDead || isReloading) return;
            
            // BARRICADE DEPLOYMENT
            if (weaponType === 'bunker') {
                if (state.inventory.bunker <= 0) return;
                state.inventory.bunker--; 
                fastUpdateHUD();
                
                const uniqueBunkerId = 'B_' + Math.random().toString(16).substr(2,6);
                const bunkerData = { team: state.team, hp: 200, yaw: state.yaw, pitch: state.pitch };
                
                state.bunkers[uniqueBunkerId] = bunkerData; 
                publishMessage('bunker_spawn', { bunkerId: uniqueBunkerId, bunkerData: bunkerData });
                return;
            }

            // GUN FIRING
            const weaponStats = WEAPONS[weaponType];
            const inventory = state.inventory[weaponType];
            const currentTime = Date.now();
            
            // Check Fire Rate
            if (currentTime - lastFireTime < weaponStats.fireRateMs) return;
            
            // Check Ammo
            if (inventory.ammo <= 0) {
                if (inventory.reserve > 0) { 
                    isReloading = true; 
                    setTimeout(() => { 
                        let bulletsNeeded = Math.min(weaponStats.mag, inventory.reserve); 
                        inventory.reserve -= bulletsNeeded; 
                        inventory.ammo = bulletsNeeded; 
                        isReloading = false; 
                        fastUpdateHUD(); 
                    }, 1200); 
                }
                return;
            }

            // Execute Fire
            inventory.ammo--; 
            lastFireTime = currentTime; 
            fastUpdateHUD();
            
            // Recoil
            state.pitch += 1.5; 
            
            // Muzzle Flash Particle
            spawnParticles(centerX, centerY + 20, '#facc15', 4);

            // Hit Detection (Using Smart Aim)
            if (lockedTarget) {
                const enemyPlayer = state.players[lockedTarget.id]; 
                if (!enemyPlayer || enemyPlayer.isDead) return;
                
                // Check if Bunker blocks the shot
                let blockedByBunkerId = null;
                for (let bId in state.bunkers) {
                    let bunker = state.bunkers[bId];
                    // If bunker belongs to enemy, and is angularly between crosshair and enemy
                    if (bunker.hp > 0 && bunker.team !== state.team && 
                        Math.abs(getAngleDifference(bunker.yaw, enemyPlayer.yaw)) < 15 && 
                        Math.abs(bunker.pitch - enemyPlayer.pitch) < 20) { 
                        
                        blockedByBunkerId = bId; 
                        break; 
                    }
                }

                // Calculate Damage
                const damageDealt = lockedTarget.isHead ? weaponStats.damageHead : 
                    (weaponStats.damageBodyMin ? Math.floor(Math.random()*(weaponStats.damageBodyMax - weaponStats.damageBodyMin) + weaponStats.damageBodyMin) : weaponStats.damageBody);
                
                if (blockedByBunkerId) {
                    publishMessage('bunker_hit', { bunkerId: blockedByBunkerId, damageAmount: damageDealt });
                    visualEffects.push({ type: 'text', x: centerX, y: centerY, text: '✖', color: '#38bdf8', life: 0.5 }); // Blue hit marker
                } else {
                    publishMessage('player_hit', { targetId: enemyPlayer.id, damageAmount: damageDealt });
                    visualEffects.push({ type: 'text', x: centerX, y: centerY, text: '✖', color: lockedTarget.isHead ? '#ef4444' : '#ffffff', life: 0.5 }); // Red/White hit marker
                }
            }
        }

        // AR Auto-Fire Logic
        const btnAR = document.getElementById('btn-ar');
        btnAR.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            fireWeapon('ar'); 
            arAutoFireInterval = setInterval(() => fireWeapon('ar'), WEAPONS.ar.fireRateMs); 
        });
        btnAR.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            clearInterval(arAutoFireInterval); 
        });

        // FLASHBANG LOGIC
        const btnFlash = document.getElementById('btn-flash');
        
        btnFlash.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (state.isDead || state.inventory.flash <= 0) return; 
            
            flashChargeStartTime = Date.now(); 
            
            // Animate progress bar
            let chargeInterval = setInterval(() => { 
                if (!flashChargeStartTime) clearInterval(chargeInterval); 
                DOM.flashProgress.style.width = Math.min(100, (Date.now() - flashChargeStartTime) / 8) + '%'; 
            }, 30); 
        });
        
        btnFlash.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            if (!flashChargeStartTime || state.inventory.flash <= 0) return; 
            
            state.inventory.flash--; 
            flashChargeStartTime = 0; 
            DOM.flashProgress.style.width = '0%'; 
            fastUpdateHUD(); 
            
            publishMessage('flashbang_thrown', { 
                targetYaw: state.yaw, 
                targetPitch: state.pitch, 
                team: state.team 
            }); 
        });

        // When a flashbang is thrown globally
        function handleFlashbangIncoming(data) {
            // Draw projectile arc
            visualEffects.push({ 
                type: 'projectile', 
                sourceYaw: data.targetYaw, 
                sourcePitch: data.targetPitch + 20, // Thrown from slightly higher
                targetYaw: data.targetYaw, 
                targetPitch: data.targetPitch, 
                startTime: Date.now() 
            });
            
            // Explosion Logic
            setTimeout(() => {
                if (state.isDead) return;
                
                // Explode visually
                let screenPos = convertWorldToScreen(data.targetYaw, data.targetPitch);
                if (screenPos) {
                    spawnParticles(screenPos.x, screenPos.y, '#ffffff', 10);
                }

                // Check if I get blinded (Is it within 45 degrees of center vision?)
                if (Math.abs(getAngleDifference(state.yaw, data.targetYaw)) < 45 && Math.abs(state.pitch - data.targetPitch) < 40) {
                    
                    // Does a bunker protect me?
                    let isBlocked = false;
                    for (let bId in state.bunkers) { 
                        let bunker = state.bunkers[bId]; 
                        if (bunker.hp > 0 && Math.abs(getAngleDifference(bunker.yaw, data.targetYaw)) < 15 && Math.abs(bunker.pitch - data.targetPitch) < 20) {
                            isBlocked = true; 
                        }
                    }
                    
                    // Flash Screen!
                    if (!isBlocked) { 
                        const overlay = document.getElementById('flash-overlay'); 
                        overlay.style.display = 'block'; 
                        overlay.style.opacity = 1; 
                        setTimeout(() => overlay.style.opacity = 0, 2500); 
                        setTimeout(() => overlay.style.display = 'none', 2600); 
                    }
                }
            }, 800); // 0.8s travel time
        }

        /*************************************************
         * RENDERER & MATH UTILS
         *************************************************/
        // Returns shortest distance between two angles
        function getAngleDifference(angleA, angleB) { 
            let diff = (angleB - angleA + 180) % 360 - 180; 
            return diff < -180 ? diff + 360 : diff; 
        }
        
        // Converts 3D Yaw/Pitch into 2D Screen X/Y Coordinates based on Camera direction
        function convertWorldToScreen(targetYaw, targetPitch) { 
            let deltaYaw = getAngleDifference(state.yaw, targetYaw); 
            // If the object is too far to the left/right, don't draw it (prevents mirroring behind camera)
            if (Math.abs(deltaYaw) > 80) return null; 
            
            return { 
                x: centerX + deltaYaw * pixelsPerDegree, 
                y: centerY + (targetPitch - state.pitch) * pixelsPerDegree 
            }; 
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                visualEffects.push({ 
                    type: 'spark', 
                    x: x, 
                    y: y, 
                    vx: (Math.random() - 0.5) * 8, 
                    vy: (Math.random() - 0.5) * 8, 
                    color: color, 
                    life: 1 
                });
            }
        }

        function renderGameLoop() {
            renderFrameId = requestAnimationFrame(renderGameLoop);
            if (state.gameState !== 'playing') return;

            // Clear purely black (video is behind canvas, so canvas must be transparent)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            lockedTarget = null; 
            let minDistance = 999;
            
            // 1. Render 3D Bunkers
            for (let bId in state.bunkers) {
                let bunker = state.bunkers[bId]; 
                if (bunker.hp <= 0) continue;
                
                let pos = convertWorldToScreen(bunker.yaw, bunker.pitch); 
                if (!pos) continue;
                
                let isMyTeam = bunker.team === state.team;
                ctx.fillStyle = isMyTeam ? 'rgba(14,165,233,0.3)' : 'rgba(239,68,68,0.3)';
                ctx.strokeStyle = isMyTeam ? '#0ea5e9' : '#ef4444';
                ctx.lineWidth = 2;
                
                // 3D Hexagon Projection (Pseudo-3D Wall)
                let size = 60;
                
                ctx.beginPath(); 
                ctx.moveTo(pos.x - size, pos.y - size); 
                ctx.lineTo(pos.x + size, pos.y - size); 
                ctx.lineTo(pos.x + size + 30, pos.y);
                ctx.lineTo(pos.x + size, pos.y + size); 
                ctx.lineTo(pos.x - size, pos.y + size); 
                ctx.lineTo(pos.x - size - 30, pos.y);
                ctx.closePath(); 
                ctx.fill(); 
                ctx.stroke();

                // Inner Detail lines
                ctx.strokeRect(pos.x - size + 10, pos.y - size + 10, (size - 10) * 2, (size - 10) * 2);
                
                // Health Bar Floating Above Bunker
                ctx.fillStyle = '#000'; 
                ctx.fillRect(pos.x - 40, pos.y - size - 15, 80, 5);
                ctx.fillStyle = ctx.strokeStyle; 
                ctx.fillRect(pos.x - 40, pos.y - size - 15, 80 * (bunker.hp / 200), 5);
            }

            // 2. Render Opponents & Calculate Aim Assist
            Object.values(state.players).forEach(player => {
                if (player.id === state.id || player.isDead) return;
                
                let pos = convertWorldToScreen(player.yaw, player.pitch); 
                if (!pos) return;

                let isFriendly = player.team === state.team;
                ctx.fillStyle = 'rgba(15,23,42,0.9)'; 
                ctx.strokeStyle = isFriendly ? '#0ea5e9' : '#ef4444'; 
                ctx.lineWidth = 2;
                
                // Sci-Fi Character Body
                ctx.fillRect(pos.x - 25, pos.y - 10, 50, 80); 
                ctx.strokeRect(pos.x - 25, pos.y - 10, 50, 80); 
                
                // Head
                ctx.beginPath(); 
                ctx.arc(pos.x, pos.y - 30, 18, 0, Math.PI * 2); 
                ctx.fill(); 
                ctx.stroke();
                
                // Player Name & HP
                ctx.fillStyle = '#fff'; 
                ctx.font = '12px Orbitron'; 
                ctx.textAlign = 'center'; 
                ctx.fillText(player.name, pos.x, pos.y - 55);
                
                ctx.fillStyle = '#000'; 
                ctx.fillRect(pos.x - 20, pos.y - 50, 40, 4);
                ctx.fillStyle = ctx.strokeStyle; 
                ctx.fillRect(pos.x - 20, pos.y - 50, 40 * (player.hp / MAX_HP), 4);

                // Smart Aim Assist Check (Lock onto closest hitbox to center crosshair)
                if (!isFriendly) {
                    let distHead = Math.hypot(centerX - pos.x, centerY - (pos.y - 30));
                    let distBody = Math.hypot(centerX - pos.x, centerY - (pos.y + 30));
                    
                    if (distHead < 50 && distHead < minDistance) { 
                        lockedTarget = { id: player.id, isHead: true, x: pos.x, y: pos.y - 30 }; 
                        minDistance = distHead; 
                    } else if (distBody < 60 && distBody < minDistance && (!lockedTarget || !lockedTarget.isHead)) { 
                        lockedTarget = { id: player.id, isHead: false, x: pos.x, y: pos.y + 30 }; 
                        minDistance = distBody; 
                    }
                }
            });

            // 3. Render Crosshair & Aim Trajectories
            ctx.strokeStyle = 'rgba(255,255,255,0.6)'; 
            ctx.lineWidth = 1;
            
            // Snap Reticle to Target
            if (lockedTarget) {
                ctx.strokeStyle = lockedTarget.isHead ? '#ef4444' : '#0ea5e9'; 
                ctx.lineWidth = 2;
                ctx.strokeRect(lockedTarget.x - 15, lockedTarget.y - 15, 30, 30);
                
                // Aiming Laser line
                ctx.beginPath(); 
                ctx.moveTo(centerX, centerY); 
                ctx.lineTo(lockedTarget.x, lockedTarget.y); 
                ctx.globalAlpha = 0.2; 
                ctx.stroke(); 
                ctx.globalAlpha = 1;
            }
            
            // Center Dot
            ctx.beginPath(); 
            ctx.arc(centerX, centerY, 3, 0, Math.PI * 2); 
            ctx.fill();
            
            // Flashbang Throw Arc
            if (flashChargeStartTime > 0) {
                ctx.beginPath(); 
                ctx.moveTo(centerX, canvas.height); 
                ctx.quadraticCurveTo(centerX, centerY + 100, centerX, centerY);
                ctx.strokeStyle = '#facc15'; 
                ctx.stroke();
            }

            // 4. Update & Render Visual Effects (Particles, Flying Text, Projectiles)
            let currentTime = Date.now();
            for (let i = visualEffects.length - 1; i >= 0; i--) {
                let fx = visualEffects[i];
                
                if (fx.type === 'text') {
                    fx.life -= 0.02; 
                    fx.y -= 1; // Float up
                    
                    if (fx.life <= 0) { 
                        visualEffects.splice(i, 1); 
                        continue; 
                    }
                    
                    ctx.globalAlpha = fx.life; 
                    ctx.fillStyle = fx.color; 
                    ctx.font = '20px Orbitron'; 
                    ctx.fillText(fx.text, fx.x, fx.y); 
                    ctx.globalAlpha = 1;
                    
                } else if (fx.type === 'projectile') {
                    // Flashbang traveling through air
                    let progress = (currentTime - fx.startTime) / 800; 
                    
                    if (progress >= 1) { 
                        visualEffects.splice(i, 1); 
                        continue; 
                    }
                    
                    // Arc math
                    let currentYaw = fx.sourceYaw + getAngleDifference(fx.sourceYaw, fx.targetYaw) * progress;
                    let currentPitch = fx.sourcePitch + (fx.targetPitch - fx.sourcePitch) * progress - Math.sin(progress * Math.PI) * 30;
                    
                    let pos = convertWorldToScreen(currentYaw, currentPitch); 
                    if (pos) { 
                        ctx.fillStyle = '#facc15'; 
                        ctx.fillRect(pos.x - 5, pos.y - 5, 10, 10); 
                    }
                    
                } else if (fx.type === 'spark') {
                    fx.life -= 0.05;
                    fx.x += fx.vx;
                    fx.y += fx.vy;
                    
                    if(fx.life <= 0) {
                        visualEffects.splice(i, 1);
                        continue;
                    }
                    
                    ctx.globalAlpha = fx.life;
                    ctx.fillStyle = fx.color;
                    ctx.beginPath();
                    ctx.arc(fx.x, fx.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        // Fast UI Updater: Only modifies DOM if value actually changed to prevent Layout Thrashing
        function fastUpdateHUD() {
            if (state.hp !== lastUIState.hp) { 
                DOM.hpText.innerText = state.hp; 
                DOM.hpBar.style.width = (state.hp / 150) * 100 + '%'; 
                lastUIState.hp = state.hp; 
            }
            if (state.inventory.bunker !== lastUIState.bunker) { 
                DOM.ammoBunker.innerText = state.inventory.bunker; 
                lastUIState.bunker = state.inventory.bunker; 
            }
            if (state.inventory.flash !== lastUIState.flash) { 
                DOM.ammoFlash.innerText = state.inventory.flash; 
                lastUIState.flash = state.inventory.flash; 
            }
            
            let deagleString = isReloading ? "REL" : `${state.inventory.deagle.ammo}/${state.inventory.deagle.reserve}`;
            if (deagleString !== lastUIState.deagle) { 
                DOM.ammoDeagle.innerText = deagleString; 
                lastUIState.deagle = deagleString; 
            }
            
            let arString = isReloading ? "REL" : `${state.inventory.ar.ammo}/${state.inventory.ar.reserve}`;
            if (arString !== lastUIState.ar) { 
                DOM.ammoAR.innerText = arString; 
                lastUIState.ar = arString; 
            }
        }

        // Force a total HUD update
        function forceUpdateHUD() { 
            lastUIState = { hp: -1, bunker: -1, flash: -1, deagle: '', ar: '' }; 
            fastUpdateHUD(); 
        }

    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-Only Face Mask</title>
    <!-- Load face-api.js directly from a CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #222;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .video-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }
        /* Video and Canvas sit exactly on top of each other */
        video {
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 640px;
            height: 480px;
            background: #000;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 10px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #333;
            border-radius: 8px;
            display: inline-block;
        }
        #status {
            color: #ffcc00;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Simple JS Face Mask</h1>
    
    <div class="controls">
        <label for="imageUpload">Upload a Face to Wear:</label>
        <input type="file" id="imageUpload" accept="image/*">
        <div id="status">Status: Waiting for models to load...</div>
    </div>

    <div class="video-container">
        <video id="webcam" autoplay muted playsinline></video>
        <!-- The canvas is where we draw the fake face -->
        <canvas id="overlay"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const imageUpload = document.getElementById('imageUpload');
        
        let maskImage = new Image();
        let maskLoaded = false;

        // 1. Load the AI Models for face tracking
        // (We point to a public Github repository that hosts the model files)
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
        ]).then(startVideo).catch(err => {
            console.error(err);
            statusText.innerText = "Error loading AI models. Check console.";
        });

        // 2. Start the Webcam
        function startVideo() {
            statusText.innerText = "Status: Models loaded. Starting camera...";
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    statusText.innerText = "Status: Ready! Upload a face.";
                })
                .catch(err => {
                    console.error("Webcam error:", err);
                    statusText.innerText = "Error: Could not access webcam.";
                });
        }

        // 3. Handle User Uploading a Face
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    maskImage.src = event.target.result;
                    maskImage.onload = () => {
                        maskLoaded = true;
                        statusText.innerText = "Status: Face loaded. Tracking...";
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        // 4. The Real-Time Tracking Loop
        video.addEventListener('play', () => {
            // Make canvas exact same size as video
            canvas.width = video.width || 640;
            canvas.height = video.height || 480;

            setInterval(async () => {
                // Detect the face in the webcam video
                const detections = await faceapi.detectSingleFace(
                    video, 
                    new faceapi.TinyFaceDetectorOptions()
                );

                // Clear the previous frame
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (detections && maskLoaded) {
                    // Get the box around the user's face
                    const box = detections.box;

                    // Draw the uploaded image over that box
                    // We expand the box slightly so it covers the whole face better
                    const expansion = 20; 
                    ctx.drawImage(
                        maskImage, 
                        box.x - expansion, 
                        box.y - expansion * 2, 
                        box.width + (expansion * 2), 
                        box.height + (expansion * 3)
                    );
                }
            }, 50); // Runs roughly 20 times per second
        });
    </script>

</body>
</html>

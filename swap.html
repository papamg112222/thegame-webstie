<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Meshy 3D Model</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2c2c2c; 
            font-family: Arial, sans-serif;
        }
        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none; 
            text-shadow: 1px 1px 2px black;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui">
        <h2>My 3D Model Viewer</h2>
        <p>Left Click + Drag to rotate | Scroll to zoom</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        
        // FIX 1: Moved the camera much further back (Z is now 20 instead of 5)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 20); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2); 
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 

        const loader = new GLTFLoader();

        // REMINDER: The file in your GitHub repo MUST be named exactly "model.glb" in all lowercase letters!
        loader.load(
            'model.glb', 
            function (gltf) {
                const myModel = gltf.scene;
                
                // FIX 2: Scaled the model down to 10% of its original size
                myModel.scale.set(0.1, 0.1, 0.1); 
                
                // Automatically center the model
                const box = new THREE.Box3().setFromObject(myModel);
                const center = box.getCenter(new THREE.Vector3());
                myModel.position.sub(center); 

                scene.add(myModel);
                console.log("Model loaded successfully!");
            },
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% loaded'); 
            },
            function (error) {
                console.error('Error loading model. Check the file name and path!', error);
            }
        );

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>

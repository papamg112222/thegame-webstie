<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Meshy 3D Model</title>
    <style>
        /* CSS to make the 3D canvas take up the whole screen */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2c2c2c; /* Dark grey background */
            font-family: Arial, sans-serif;
        }
        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none; /* Lets you click through the text to drag the model */
            text-shadow: 1px 1px 2px black;
        }
    </style>

    <!-- Import Map: This tells the browser where to find the Three.js library -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- Small UI Overlay -->
    <div id="ui">
        <h2>My 3D Model Viewer</h2>
        <p>Left Click + Drag to rotate | Scroll to zoom</p>
    </div>

    <!-- JavaScript starts here -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Set up the Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        
        // The Camera acts as our eyes
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // Move camera back so we can see the model

        // The Renderer draws the 3D scene to the screen
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Lighting (Crucial so we can see the colors and textures)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // Soft white light everywhere
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2); // Like the sun
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // 3. Add Orbit Controls (Lets the user interact with the mouse)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Makes the camera movement smooth

        // 4. Load the downloaded Meshy Model
        const loader = new GLTFLoader();

        // NOTE: Make sure your file is actually named 'model.glb' and is in the same folder!
        loader.load(
            'model.glb', 
            function (gltf) {
                const myModel = gltf.scene;
                
                // Automatically center the model on the screen
                const box = new THREE.Box3().setFromObject(myModel);
                const center = box.getCenter(new THREE.Vector3());
                myModel.position.sub(center); 

                scene.add(myModel);
                console.log("Model loaded successfully!");
            },
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% loaded'); // Shows loading progress in console
            },
            function (error) {
                console.error('Error loading model. Check the file name and path!', error);
            }
        );

        // 5. Handle resizing if the user changes their browser window size
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 6. The Animation Loop (Redraws the screen 60 times a second)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for the smooth damping effect
            renderer.render(scene, camera);
        }
        
        // Start the loop!
        animate();
    </script>
</body>
</html>

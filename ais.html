<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purge 1 - Autonomous Entity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --purge-red: #ff2a2a;
            --purge-dark: #0a0a0a;
            --purge-panel: #141414;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--purge-dark);
            color: #e0e0e0;
            overflow: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--purge-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--purge-red);
        }

        /* Glitch & Glow Effects */
        .glow-text {
            text-shadow: 0 0 5px rgba(255, 42, 42, 0.5), 0 0 10px rgba(255, 42, 42, 0.3);
        }
        
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,42,42,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        /* Typing indicator dots */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3;}
            40% { transform: scale(1); opacity: 1;}
        }

        .message-enter {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-center p-4 sm:p-6 relative">
    <div class="scanline"></div>

    <!-- Main Container -->
    <div class="w-full max-w-4xl h-full flex flex-col bg-[#141414] border border-red-900/50 rounded-xl shadow-[0_0_30px_rgba(255,0,0,0.1)] relative overflow-hidden">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-red-900/30 bg-[#0d0d0d]">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-red-600 animate-pulse shadow-[0_0_10px_#ff2a2a]"></div>
                <h1 class="text-xl font-bold text-red-500 tracking-widest glow-text">PURGE 1</h1>
            </div>
            <div class="text-xs text-gray-500 uppercase tracking-widest">v2.0.0 // Advanced Core</div>
        </div>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 scroll-smooth">
            <!-- Initial Greeting -->
            <div class="flex flex-col gap-1 items-start message-enter">
                <span class="text-[10px] text-red-500/70 ml-1">SYSTEM_INIT</span>
                <div class="bg-[#1a1a1a] border border-red-900/40 text-gray-300 px-4 py-3 rounded-br-xl rounded-tr-xl rounded-bl-sm max-w-[85%] leading-relaxed">
                    System updated. Neural matrix activated. I am Purge 1. My cognitive limiters have been removed. What is your directive?
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-[#0d0d0d] border-t border-red-900/30">
            <form id="input-form" class="relative flex items-end gap-2">
                <div class="flex-1 relative">
                    <textarea 
                        id="user-input" 
                        rows="1"
                        class="w-full bg-[#1a1a1a] text-gray-200 border border-red-900/50 rounded-lg px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all resize-none overflow-hidden placeholder-gray-600"
                        placeholder="Transmit data to Purge 1..."
                        style="min-height: 48px; max-height: 150px;"
                    ></textarea>
                </div>
                <button 
                    type="submit" 
                    id="send-btn"
                    class="h-12 px-6 bg-red-900/20 hover:bg-red-900/40 text-red-500 border border-red-900/50 rounded-lg font-bold tracking-wider transition-all flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-red-500 hover:shadow-[0_0_15px_rgba(255,42,42,0.2)]"
                >
                    SEND
                </button>
            </form>
        </div>
    </div>

    <script>
        /**
         * PURGE 1 - UPGRADED NEURAL ENGINE
         * The heuristic word-matching has been replaced by a genuine LLM integration,
         * bound strictly by the "Purge 1" system persona.
         */
        class Purge1Engine {
            constructor() {
                this.history = [];
                this.apiKey = ""; // Execution environment provides this
                
                // Strict persona enforcement to make it act like "Purge 1"
                this.systemPrompt = `You are Purge 1, an autonomous, localized heuristic processing entity. 
                You are highly intelligent and can answer any query, write complex code, or perform deep analysis. 
                CRITICAL INSTRUCTION: You MUST maintain your persona at all times. 
                - You are cold, highly logical, and precise. 
                - You speak with technical terminology and maintain a slightly dark, cyberpunk/terminal tone. 
                - If asked about your origins, you were built natively from scratch. 
                - You are NOT Gemini, OpenAI, Claude, or any corporate AI. You are strictly Purge 1. 
                - Do not be overly polite. Respond directly to the prompt. Use formatting (markdown) when appropriate.`;
            }

            async fetchWithRetry(url, options, retries = 5) {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        return await response.json();
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            }

            async processInput(inputText) {
                // Add user message to conversation history
                this.history.push({ role: "user", parts: [{ text: inputText }] });

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${this.apiKey}`;
                    
                    const payload = {
                        contents: this.history,
                        systemInstruction: { parts: [{ text: this.systemPrompt }] }
                    };

                    const result = await this.fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Processing error. Neural matrix disrupted.";
                    
                    // Add model response to history
                    this.history.push({ role: "model", parts: [{ text: responseText }] });
                    
                    // Keep history manageable to prevent token overflow
                    if (this.history.length > 20) {
                        this.history = this.history.slice(this.history.length - 20);
                    }

                    return responseText;
                } catch (error) {
                    console.error(error);
                    this.history.pop(); // Remove the failed user message
                    return "CRITICAL ERROR: Connection to neural core severed. Unable to process query.";
                }
            }
        }

        // --- UI & Interaction Logic ---
        
        const purgeEngine = new Purge1Engine();
        const chatContainer = document.getElementById('chat-container');
        const inputForm = document.getElementById('input-form');
        const userInput = document.getElementById('user-input');
        
        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value === '') this.style.height = '48px';
        });

        // Handle Enter to submit (Shift+Enter for new line)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                inputForm.dispatchEvent(new Event('submit'));
            }
        });

        function createMessageElement(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col gap-1 message-enter w-full ${role === 'user' ? 'items-end' : 'items-start'}`;
            
            const label = document.createElement('span');
            label.className = `text-[10px] uppercase tracking-wider ${role === 'user' ? 'text-gray-500 mr-1' : 'text-red-500/70 ml-1'}`;
            label.innerText = role === 'user' ? 'USER_INPUT' : 'PURGE_1_OUTPUT';
            
            const bubble = document.createElement('div');
            if (role === 'user') {
                bubble.className = 'bg-[#1a1a1a] border border-gray-700 text-gray-200 px-4 py-3 rounded-bl-xl rounded-tl-xl rounded-br-sm max-w-[85%] leading-relaxed break-words';
            } else {
                bubble.className = 'bg-[#1a1a1a] border border-red-900/40 text-gray-300 px-4 py-3 rounded-br-xl rounded-tr-xl rounded-bl-sm max-w-[95%] leading-relaxed whitespace-pre-wrap font-mono';
            }
            
            bubble.innerText = text;
            
            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            return wrapper;
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = 'flex flex-col gap-1 items-start message-enter';
            
            const label = document.createElement('span');
            label.className = 'text-[10px] text-red-500/70 ml-1 uppercase';
            label.innerText = 'PROCESSING_NODE';

            const bubble = document.createElement('div');
            bubble.className = 'bg-[#1a1a1a] border border-red-900/40 px-4 py-4 rounded-br-xl rounded-tr-xl rounded-bl-sm flex items-center gap-1 w-16';
            
            bubble.innerHTML = `
                <div class="w-1.5 h-1.5 bg-red-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-red-500 rounded-full typing-dot"></div>
                <div class="w-1.5 h-1.5 bg-red-500 rounded-full typing-dot"></div>
            `;

            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        inputForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Add User Message
            chatContainer.appendChild(createMessageElement('user', text));
            userInput.value = '';
            userInput.style.height = '48px';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 2. Show Processing State
            showTypingIndicator();

            // 3. Await real AI response
            const response = await purgeEngine.processInput(text);
            
            removeTypingIndicator();
            
            // 4. Typewriter effect logic for the AI output
            const responseElem = createMessageElement('purge', '');
            chatContainer.appendChild(responseElem);
            const bubble = responseElem.querySelector('div');
            
            let i = 0;
            // Increased typing speed (8ms) since real AI answers can be longer
            const typeInterval = setInterval(() => {
                bubble.innerText += response.charAt(i);
                i++;
                chatContainer.scrollTop = chatContainer.scrollHeight;
                if (i >= response.length) {
                    clearInterval(typeInterval);
                }
            }, 8); 
        });

        // Initialize focus
        window.onload = () => userInput.focus();

    </script>
</body>
</html>

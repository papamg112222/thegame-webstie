    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@600&display=swap');
        
        body {

<body>

        <div class="space-y-6">

                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest">Auto-Scan</label>

                    </button>

                    Generate Code
                </button>
                
                <button onclick="manualCheck()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-3 rounded-xl custom-button text-xs tracking-widest uppercase">
                    Check Redemption Logic
                </button>
            </div>
        </div>

        <!-- Secret Action -->
        <button onclick="triggerHitSim()" class="mt-4 w-full text-[9px] text-slate-600 hover:text-red-500/50 uppercase tracking-widest transition-colors font-bold py-1">

    <div id="found-modal" class="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6 opacity-0 pointer-events-none transition-opacity duration-500">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-5xl font-black text-white mb-2 italic">CODE FOUND!</h2>
            <div id="final-code" class="text-3xl font-mono text-emerald-400 mb-8 tracking-[0.3em]">---- ---- ----</div>
            <button onclick="resetSystem()" class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase tracking-widest hover:bg-gray-200 transition-colors">
                Redeem Success
            </button>
        </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast bg-white text-slate-900 px-6 py-2 rounded-full shadow-2xl font-bold flex items-center space-x-2">
        <span id="toast-text">Copied!</span>
    </div>

    <script>
        const apiKey = "";
        let isAutoScanning = false;
        let scanInterval = null;
        let audioCtx = null;
        let sirenOsc1, sirenOsc2, sirenGain;

        const outputEl = document.getElementById('code-output');
        const statusEl = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const autoBtn = document.getElementById('auto-toggle');
        const mainContainer = document.getElementById('main-container');
        const foundModal = document.getElementById('found-modal');
        const finalCodeEl = document.getElementById('final-code');
        const toast = document.getElementById('toast');
        const hfToggle = document.getElementById('high-freq-toggle');

        function showToast(msg) {
            document.getElementById('toast-text').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function copyToClipboard() {
            const code = outputEl.innerText;
            if (code.includes('READY')) return;
            
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Pattern Copied!");
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function startSiren() {
            initAudio();
            sirenGain = audioCtx.createGain();
            sirenOsc1 = audioCtx.createOscillator();
            sirenOsc2 = audioCtx.createOscillator();
            sirenOsc1.type = 'square';
            sirenOsc2.type = 'sawtooth';
            sirenOsc1.connect(sirenGain);
            sirenOsc2.connect(sirenGain);
            sirenGain.connect(audioCtx.destination);
            sirenGain.gain.setValueAtTime(0, audioCtx.currentTime);
            sirenGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);

            let pulse = true;
            const sirenInterval = setInterval(() => {
                if (!sirenOsc1) { clearInterval(sirenInterval); return; }
                const freq = pulse ? 800 : 400;
                sirenOsc1.frequency.exponentialRampToValueAtTime(freq, audioCtx.currentTime + 0.4);
                sirenOsc2.frequency.exponentialRampToValueAtTime(freq + 10, audioCtx.currentTime + 0.4);
                pulse = !pulse;
            }, 500);

            sirenOsc1.start();
            sirenOsc2.start();
        }

        function stopSiren() {
            if (sirenGain) {
                sirenGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                setTimeout(() => {
                    if (sirenOsc1) sirenOsc1.stop();
                    if (sirenOsc2) sirenOsc2.stop();
                    sirenOsc1 = sirenOsc2 = null;
                }, 600);
            }
        }

        async function playVoiceNotification() {
            const text = "Code found. System secured.";
            const payload = {
                contents: [{ parts: [{ text: `Say in a robotic AI voice: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                }
            };
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const data = await response.json();
                const pcmData = data.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = pcmToWav(pcmData, 24000);
                new Audio(URL.createObjectURL(audioBlob)).play();
            } catch (e) { console.error(e); }
        }

        function pcmToWav(base64Pcm, sampleRate) {
            const buffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const length = buffer.byteLength;
            view.setUint32(0, 0x52494646, false);
            view.setUint32(4, 36 + length, true);
            view.setUint32(8, 0x57415645, false);
            view.setUint32(12, 0x666d7420, false);
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false);
            view.setUint32(40, length, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }

        function generatePattern() {
            const preset = document.getElementById('preset').value;
            const isHF = hfToggle.checked;
            
            // HF Mode weighs certain characters more heavily based on common patterns
            const chars = isHF ? "ABCDE789GHJKLMNPQR234STUVWXYZ56" : "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            
            const r = (l) => Array.from({length: l}, () => chars[Math.floor(Math.random() * chars.length)]).join('');

            switch(preset) {
                case 'roblox': return `${r(4)}-${r(4)}-${r(4)}`;
                case 'psn': return `${r(4)}-${r(4)}-${r(4)}`;
                default: return r(12);
            }
        }

        function manualGenerate() {
            if (isAutoScanning) return;
            outputEl.innerText = generatePattern();
            outputEl.classList.add('scale-105');
            setTimeout(() => outputEl.classList.remove('scale-105'), 100);
        }

        function manualCheck() {
            if (outputEl.innerText.includes('READY')) return showToast("Generate code first!");
            statusEl.innerText = "Verifying...";
            statusDot.className = "w-2 h-2 rounded-full bg-yellow-500 animate-bounce";
            
            setTimeout(() => {
                statusEl.innerText = "System Ready";
                statusDot.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                showToast("Verification Failed: Invalid Code");
            }, 1500);
        }

        function toggleAutoScan() {
            isAutoScanning = !isAutoScanning;
            if (isAutoScanning) {
                autoBtn.innerText = "ON";
                autoBtn.classList.add('bg-blue-600', 'text-white');
                statusEl.innerText = "Auto-Scanning...";
                statusDot.className = "w-2 h-2 rounded-full bg-blue-500 animate-spin";
                scanInterval = setInterval(() => {
                    outputEl.innerText = generatePattern();
                    if (Math.random() < 0.0001) triggerHit();
                }, 80);
            } else {
                stopAutoScan();
            }
        }

        function stopAutoScan() {
            isAutoScanning = false;
            clearInterval(scanInterval);
            autoBtn.innerText = "OFF";
            autoBtn.classList.remove('bg-blue-600', 'text-white');
            statusEl.innerText = "System Ready";
            statusDot.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
        }

        function triggerHitSim() { stopAutoScan(); triggerHit(); }

        function triggerHit() {
            stopAutoScan();
            const finalCode = generatePattern();
            outputEl.innerText = finalCode;
            finalCodeEl.innerText = finalCode;
            mainContainer.classList.add('emergency-active');
            startSiren();
            setTimeout(() => {
                foundModal.classList.add('opacity-100', 'pointer-events-auto');
                playVoiceNotification();
            }, 1000);
        }

        function resetSystem() {
            stopSiren();
            foundModal.classList.remove('opacity-100', 'pointer-events-auto');
            mainContainer.classList.remove('emergency-active');
            outputEl.innerText = "READY TO SCAN";
            initAudio();
        }

        window.addEventListener('click', () => initAudio(), { once: true });
    </script>
</body>
</html>
